        ${icBars}
        <p class="note">The cliff is between one and two. Getting a trial to add a second database is the single highest-leverage act in the funnel.</p></div>
      <div class="panel"><div class="head"><h3>Who can actually connect a database</h3><span>% reaching DB-connect</span></div>
        ${persBars}
        <p class="note">That step needs a monitoring user and an open port. DBAs have those rights. Developers have to go and ask someone.</p></div>
    </div>
    ${exps.map(x=>`<div class="ins"><div class="top"><div class="rank">${x.r}</div><h4>${x.t}</h4></div>
      <p class="ev">${x.ev}</p>
      <ul class="acts"><li>${x.act}</li></ul>
      <div class="impact">${x.imp.map(i=>`<div><p class="n">${i[0]}</p><p class="c">${i[1]}</p></div>`).join('')}</div></div>`).join('')}`;
  }

  // ---------- CAMPAIGN MANAGER ----------
  if(insAud==='campaign'){
    const row=o=>`<tr><td><b>${o.g}</b><br><span class="sub2">${CHL(o.ch)}</span></td>
      <td class="num">${num(o.n)}</td><td class="num">${M(o.spend)}</td><td class="num">${o.cust}</td>
      <td class="num">${o.cust?M(o.cpc):'—'}</td>
      <td class="num"><b style="color:${o.roas>=3?'#12A374':o.roas>=1?'var(--text)':'#D64542'}">${o.roas.toFixed(1)}x</b></td></tr>`;
    body=`
    <div class="grid-kpi">
      ${kpi('Spend', M(a.spend), 'across all ad groups', null)}
      ${kpi('Wasted spend', M(a.waste), 'in ad groups below 1x', 'var(--red)')}
      ${kpi('Recoverable', M(a.wasteRecovered), 'by cutting the losers', 'var(--sw)')}
      ${kpi('Blended ROAS', a.spend? (a.acv/a.spend).toFixed(1)+'x':'—', 'won ACV ÷ spend', 'var(--green)')}
    </div>
    ${a.losers.length?`<div class="panel" style="margin-top:12px;border-color:rgba(214,69,66,.4)">
      <div class="head"><h3 style="color:var(--red)">Cut these — returning less than they cost</h3><span>min 20 signups</span></div>
      <table class="dtable"><thead><tr><th>Ad group</th><th class="num">Signups</th><th class="num">Spend</th><th class="num">Customers</th><th class="num">$/customer</th><th class="num">ROAS</th></tr></thead>
      <tbody>${a.losers.slice(0,8).map(row).join('')}</tbody></table>
      <div class="warnbox" style="margin-top:12px">Every dollar here returns less than a dollar. Moving <b>${M(a.waste)}</b> into the ad groups below would be the single fastest efficiency win available.</div>
    </div>`:''}
    <div class="panel" style="margin-top:12px;border-color:rgba(18,163,116,.4)">
      <div class="head"><h3 style="color:var(--green)">Scale these — the money-makers</h3><span>by return on ad spend</span></div>
      <table class="dtable"><thead><tr><th>Ad group</th><th class="num">Signups</th><th class="num">Spend</th><th class="num">Customers</th><th class="num">$/customer</th><th class="num">ROAS</th></tr></thead>
      <tbody>${a.winners.map(row).join('')}</tbody></table>
    </div>
    <div class="insight">${bulb}
      <p><b>Judge on cost per customer, not cost per signup.</b> The ad groups burning money often look fine on signup volume — they simply bring trials that never install, never activate, and never buy. Google optimises for cheap signups because that is all it can see. Feed conversions back into the ad platforms so bidding chases revenue instead.</p></div>`;
  }

  // ---------- SALES ----------
  if(insAud==='sales'){
    const untouchedBetter = a.pqlNc > a.pqlSc;
    body=`
    <div class="grid-kpi">
      ${kpi('PQLs', num(a.pql), 'product-qualified, in this slice', 'var(--sw)')}
      ${kpi('PQLs with no rep', num(a.pqlN), 'nobody has called them', 'var(--red)')}
      ${kpi('Open opportunities', num(a.openO), 'live in pipeline', null)}
      ${kpi('Avg ACV won', M(a.avgWonACV), `${num(a.wonO)} closed won`, 'var(--green)')}
    </div>
    <div class="panel" style="margin-top:12px">
      <div class="head"><h3>Does sales touch actually help?</h3><span>the honest answer</span></div>
      <div class="cmp">
        <div><div class="lab"><span>All trials — sales-assisted</span><span>looks great</span></div>
          <div class="cbar"><div class="fill" style="width:${Math.min(a.naiveS/Math.max(a.naiveS,a.naiveN,1)*100,100)}%;background:#12A374">${a.naiveS.toFixed(1)}%</div></div></div>
        <div><div class="lab"><span>All trials — self-serve</span><span></span></div>
          <div class="cbar"><div class="fill" style="width:${Math.min(a.naiveN/Math.max(a.naiveS,a.naiveN,1)*100,100)}%;background:#8B95A6">${a.naiveN.toFixed(1)}%</div></div></div>
      </div>
      <p class="note" style="margin:14px 0 10px"><b>Now hold intent constant — look only at PQLs:</b></p>
      <div class="cmp">
        <div><div class="lab"><span>PQLs — sales-assisted</span><span>${num(a.pqlS)} trials</span></div>
          <div class="cbar"><div class="fill" style="width:${Math.min(a.pqlSc/Math.max(a.pqlSc,a.pqlNc,1)*100,100)}%;background:${untouchedBetter?'#D64542':'#12A374'}">${a.pqlSc.toFixed(1)}%</div></div></div>
        <div><div class="lab"><span>PQLs — no rep touched them</span><span>${num(a.pqlN)} trials</span></div>
          <div class="cbar"><div class="fill" style="width:${Math.min(a.pqlNc/Math.max(a.pqlSc,a.pqlNc,1)*100,100)}%;background:#12A374">${a.pqlNc.toFixed(1)}%</div></div></div>
      </div>
      <div class="warnbox" style="margin-top:14px">
        ${untouchedBetter
          ? `<b>Sales touch shows no lift.</b> Among PQLs — people whose behaviour already says they want to buy — untouched trials convert at <b>${a.pqlNc.toFixed(1)}%</b> and sales-assisted at <b>${a.pqlSc.toFixed(1)}%</b>. The headline gap (${a.naiveS.toFixed(1)}% vs ${a.naiveN.toFixed(1)}%) is a <b>selection effect</b>: reps get routed to trials that were already going to convert. Do not scale headcount on that number — run a holdout first.`
          : `Among PQLs, sales-assisted converts at <b>${a.pqlSc.toFixed(1)}%</b> vs <b>${a.pqlNc.toFixed(1)}%</b> untouched. Confirm with a randomised holdout before scaling headcount.`}
      </div>
    </div>
    <div class="ins"><div class="top"><div class="rank">1</div><h4>What sales should actually do on Monday</h4></div>
      <ul class="acts">
        <li>Prioritise PQLs by <b>databases monitored</b>, not by company size — trials at 2+ databases convert at ${a.i2.conv.toFixed(1)}% vs ${a.i1.conv.toFixed(1)}% at one.</li>
        <li>Define the PQL → opportunity handoff so high-intent trials reach a rep <b>while the evaluation is still warm</b>, not after the trial expires.</li>
        <li>Run a randomised holdout on PQL coverage — withhold sales touch from a slice and measure the true incremental lift. Right now we are paying for reps on evidence that does not hold up.</li>
      </ul>
      <div class="impact">
        <div><p class="n">${num(a.pqlN)}</p><p class="c">PQLs with no rep</p></div>
        <div><p class="n">${a.winRate.toFixed(1)}%</p><p class="c">opportunity win rate</p></div>
        <div><p class="n">${M(a.avgWonACV)}</p><p class="c">avg won deal</p></div>
      </div>
    </div>`;
  }

  view.innerHTML = tabs + body +
    `<p class="note">Every figure recomputes from the filters above — product, region, deployment and the signup date range. Impact sizings are directional, at an average won ACV of ${M(a.avgACV)}.</p>`;

  view.querySelectorAll('.aud').forEach(b=> b.onclick=()=>{ insAud=b.dataset.aud; render(); });
}

// ---------------- Product events (in-product behaviour) ----------------
const SETUP_STEPS=['Trial started','Installer downloaded','Install completed','App first open',
  'Connect wizard opened','DB platform selected','Credentials entered','Connection attempted',
  'Connection succeeded','First analysis run'];
const SETUP_ERRS=['ERR_PERMISSION_DENIED','ERR_NETWORK_UNREACHABLE','ERR_AUTH_FAILED','ERR_VERSION_UNSUPPORTED','ERR_TIMEOUT'];
const ERR_HUMAN={
  ERR_PERMISSION_DENIED:['Permission denied','Their DB user lacks monitoring rights','Send the exact GRANT statement for their platform. One email, one line of SQL, problem solved.'],
  ERR_NETWORK_UNREACHABLE:['Network unreachable','A firewall is blocking the port','Port + firewall checklist, and prompt them to loop in their network team — they cannot fix this alone.'],
  ERR_AUTH_FAILED:['Auth failed','Wrong username or password','Credential walkthrough. Cheapest fix on the list.'],
  ERR_VERSION_UNSUPPORTED:['Version unsupported','We do not support their DB version','Be honest fast. Route to a supported product or the roadmap — do not let them burn the trial.'],
  ERR_TIMEOUT:['Timeout','Connection hung','Usually network too. Same checklist, plus a health-check retry.']
};
// stage -> the segment sitting there, and what to do about them
const SEG={
  0:['Never downloaded the installer','Signed up and vanished. The trial clock is already running.','Day-1 email: "Your download link" + a 3-minute setup video. Nothing else.','hi'],
  1:['Downloaded, never installed','Almost certainly blocked — a server, a change request, an IT approval.','This is the handoff wall. Prompt them to invite a sysadmin, and offer a hosted sandbox so evaluation can start today.','hi'],
  2:['Installed, never opened the app','Software is running. Nobody has looked at it.','In-app: nothing to send. Email: "You are 2 minutes from your first analysis."','md'],
  3:['Opened the app, never clicked Connect','They are staring at an empty dashboard, unsure what to do.','Pendo tour on first open: point at the Connect button. No engineering needed.','md'],
  4:['Opened the Connect wizard, abandoned','They looked at what was required and backed out.','Simplify the wizard. Show what they will need BEFORE they start.','md'],
  5:['Their database platform is not supported','They came, they looked, we do not support their database.','Tell them immediately, at signup — a pre-flight qualifier. Then route them to a product that does.','hi'],
  6:['Entered credentials, never submitted','Hesitated at the last step. Unsure, or missing a value.','Inline help on the credentials screen. This is a 5-minute Pendo tooltip.','lo'],
  7:['Tried to connect — it failed','They did everything right and hit an error.','Send the fix for their specific error. See the breakdown below.','hi'],
  8:['Connected, never ran an analysis','The plumbing works. They never saw a single insight.','Guide them to the first wait-time analysis. This is the aha moment and they are one click away.','hi']
};

function cEvents(f){
  if(!HAVE() || TRIALS[0].setup_stage==null) return null;
  const F=filt(f), n=F.length||1;
  const at=s=>F.filter(r=>r.setup_stage===s).length;
  const reached=s=>F.filter(r=>r.setup_stage>=s).length;
  const funnel=SETUP_STEPS.map((lab,i)=>{
    const v = i===7 ? F.filter(r=>r.setup_stage>=7).length : reached(i);
    return {lab, i, v};
  });
  const stuck=[];
  for(let s=0;s<=8;s++){ const c=at(s); if(c>0 && SEG[s]) stuck.push({s, n:c, ...{}, seg:SEG[s]}); }
  stuck.sort((a,b)=>b.n-a.n);
  // failures
  const failed=F.filter(r=>r.setup_stage===7);
  const errs=SETUP_ERRS.map((e,i)=>({e, n:failed.filter(r=>r.setup_err===i).length}))
    .filter(x=>x.n>0).sort((a,b)=>b.n-a.n);
  // failed then recovered — proof that help works
  const recovered=F.filter(r=>r.setup_stage>=8 && r.setup_err>=0).length;
  const recoverRate = (recovered+failed.length) ? pct(recovered, recovered+failed.length) : 0;
  const avgAttempts = failed.length ? mean(failed.map(r=>+r.setup_attempts||0)) : 0;
  return {n:F.length, funnel, stuck, errs, failed:failed.length, recovered, recoverRate, avgAttempts};
}

let mockOpen=false;
function renderEvents(view,f){
  const a=cEvents(f);
  if(!a){ view.innerHTML='<div class="placeholder"><p class="n">Product events</p><p>No event data in this slice.</p></div>'; return; }
  const num=x=>Math.round(x).toLocaleString();
  const mx=a.funnel[0].v||1;
  const frows=a.funnel.map((s,i)=>{
    const prev=i?a.funnel[i-1].v:null;
    const step=prev? pct(s.v,prev):null;
    const drop=prev? prev-s.v : 0;
    return `<div class="frow">
      <span class="fname" style="width:150px">${s.lab}</span>
      <div class="ftrack"><div class="ffill" style="width:${Math.max(s.v/mx*100,1)}%;background:${i>=8?'#12A374':'var(--sw)'}"></div></div>
      <span class="fnum" style="width:62px">${num(s.v)}</span>
      <span class="fstep" style="width:46px">${step==null?'—':step.toFixed(0)+'%'}</span>
      <span class="fstep" style="width:66px;color:${drop>0?'#D64542':'var(--text3)'}">${drop>0?'−'+num(drop):''}</span>
    </div>`;}).join('');

  const srows=a.stuck.map(x=>{
    const [title,what,action,pri]=x.seg;
    return `<div class="ins">
      <div class="top">
        <div class="rank${pri==='hi'?'':' warn'}">${num(x.n)>999?'!':x.s}</div>
        <h4>${title}</h4>
        <div class="tags"><span class="tag ${pri}">${pri==='hi'?'High priority':pri==='md'?'Medium':'Low'}</span>
          <span class="tag">${num(x.n)} trials</span></div>
      </div>
      <p class="ev">${what}</p>
      <ul class="acts"><li><b>Action:</b> ${action}</li></ul>
    </div>`;}).join('');

  const emax=Math.max(...a.errs.map(e=>e.n),1);
  const erows=a.errs.map(e=>{
    const [h,why,fix]=ERR_HUMAN[e.e]||[e.e,'',''];
    return `<div class="errrow">
      <div class="frow" style="margin-bottom:6px">
        <span class="fname" style="width:150px"><b>${h}</b></span>
        <div class="ftrack"><div class="ffill" style="width:${Math.max(e.n/emax*100,2)}%;background:#D64542"></div></div>
        <span class="fnum">${num(e.n)}</span>
      </div>
      <p class="errfix"><span class="ec">${e.e}</span> ${why}. <b>${fix}</b></p>
    </div>`;}).join('');

  view.innerHTML=`
  <div class="grid-kpi">
    <div class="kpi"><p class="l">Tried to connect, failed</p><p class="v" style="color:var(--red)">${num(a.failed)}</p><p class="s">did everything right, hit an error</p></div>
    <div class="kpi"><p class="l">Failed, then recovered</p><p class="v" style="color:var(--green)">${num(a.recovered)}</p><p class="s">${a.recoverRate.toFixed(0)}% of those who hit an error</p></div>
    <div class="kpi"><p class="l">Avg attempts before giving up</p><p class="v sm">${a.avgAttempts.toFixed(1)}</p><p class="s">they tried, repeatedly</p></div>
    <div class="kpi"><p class="l">Trials in this slice</p><p class="v sm">${num(a.n)}</p><p class="s">matching your filters</p></div>
  </div>

  <div class="panel" style="margin-top:12px">
    <div class="head"><h3>Setup event funnel<span class="pillw">what they actually clicked</span></h3>
      <span>step % · trials lost</span></div>
    ${frows}
    <p class="note">This is the level Pendo or Amplitude would give us. Our trial funnel tells us <i>where</i> people stop. This tells us <i>what they were doing when they stopped</i> — the difference between knowing we have a problem and being able to fix it.</p>
  </div>

  ${a.errs.length?`<div class="panel" style="margin-top:12px;border-color:rgba(214,69,66,.4)">
    <div class="head"><h3 style="color:var(--red)">They clicked Connect. It failed. Here's why.</h3>
      <span>${num(a.failed)} trials · each error needs a different email</span></div>
    ${erows}
    <div class="warnbox" style="margin-top:14px">
      <b>This is the segmentation we don't have today.</b> Right now every one of these ${num(a.failed)} people gets the same generic "finish your setup" email from us. A permissions error and a firewall error aren't the same problem — and one of them we solve with a single line of SQL.
    </div>
  </div>`:''}

  <div class="panel" style="margin-top:12px">
    <div class="head"><h3>Our proposed fix — the two questions we'd ask at signup</h3>
      <span><button class="chtog" id="mock-tog" style="margin:0">${mockOpen?'▾ Hide':'▸ Show'} the screen</button></span></div>
    <p class="note" style="margin:0 0 12px">We ask these <b>after</b> signup, on the download page — so they cost us no conversions. Two optional questions, framed as help rather than a form.</p>
    ${mockOpen?`<div class="mock">
      <div class="bar"><span class="dot3"></span><span class="dot3"></span><span class="dot3"></span>
        <span class="url">solarwinds.com/dpa/trial/download</span></div>
      <div class="inner">
        <h5>Your download is ready.</h5>
        <p class="lead">Two quick questions so we send you the right setup guide — not a generic one.</p>
        <p class="qq">Which database will you monitor?</p>
        <div class="opts"><span class="opt">SQL Server</span><span class="opt hl">Oracle</span><span class="opt">MySQL</span><span class="opt">PostgreSQL</span><span class="opt">Something else</span></div>
        <p class="qq">Where does that database run?</p>
        <div class="opts"><span class="opt">Same network as the DPA server</span><span class="opt hl">Behind a firewall / different network</span><span class="opt">Not sure yet</span></div>
        <span class="btn">Download DPA</span><span class="skip">Skip for now</span>
      </div></div>
    <div class="row2" style="margin-top:12px">
      <div class="panel" style="border-color:rgba(255,98,0,.3);background:var(--sw-tint)">
        <h3>What the first answer buys us</h3>
        <p class="ev" style="margin:0">If their platform isn't supported, we tell them <b>now</b> — not after they've burned a week. That's the ${num(a.stuck.find(x=>x.s===5)?a.stuck.find(x=>x.s===5).n:0)} trials currently discovering it the hard way.</p></div>
      <div class="panel" style="border-color:rgba(255,98,0,.3);background:var(--sw-tint)">
        <h3>What the second answer buys us</h3>
        <p class="ev" style="margin:0">"Behind a firewall" tells us they'll need a network change — weeks of it. We send the pre-written request for their network team on <b>day one</b>, and stop the trial clock before it beats them.</p></div>
    </div>`:''}
  </div>

  <div class="panel" style="margin-top:12px">
    <div class="head"><h3>Every stuck trial, and what we should send them</h3><span>sorted by size</span></div>
    <p class="note" style="margin:0 0 14px">${num(a.n - (a.funnel[9]?a.funnel[9].v:0))} trials in this slice never reached activation. They're not one audience. They're ${a.stuck.length} different audiences, each stuck for a different reason.</p>
  </div>
  ${srows}

  <div class="insight">${bulb}
    <p><b>The recovery number is our argument.</b> ${num(a.recovered)} trials hit a connection error and <i>still</i> got through — they persisted, retried, and made it. ${num(a.failed)} hit the same errors and gave up. The difference between those two groups isn't intent. It's whether anyone helped them at the moment they were stuck. That help costs us one email each, and we already know exactly which email to send.</p></div>`;

  const mt=document.getElementById('mock-tog');
  if(mt) mt.onclick=()=>{ mockOpen=!mockOpen; render(); };
}

// ---------------- router ----------------
function render(){
  clearCharts();
  const view=document.getElementById('view');
  const f={product:val('f-product'),region:val('f-region'),deployment:val('f-deployment'),
           from:val('f-from')||null, to:val('f-to')||null};
  const cEl=document.getElementById('f-count');
  if(cEl && HAVE()) cEl.textContent = filt(f).length.toLocaleString()+' trials';
  try{
    if(active==='Overview') return renderOverview(view,f);
    if(active==='Activation funnel') return renderActivation(view,f);
    if(active==='Product events') return renderEvents(view,f);
    if(active==='Acquisition & CAC') return renderAcq(view,f);
    if(active==='Engagement & nurture') return renderEng(view,f);
    if(active==='Experiments') return renderExp(view,f);
    if(active==='Pipeline') return renderPipe(view,f);
    if(active==='Insights') return renderInsights(view,f);
  }catch(e){
    console.error(e);
    view.innerHTML=`<div class="placeholder"><p class="n">${active}</p><p>Something went wrong rendering this view. Check the console.</p></div>`;
  }
}

function buildTabs(){
  const t=document.getElementById('tabs');
  t.innerHTML=VIEWS.map(v=>`<button class="tab${v===active?' active':''}" data-v="${v}">${v}</button>`).join('');
  t.querySelectorAll('.tab').forEach(b=> b.onclick=()=>{ active=b.dataset.v; buildTabs(); render(); });
}

function setSource(){
  const dot=document.getElementById('src-dot'), txt=document.getElementById('src-text');
  if(SOURCE==='live'){ dot.className='dot live'; txt.textContent='Live · Supabase'; }
  else if(SOURCE==='snapshot'){ dot.className='dot live'; txt.textContent='Snapshot · full dataset'; }
  else{ dot.className='dot sample'; txt.textContent='Sample data'; 
    ['f-product','f-region','f-deployment','f-from','f-to'].forEach(id=>document.getElementById(id).disabled=true); }
}

['f-product','f-region','f-deployment','f-from','f-to'].forEach(id=>document.getElementById(id).addEventListener('change', ()=>{
  document.querySelectorAll('.qk').forEach(b=>b.classList.remove('on'));
  render();
}));
document.querySelectorAll('.qk').forEach(btn=> btn.onclick=()=>{
  document.querySelectorAll('.qk').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const days=+btn.dataset.days;
  if(!days){ document.getElementById('f-from').value=DMIN||''; document.getElementById('f-to').value=DMAX||''; }
  else{
    const end=new Date(DMAX+'T00:00:00'); const start=new Date(end); start.setDate(start.getDate()-(days-1));
    const lo=new Date(DMIN+'T00:00:00');
    document.getElementById('f-from').value=(start<lo?lo:start).toISOString().slice(0,10);
    document.getElementById('f-to').value=DMAX;
  }
  render();
});

(async function init(){
  buildTabs();
  if(await loadLive())          SOURCE='live';
  else if(await loadSnapshot()) SOURCE='snapshot';
  else                          SOURCE='sample';
  if(TRIALS && TRIALS.length){
    const ds=TRIALS.map(r=>String(r.signup_date).slice(0,10)).filter(Boolean);
    DMIN=ds.reduce((a,b)=>b<a?b:a); DMAX=ds.reduce((a,b)=>b>a?b:a);
    const fEl=document.getElementById('f-from'), tEl=document.getElementById('f-to');
    fEl.min=tEl.min=DMIN; fEl.max=tEl.max=DMAX;
    fEl.value=DMIN; tEl.value=DMAX;
    document.querySelector('.qk[data-days="0"]').classList.add('on');
  }
  setSource();
  render();
})();
</script>
