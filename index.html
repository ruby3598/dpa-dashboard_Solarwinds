  .fname{width:76px;font-size:12px;flex-shrink:0;color:var(--text2);}

async function fetchAll(sb, table, cols){
  const page=1000; let from=0, out=[];
  while(true){
    const { data, error } = await sb.from(table).select(cols).range(from, from+page-1);
    if(error) throw error;
    out = out.concat(data);
    if(data.length < page) break;
    from += page;
  }
  return out;
}

      fetchAll(SB,'crm_opportunities','trial_id,product,region,stage,won,acv_usd')
    ]);
    if(!trials.length) throw new Error('trials table is empty');

    return true;
  }catch(e){ console.warn('Supabase unavailable:', e.message); return false; }
}

      const id='T'+i;

        company_size:dec('company_size',i),persona:dec('persona',i),acquisition_channel:dec('acquisition_channel',i),

        signup_date:dec('month',i)+'-01',activated:!!T.activated[i],is_pql:!!T.is_pql[i],converted:!!T.converted[i],
        sales_assisted:!!T.sales_assisted[i],trial_extended:!!T.trial_extended[i],
        cac_usd:T.cac_usd[i],time_to_convert_days:T.time_to_convert_days[i],acv_usd:T.acv_usd?T.acv_usd[i]:null,
        daymask:T.daymask?T.daymask[i]:null});

        engagement_score:T.engagement_score[i],logins:T.logins[i],wait_time_analyses_run:T.wait_time_analyses_run[i],
        tuning_advisors_used:T.tuning_advisors_used[i],anomaly_alerts_configured:T.anomaly_alerts_configured[i],
        reports_generated:T.reports_generated[i]};
    }
    CHANNEL=S.channel.map(r=>({month:r[0],channel:r[1],signups:r[2],conversions:r[3],spend_usd:r[4]}));
    CAMPAIGN=S.campaign.map(r=>({month:r[0],channel:r[1],campaign:r[2],ad_group:r[3],impressions:r[4],clicks:r[5],spend_usd:r[6],signups:r[7],activated:r[8],conversions:r[9]}));
    CRM=S.crm.map(r=>({product:r[0],region:r[1],stage:r[2],won:!!r[3],acv_usd:r[4],trial_id:r[5]!=null?('T'+r[5]):null}));
    const NS=S.nurture;
    NURTURE=NS.t.map((ti,i)=>({trial_id:'T'+ti,email_step:NS.steps[NS.s[i]],opened:!!(NS.f[i]&1),clicked:!!(NS.f[i]&2)}));
    return true;
  }catch(e){ console.error('snapshot failed:', e.message); return false; }
}

const filt = f => TRIALS.filter(r =>
  (f.product==='all'||r.product===f.product) &&
  (f.region==='all'||r.region===f.region) &&
  (f.deployment==='all'||r.deployment_type===f.deployment));

// ---------------- compute (Overview) ----------------
function compute(f){
  if(!HAVE()) return FB.overview;
  const F = filt(f);
  const act = mean(F.map(r=>r.activated?1:0))*100;
  const ttc = F.filter(r=>r.converted && r.time_to_convert_days!=null).map(r=>+r.time_to_convert_days);
  const faVals = F.filter(r=>r.activated).map(r=> (PUMAP[r.trial_id]?.feature_adoption_rate ?? 0));
  const byM={};
  F.forEach(r=>{ if(!r.signup_date) return; const m=String(r.signup_date).slice(0,7); (byM[m]=byM[m]||[]).push(r.converted?1:0); });
  const ms=Object.keys(byM).sort();
  return {
    kpis:{ conversion:r1(mean(F.map(r=>r.converted?1:0))*100), trial_duration:Math.round(median(ttc)), cac:Math.round(mean(F.map(r=>+r.cac_usd||0))), abandonment:r1(100-act), feature_adoption:Math.round(mean(faVals)*100) },
    funnel:[['Signed up',F.length],['Installed',F.filter(r=>PUMAP[r.trial_id]?.installed).length],['Connected',F.filter(r=>PUMAP[r.trial_id]?.db_connected).length],['Activated',F.filter(r=>r.activated).length],['PQL',F.filter(r=>r.is_pql).length],['Paid',F.filter(r=>r.converted).length]],
    trend:{labels:ms.map(fmtMonth), values:ms.map(m=>r1(mean(byM[m])*100))}
  };
}

// ---------------- compute (Activation) ----------------
function cActivation(f){
  if(!HAVE()) return FB.activation;
  const F=filt(f);
  const funnel=[['Signed up',F.length],['Installed',F.filter(r=>PUMAP[r.trial_id]?.installed).length],['Connected',F.filter(r=>PUMAP[r.trial_id]?.db_connected).length],['Activated',F.filter(r=>r.activated).length],['PQL',F.filter(r=>r.is_pql).length],['Paid',F.filter(r=>r.converted).length]];
  const tta=F.filter(r=>r.activated).map(r=>+PUMAP[r.trial_id]?.time_to_activate_hrs).filter(x=>x===x && x!=null);
  const base=TRIALS.filter(r=>(f.product==='all'||r.product===f.product)&&(f.region==='all'||r.region===f.region));
  const depRates=dt=>{ const d=base.filter(r=>r.deployment_type===dt); const n=d.length||1;
    return {n:d.length, inst:r1(pct(d.filter(r=>PUMAP[r.trial_id]?.installed).length,n)),conn:r1(pct(d.filter(r=>PUMAP[r.trial_id]?.db_connected).length,n)),act:r1(pct(d.filter(r=>r.activated).length,n))}; };
  const reasons={};
  F.filter(r=>!r.converted && r.non_conversion_reason).forEach(r=>reasons[r.non_conversion_reason]=(reasons[r.non_conversion_reason]||0)+1);
  const SH=depRates('self_hosted'), SA=depRates('saas');
  return { funnel, kpis:{act:r1(pct(F.filter(r=>r.activated).length,F.length)),tta:Math.round(median(tta)),
    sh:SH.act, saas:SA.act, shN:SH.n, saasN:SA.n},
    dep:{sh:SH,saas:SA}, reasons:Object.entries(reasons).sort((a,b)=>b[1]-a[1]).slice(0,6) };
}

// ---------------- compute (Acquisition — drill-down) ----------------
// Signups / activation / conversion come from `trials`, so they respect every filter.
// Spend lives at campaign level, so it's allocated to the filtered slice by signup share.
function cAcq(f){
  if(!HAVE()) return null;
  const F=filt(f);
  const spendC={}, spendA={}, sigAllC={}, sigAllA={};
  (CAMPAIGN||[]).forEach(r=>{
    spendC[r.campaign]=(spendC[r.campaign]||0)+(+r.spend_usd||0);
    sigAllC[r.campaign]=(sigAllC[r.campaign]||0)+(+r.signups||0);
    const k=r.campaign+'||'+r.ad_group;
    spendA[k]=(spendA[k]||0)+(+r.spend_usd||0);
    sigAllA[k]=(sigAllA[k]||0)+(+r.signups||0);
  });
  // ad-group signup mix within each campaign (from campaign table)
  const agMix={};
  Object.keys(sigAllA).forEach(k=>{ const c=k.split('||')[0]; agMix[c]=agMix[c]||[]; agMix[c].push([k.split('||')[1], sigAllC[c]?sigAllA[k]/sigAllC[c]:0, spendA[k]]); });

  // pipeline stages, joined back to the trial that produced them
  const LATE=new Set(['Proposal','Negotiation','Closed Won']);
  const pipeByTrial={};
  (CRM||[]).forEach(o=>{ if(o.trial_id) pipeByTrial[o.trial_id]=o; });

  // furthest stage each trial reached: 1 signup .. 7 closed won
  const stageOf = r => {
    const p=PUMAP[r.trial_id]||{}, op=pipeByTrial[r.trial_id];
    if(op && op.won) return 7;
    if(op) return 6;
    if(r.is_pql) return 5;
    if(r.activated) return 4;
    if(p.db_connected) return 3;
    if(p.installed) return 2;
    return 1;
  };
  const isDead = r => !r.converted && !!r.non_conversion_reason;

  const byCmp={};
  F.forEach(r=>{ const c=r.campaign||'—'; const o=byCmp[c]=byCmp[c]||{ch:r.acquisition_channel,s:0,a:0,q:0,cv:0,late:0,wonAcv:0,
      now:[0,0,0,0,0,0,0,0], jr:[0,0,0,0,0,0,0,0], ko:0};
    o.s++; if(r.activated)o.a++; if(r.is_pql)o.q++; if(r.converted)o.cv++;
    const st=stageOf(r);
    o.now[st]++;                                  // where it sits now
    for(let k=1;k<=st;k++) o.jr[k]++;             // every stage it ever reached
    if(isDead(r)) o.ko++;
    const op=pipeByTrial[r.trial_id];
    if(op){ if(LATE.has(op.stage)) o.late++; if(op.won) o.wonAcv+=(+op.acv_usd||0); } });

  const campaigns=Object.entries(byCmp).map(([c,o])=>{
    const share = sigAllC[c] ? Math.min(o.s/sigAllC[c],1) : 0;
    const spend = (spendC[c]||0)*share;
    const ags=(agMix[c]||[]).map(([name,mix,fullSpend])=>{
      const s=Math.round(o.s*mix), a=Math.round(o.a*mix), cv=Math.round(o.cv*mix);
      const sc=arr=>arr.map(v=>Math.round(v*mix));
      return {name,signups:s,act:a,conv:cv,spend:fullSpend*share,
        cps:s?fullSpend*share/s:0, cpa:cv?fullSpend*share/cv:0, cvr:pct(cv,s),
        now:sc(o.now), jr:sc(o.jr), ko:Math.round(o.ko*mix), pqlR:null,
        actR:s?pct(a,s):0};
    }).sort((x,y)=>y.spend-x.spend);
    return {campaign:c,channel:o.ch,signups:o.s,act:o.a,pql:o.q,conv:o.cv,late:o.late,wonAcv:o.wonAcv,spend,
      cps:o.s?spend/o.s:0, cpa:o.cv?spend/o.cv:0, cvr:pct(o.cv,o.s),
      actR:pct(o.a,o.s), pqlR:pct(o.q,o.s), now:o.now, jr:o.jr, ko:o.ko, ad_groups:ags};
  });

  const byCh={};
  campaigns.forEach(c=>{ const o=byCh[c.channel]=byCh[c.channel]||{signups:0,act:0,pql:0,conv:0,late:0,wonAcv:0,spend:0,ko:0,
      now:[0,0,0,0,0,0,0,0], jr:[0,0,0,0,0,0,0,0], camps:[]};
    o.signups+=c.signups; o.act+=c.act; o.pql+=c.pql; o.conv+=c.conv; o.late+=c.late; o.wonAcv+=c.wonAcv;
    o.spend+=c.spend; o.ko+=c.ko; o.camps.push(c);
    for(let k=1;k<=7;k++){ o.now[k]+=c.now[k]; o.jr[k]+=c.jr[k]; } });
  const sortFn=(x,y)=> acqMode==='cost' ? y.spend-x.spend : (acqMode==='stages' ? y.signups-x.signups : y.wonAcv-x.wonAcv);
  const channels=Object.entries(byCh).map(([ch,o])=>({channel:ch,signups:o.signups,act:o.act,pql:o.pql,conv:o.conv,
    late:o.late,wonAcv:o.wonAcv,spend:o.spend,now:o.now,jr:o.jr,ko:o.ko,
    cps:o.signups?o.spend/o.signups:0, cpa:o.conv?o.spend/o.conv:0, cvr:pct(o.conv,o.signups),
    actR:pct(o.act,o.signups), pqlR:pct(o.pql,o.signups),
    campaigns:o.camps.sort(sortFn)})).sort(sortFn);

  const totals={spend:channels.reduce((a,c)=>a+c.spend,0),signups:F.length,
    conv:F.filter(r=>r.converted).length};
  totals.cps=totals.signups?totals.spend/totals.signups:0;
  totals.cpa=totals.conv?totals.spend/totals.conv:0;
  totals.act=F.filter(r=>r.activated).length;
  totals.actR=pct(totals.act,totals.signups);

  const bm={};
  F.forEach(r=>{ const m=String(r.signup_date).slice(0,7); const o=bm[m]=bm[m]||{s:0}; o.s++; });
  const spendM={};
  (CAMPAIGN||[]).forEach(r=>{ const m=String(r.month).slice(0,7); spendM[m]=spendM[m]||{sp:0,sg:0}; spendM[m].sp+=+r.spend_usd||0; spendM[m].sg+=+r.signups||0; });
  const ms=Object.keys(bm).sort();
  const trend={labels:ms,
    spend:ms.map(m=>{ const g=spendM[m]; const share=g&&g.sg?Math.min(bm[m].s/g.sg,1):0; return (g?g.sp:0)*share; }),
    cps:ms.map(m=>{ const g=spendM[m]; const share=g&&g.sg?Math.min(bm[m].s/g.sg,1):0; const sp=(g?g.sp:0)*share; return r1(bm[m].s?sp/bm[m].s:0); })};
  return {totals,channels,trend,hasCampaign:!!(CAMPAIGN&&CAMPAIGN.length)};
}

// ---------------- compute (Engagement) ----------------
function cEng(f){
  if(!HAVE()) return FB.engagement;
  const F=filt(f);
  const eng=F.map(r=>+PUMAP[r.trial_id]?.engagement_score).filter(x=>x===x);
  const actd=F.filter(r=>r.activated);
  const B=[['0',-1,0],['1-20',0,20],['21-40',20,40],['41-60',40,60],['61-80',60,80],['81-100',80,100]];
  const buckets=B.map(([lab,lo,hi])=>{ const d=F.filter(r=>{const s=+PUMAP[r.trial_id]?.engagement_score; return s>lo&&s<=hi;}); return [lab,d.length,r1(pct(d.filter(r=>r.converted).length,d.length))]; });
  const feat=k=> r1(mean(actd.map(r=>+PUMAP[r.trial_id]?.[k]||0)));
  const features={adoption:r1(mean(actd.map(r=>+PUMAP[r.trial_id]?.feature_adoption_rate||0))*100),logins:feat('logins'),wait:feat('wait_time_analyses_run'),tuning:feat('tuning_advisors_used'),alerts:feat('anomaly_alerts_configured'),reports:feat('reports_generated')};
  let nurture=null, clickConv=null, open=null, click=null;
  if(NURTURE){
    const ids=new Set(F.map(r=>r.trial_id));
    const rel=NURTURE.filter(e=>ids.has(e.trial_id));
    const order=['setup_help_1','setup_help_2','feature_spotlight','trial_ending','extension_offer'];
    const bs={}; rel.forEach(e=>{const o=bs[e.email_step]=bs[e.email_step]||{s:0,o:0,c:0}; o.s++; if(e.opened)o.o++; if(e.clicked)o.c++;});
    nurture=order.filter(s=>bs[s]).map(s=>[s,bs[s].s,r1(pct(bs[s].o,bs[s].s)),r1(pct(bs[s].c,bs[s].s))]);
    open=r1(pct(rel.filter(e=>e.opened).length,rel.length)); click=r1(pct(rel.filter(e=>e.clicked).length,rel.length));
    const clicked=new Set(rel.filter(e=>e.clicked).map(e=>e.trial_id));
    const cy=F.filter(r=>clicked.has(r.trial_id)), cn=F.filter(r=>!clicked.has(r.trial_id));
    clickConv=[r1(pct(cn.filter(r=>r.converted).length,cn.length)),r1(pct(cy.filter(r=>r.converted).length,cy.length))];
  }
  return {kpis:{eng:r1(mean(eng)),open,click,adopt:features.adoption},buckets,nurture,features,clickConv};
}

// ---------------- compute (Trial retention) ----------------
const NURTURE_DAYS={setup_help_1:2,setup_help_2:5,feature_spotlight:8,trial_ending:12,extension_offer:14};
function cRet(f){
  if(!HAVE() || TRIALS[0].daymask==null) return FB.retention;
  const F=filt(f), D=14;
  const on=(m,d)=> m!=null && ((m>>(d-1))&1);
  const curve=arr=>{ const n=arr.length||1;
    return Array.from({length:D},(_,i)=> r1(arr.filter(r=>on(r.daymask,i+1)).length/n*100)); };
  const conv=F.filter(r=>r.converted), non=F.filter(r=>!r.converted);
  return { days:D, all:curve(F), conv:curve(conv), nonconv:curve(non),
    dead: r1(F.filter(r=>!r.daymask).length/(F.length||1)*100),
    emails:NURTURE_DAYS };
}

// ---------------- compute (Experiments) ----------------
function cExp(f){
  if(!HAVE()) return FB.experiments;
  const F=filt(f);
  const v=x=>{ const d=F.filter(r=>r.landing_variant===x); const n=d.length||1; return {n:d.length,act:r1(pct(d.filter(r=>r.activated).length,n)),pql:r1(pct(d.filter(r=>r.is_pql).length,n)),conv:r1(pct(d.filter(r=>r.converted).length,n))}; };
  const A=v('A'), Bv=v('B'); const lift=A.conv?r1((Bv.conv-A.conv)/A.conv*100):0;
  const grp=pred=>{ const d=F.filter(pred); return r1(pct(d.filter(r=>r.converted).length,d.length||1)); };
  return {ab:{A,B:Bv,lift}, ext:{no:grp(r=>!r.trial_extended),yes:grp(r=>r.trial_extended),n_yes:F.filter(r=>r.trial_extended).length}, sales:{self:grp(r=>!r.sales_assisted),assisted:grp(r=>r.sales_assisted),n_assisted:F.filter(r=>r.sales_assisted).length}};
}

// ---------------- compute (Pipeline) ----------------
function cPipe(f){
  if(!HAVE() || !CRM) return FB.pipeline;
  const O=CRM.filter(o=>(f.product==='all'||o.product===f.product)&&(f.region==='all'||o.region===f.region));
  const order=['Discovery','Demo/POC','Proposal','Negotiation','Closed Won','Closed Lost'];
  const sc={}; O.forEach(o=>sc[o.stage]=(sc[o.stage]||0)+1);
  const stages=order.map(s=>[s,sc[s]||0]);
  const won=O.filter(o=>o.won);
  const openStages=new Set(['Discovery','Demo/POC','Proposal','Negotiation']);
  const kpis={open:O.filter(o=>openStages.has(o.stage)).length,winrate:r1(pct(won.length,O.length)),avg_acv:Math.round(mean(won.map(o=>+o.acv_usd||0))),pipeline_acv:Math.round(won.reduce((a,o)=>a+(+o.acv_usd||0),0))};
  const bp={}; won.forEach(o=>{const p=bp[o.product]=bp[o.product]||{n:0,acv:0}; p.n++; p.acv+=+o.acv_usd||0;});
  const byprod=Object.entries(bp).map(([p,o])=>[p,o.n,Math.round(o.acv)]).sort((a,b)=>b[2]-a[2]);
  const wr={}; O.forEach(o=>{const r=wr[o.region]=wr[o.region]||{w:0,n:0}; r.n++; if(o.won)r.w++;});
  const winregion=Object.entries(wr).map(([rg,o])=>[rg,r1(pct(o.w,o.n))]).sort((a,b)=>b[1]-a[1]);
  return {stages,kpis,byprod,winregion};
}

// ---------------- Activation funnel ----------------
function renderActivation(view,f){
  const a=cActivation(f);
  const mx=a.funnel[0][1]||1;
  const funnelRows=a.funnel.map(([n,v],i)=>`<div class="frow"><span class="fname">${n}</span><div class="ftrack"><div class="ffill" style="width:${Math.max(v/mx*100,1)}%"></div></div><span class="fnum">${v.toLocaleString()}</span><span class="fstep">${i===0?'—':pct(v,a.funnel[i-1][1]).toFixed(0)+'%'}</span></div>`).join('');
  const rmax=a.reasons.length?a.reasons[0][1]:1;
  const reasonRows=a.reasons.map(([k,v])=>`<div class="frow"><span class="fname" style="width:130px">${REASON_LABELS[k]||k}</span><div class="ftrack"><div class="ffill" style="width:${Math.max(v/rmax*100,2)}%;background:#D64542"></div></div><span class="fnum">${v.toLocaleString()}</span></div>`).join('');
  view.innerHTML=`
  <div class="grid-kpi">
    <div class="kpi"><p class="l">Activation rate</p><p class="v" style="color:var(--sw)">${a.kpis.act.toFixed(1)}%</p><p class="s">reached first value</p></div>
    <div class="kpi"><p class="l">Median time to activate</p><p class="v sm">${a.kpis.tta} hrs</p><p class="s">signup → first analysis</p></div>
    <div class="kpi"><p class="l">Self-hosted activation</p>
      <p class="v" style="color:${a.kpis.shN?'var(--red)':'var(--text3)'}">${a.kpis.shN? a.kpis.sh.toFixed(1)+'%' : '—'}</p>
      <p class="s">${a.kpis.shN? 'the setup-friction segment' : 'no self-hosted trials in this slice'}</p></div>
    <div class="kpi"><p class="l">SaaS activation</p>
      <p class="v" style="color:${a.kpis.saasN?'var(--green)':'var(--text3)'}">${a.kpis.saasN? a.kpis.saas.toFixed(1)+'%' : '—'}</p>
      <p class="s">${a.kpis.saasN? 'no install step' : 'no SaaS trials in this slice'}</p></div>
  </div>
  <div class="row2">
    <div class="panel"><div class="head"><h3>Activation funnel</h3><span>grey % = step conversion</span></div>${funnelRows}</div>
    <div class="panel"><div class="head"><h3>${(a.kpis.shN&&a.kpis.saasN)?'Where self-hosted falls behind':'Setup steps for this slice'}</h3><span>% of segment</span></div>
      ${(a.kpis.shN&&a.kpis.saasN)?'<div class="chart-box"><canvas id="c-dep"></canvas></div>'
        :`<div class="chart-box"><canvas id="c-dep"></canvas></div>
          <p class="note">This product ships in one deployment model only, so there is no comparison to draw here. Clear the Product filter to compare self-hosted against SaaS.</p>`}</div>
  </div>
  <div class="row2">
    <div class="panel"><div class="head"><h3>Why trials don't convert</h3><span>non-converting trials</span></div>${reasonRows}</div>
    <div class="panel" style="display:flex;align-items:center"><div class="insight" style="margin:0">${bulb}
      ${(a.kpis.shN&&a.kpis.saasN)
        ? `<p><b>The leak is setup, not selling.</b> Self-hosted trials activate at ${a.kpis.sh.toFixed(0)}% vs ${a.kpis.saas.toFixed(0)}% for SaaS — the gap opens at install and DB-connect. "Setup too complex" and "couldn't connect DB" lead the drop-off reasons. Levers: in-product setup wizard, a connection health-check, and a self-hosted setup-help nurture track.</p>`
        : `<p><b>Deployment and product are the same variable.</b> DPA and SQL Sentry ship self-hosted only; DPM ships SaaS only — there is no overlap, so a single-product view has nothing to compare against. That also means the activation gap cannot be cleanly attributed to setup friction alone: "self-hosted" and "not DPM" are statistically indistinguishable here. What the drop-off reasons do show is that "setup too complex" and "couldn't connect DB" dominate — which points at setup rather than product quality.</p>`}
    </div></div>
  </div>`;
  const depSets=[];
  if(a.kpis.shN) depSets.push({label:'Self-hosted',data:[a.dep.sh.inst,a.dep.sh.conn,a.dep.sh.act],backgroundColor:'#D64542',borderRadius:3,maxBarThickness:26});
  if(a.kpis.saasN) depSets.push({label:'SaaS',data:[a.dep.saas.inst,a.dep.saas.conn,a.dep.saas.act],backgroundColor:'#12A374',borderRadius:3,maxBarThickness:26});
  mkChart('c-dep',{type:'bar',data:{labels:['Installed','Connected','Activated'],datasets:depSets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:11}}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+c.parsed.y+'%'}}},scales:{y:{max:100,ticks:{callback:v=>v+'%',font:{size:11},color:'#8B95A6'},grid:{color:'#EEF1F5'},border:{display:false}},x:{ticks:{font:{size:11},color:'#8B95A6'},grid:{display:false},border:{display:false}}}}});
}

// ---------------- Acquisition & CAC ----------------
function renderAcq(view,f){
  const a=cAcq(f);
  if(!a){ view.innerHTML='<div class="placeholder"><p class="n">Acquisition &amp; CAC</p><p>Loading data…</p></div>'; return; }
  if(!a.hasCampaign) ensureCampaign();
  const STG=['','Signed up','Installed','Connected','Activated','PQL','Opportunity','Closed Won'];
  const STGS=['','Sign','Inst','Conn','Act','PQL','Opp','Won'];
  const heat=(v,max)=>{ if(!v) return ''; const t=Math.min(v/(max||1),1);
    return `background:rgba(255,98,0,${(0.10+t*0.78).toFixed(2)});color:${t>0.45?'#fff':'var(--text)'};`; };

  function stageCells(o){
    const arr = acqJourney ? o.jr : o.now;
    const base = o.jr[1]||o.signups||1;
    const max = acqJourney ? base : Math.max(...arr.slice(1));
    let h='';
    for(let k=1;k<=7;k++){
      const v=arr[k]||0;
      const p=base?Math.round(v/base*100):0;
      h+=`<td class="stg${k===1?' stagehead':''}" style="${k>1?heat(v,max):''}">`
       + (v? `<span class="n">${v.toLocaleString()}</span>${k>1?`<span class="p">${p}%</span>`:''}` : '<span class="p">·</span>')
       + `</td>`;
    }
    h+=`<td class="ko">${(o.ko||0).toLocaleString()}</td>`;
    h+=`<td class="win" style="color:${o.cvr>=a.totals.cvr?'#12A374':'var(--text3)'}">${o.cvr.toFixed(1)}%</td>`;
    return h;
  }

  let head, rows='';
  if(acqMode==='stages'){
    head=`<tr><th>${acqRow==='adgroup'?'Ad group':'Source'}</th>`+
      STGS.slice(1).map((s,i)=>`<th class="num ctr${i===0?' stagehead':''}" title="${STG[i+1]}">${i+1}</th>`).join('')+
      `<th class="num ctr">KO</th><th class="num">Win%</th></tr>`;
  } else if(acqMode==='funnel'){
    head=`<tr><th>Source</th><th class="num">Signups</th><th class="num">Activated</th><th class="num">PQL</th><th class="num">Paid</th><th class="num">Late-stage</th><th class="num">Won ACV</th></tr>`;
  } else {
    head=`<tr><th>Source</th><th class="num">Spend</th><th class="num">Signups</th><th class="num">Conv. rate</th><th class="num">$/signup</th><th class="num">$/customer</th></tr>`;
  }

  const money=n2=>'$'+Math.round(n2).toLocaleString();
  const cells=(o,isAd)=> acqMode==='stages' ? stageCells(o)
    : acqMode==='funnel'
    ? `<td class="num">${o.signups.toLocaleString()}</td>
       <td class="num">${o.actR!=null?o.actR.toFixed(0)+'%':'—'}</td>
       <td class="num">${(o.pqlR!=null&&!isAd)?o.pqlR.toFixed(0)+'%':'—'}</td>
       <td class="num">${o.cvr.toFixed(1)}%</td>
       <td class="num">${!isAd?(o.late||0).toLocaleString():'—'}</td>
       <td class="num"><b>${!isAd&&o.wonAcv?usd(o.wonAcv):'—'}</b></td>`
    : `<td class="num">${money(o.spend)}</td>
       <td class="num">${o.signups.toLocaleString()}</td>
       <td class="num">${o.cvr.toFixed(1)}%</td>
       <td class="num">$${Math.round(o.cps)}</td>
       <td class="num"><b>${o.conv?money(o.cpa):'—'}</b></td>`;

  // FLAT ad-group listing when Stages + Ad groups is selected
  if(acqMode==='stages' && acqRow==='adgroup'){
    const flat=[];
    a.channels.forEach(c=>c.campaigns.forEach(cm=>cm.ad_groups.forEach(g=>
      flat.push({...g, cvr:g.cvr, campaign:cm.campaign, channel:c.channel}))));
    flat.sort((x,y)=>y.signups-x.signups).slice(0,25).forEach(g=>{
      rows+=`<tr><td><b>${g.name}</b><br><span class="p" style="font-size:10.5px;color:var(--text3)">${CH_LABELS[g.channel]||g.channel} · ${g.campaign}</span></td>${stageCells(g)}</tr>`;
    });
  } else {
    a.channels.forEach(c=>{
      const openC = acqOpen.ch===c.channel;
      rows+=`<tr class="clk" data-ch="${c.channel}"><td><span class="caret${openC?' open':''}">&#9656;</span><b>${CH_LABELS[c.channel]||c.channel}</b></td>${cells(c,false)}</tr>`;
      if(!openC) return;
      c.campaigns.forEach(cm=>{
        const openM = acqOpen.cmp===cm.campaign;
        rows+=`<tr class="clk lvl2" data-cmp="${cm.campaign}"><td><span class="caret${openM?' open':''}">&#9656;</span>${cm.campaign}</td>${cells(cm,false)}</tr>`;
        if(!openM) return;
        cm.ad_groups.forEach(g=>{ rows+=`<tr class="lvl3"><td>${g.name}</td>${cells(g,true)}</tr>`; });
      });
    });
  }

  // quality vs cost scatter-ish: activation rate by channel
  const byAct=[...a.channels].filter(c=>c.signups>=50).sort((x,y)=>y.actR-x.actR);
  const amax=Math.max(...byAct.map(c=>c.actR),1);
  const actRows=byAct.map(c=>`<div class="frow"><span class="fname" style="width:110px">${CH_LABELS[c.channel]||c.channel}</span><div class="ftrack"><div class="ffill" style="width:${Math.max(c.actR/amax*100,2)}%;background:${c.actR>=a.totals.actR?'#12A374':'#D64542'}"></div></div><span class="fnum">${c.actR.toFixed(0)}%</span></div>`).join('');

  const legend = acqMode==='stages'
    ? `<p class="note">1 Signed up · 2 Installed · 3 Connected · 4 Activated · 5 PQL · 6 Opportunity · 7 Closed Won · KO = lost.
       <b>Journey</b> counts every trial that <i>ever reached</i> a stage. <b>Now</b> counts where each trial <i>currently sits</i> — so Now sums to the total, Journey does not.
       Stages 6–7 only exist for <b>sales-assisted</b> deals: self-serve customers buy without an opportunity record ever being created, so they convert without appearing at stage 6 or 7. Win% therefore counts <i>all</i> paying customers, not just Closed Won.
       ${acqRow==='adgroup'?'Ad-group stages are allocated from the parent campaign by signup share — the ad-group ID is not stored on the trial record.':''}</p>`
    : (acqMode==='funnel'
      ? '<p class="note">Late-stage = opportunities at Proposal, Negotiation or Closed Won. PQL and pipeline are trial-level, so they are not broken out per ad group.</p>'
      : '');

  view.innerHTML=`
  <div class="grid-kpi">
    <div class="kpi"><p class="l">Marketing spend</p><p class="v sm">${usd(a.totals.spend)}</p><p class="s">selected slice</p></div>
    <div class="kpi"><p class="l">Signups</p><p class="v sm">${a.totals.signups.toLocaleString()}</p><p class="s">trials generated</p></div>
    <div class="kpi"><p class="l">Cost per signup</p><p class="v sm">$${a.totals.cps.toFixed(1)}</p><p class="s">spend ÷ signups</p></div>
    <div class="kpi"><p class="l">Cost per paid customer</p><p class="v" style="color:var(--sw)">${a.totals.conv?money(a.totals.cpa):'—'}</p><p class="s">the metric that matters</p></div>
  </div>
  <div class="panel" style="margin-top:12px">
    <div class="head">
      <h3>Paid &amp; organic reports${acqMode==='stages'&&acqRow!=='adgroup'?'<span class="pillw">click a row to drill down</span>':''}</h3>
      <span>
        <button class="tgl${acqMode==='stages'?' on':''}" data-mode="stages">Stages</button><button class="tgl${acqMode==='funnel'?' on':''}" data-mode="funnel">Funnel quality</button><button class="tgl${acqMode==='cost'?' on':''}" data-mode="cost">Cost</button>
      </span>
    </div>
    ${acqMode==='stages'?`<div style="display:flex;gap:8px;margin:-4px 0 14px;flex-wrap:wrap">
      <span><button class="tgl${!acqJourney?' on':''}" data-j="0">Now</button><button class="tgl${acqJourney?' on':''}" data-j="1">Journey</button></span>
      <span><button class="tgl${acqRow==='campaign'?' on':''}" data-r="campaign">Campaigns</button><button class="tgl${acqRow==='adgroup'?' on':''}" data-r="adgroup">Ad groups</button></span>
    </div>`:''}
    <table class="dtable"><thead>${head}</thead><tbody id="acq-body">${rows}</tbody></table>
    ${legend}
  </div>
  <div class="row2">
    <div class="panel"><div class="head"><h3>Activation rate by channel</h3><span>green = beats the ${a.totals.actR.toFixed(0)}% average</span></div>${actRows}</div>
    <div class="panel"><h3>Monthly spend &amp; cost per signup</h3><div class="chart-box"><canvas id="c-acq"></canvas></div></div>
  </div>
  <div class="insight">${bulb}
    <p><b>Volume at the top says nothing about revenue at the bottom.</b> Switch to <b>Journey</b> and follow a campaign across the stages — some pour in signups that die at stage 2, others carry a thin stream all the way to Closed Won. Judge acquisition on how far its trials <i>travel</i>, not how many arrive. Then move budget to the campaigns whose leads survive.</p></div>
  <p class="note">Stages, activation, PQL and pipeline come from trial records, so they respond to every filter. Spend is booked at campaign level and allocated to the filtered slice in proportion to signups.</p>`;

  const body=document.getElementById('acq-body');
  body.querySelectorAll('tr[data-ch]').forEach(tr=> tr.onclick=()=>{ const c=tr.dataset.ch; acqOpen={ch:acqOpen.ch===c?null:c,cmp:null}; render(); });
  body.querySelectorAll('tr[data-cmp]').forEach(tr=> tr.onclick=e=>{ e.stopPropagation(); const c=tr.dataset.cmp; acqOpen.cmp=acqOpen.cmp===c?null:c; render(); });
  view.querySelectorAll('.tgl').forEach(b=> b.onclick=()=>{
    if(b.dataset.mode) acqMode=b.dataset.mode;
    if(b.dataset.j!=null) acqJourney = b.dataset.j==='1';
    if(b.dataset.r) acqRow=b.dataset.r;
    render();
  });

  const lbl=a.trend.labels.map(fmtMonth);
  mkChart('c-acq',{data:{labels:lbl,datasets:[{type:'bar',label:'Spend',data:a.trend.spend,backgroundColor:'#FF6200',borderRadius:3,maxBarThickness:18,yAxisID:'y'},{type:'line',label:'$/signup',data:a.trend.cps,borderColor:'#232323',backgroundColor:'#232323',borderWidth:2,pointRadius:0,tension:.3,yAxisID:'y1'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:11}}}},scales:{y:{position:'left',ticks:{callback:v=>'$'+Math.round(v/1000)+'k',font:{size:10},color:'#8B95A6'},grid:{color:'#EEF1F5'},border:{display:false}},y1:{position:'right',min:0,ticks:{callback:v=>'$'+v,font:{size:10},color:'#8B95A6'},grid:{display:false},border:{display:false}},x:{ticks:{font:{size:9},color:'#8B95A6',maxRotation:0,autoSkip:true,maxTicksLimit:8},grid:{display:false},border:{display:false}}}}});
}

// ---------------- Engagement & nurture ----------------
function renderEng(view,f){
  if(!NURTURE) ensureNurture();
  const a=cEng(f);
  let nurtureHTML;
  if(a.nurture){
    nurtureHTML='<table class="dtable"><thead><tr><th>Email step</th><th class="num">Sent</th><th class="num">Open</th><th class="num">Click</th></tr></thead><tbody>'+a.nurture.map(s=>`<tr><td>${STEP_LABELS[s[0]]||s[0]}</td><td class="num">${s[1].toLocaleString()}</td><td class="num">${s[2].toFixed(1)}%</td><td class="num">${s[3].toFixed(1)}%</td></tr>`).join('')+'</tbody></table>';
  } else { nurtureHTML='<p class="note">Loading nurture data…</p>'; }
  const featRows=[['Wait-time analyses',a.features.wait],['Logins',a.features.logins],['Tuning advisors',a.features.tuning],['Anomaly alerts',a.features.alerts],['Reports',a.features.reports]];
  const fmax=Math.max(...featRows.map(r=>r[1]),1);
  const featHTML=featRows.map(([l,v])=>`<div class="frow"><span class="fname" style="width:130px">${l}</span><div class="ftrack"><div class="ffill" style="width:${Math.max(v/fmax*100,2)}%"></div></div><span class="fnum">${v}</span></div>`).join('');
  const R=cRet(f);
  const emailDays=Object.entries(R.emails);
  const aliveAtEnding = R.all[(R.emails.trial_ending||12)-1];

  view.innerHTML=`
  <div class="grid-kpi">
    <div class="kpi"><p class="l">Never returned</p><p class="v" style="color:var(--red)">${R.dead.toFixed(1)}%</p><p class="s">signed up, never logged in</p></div>
    <div class="kpi"><p class="l">Still active, day 14</p><p class="v sm">${R.all[13].toFixed(1)}%</p><p class="s">last day of trial</p></div>
    <div class="kpi"><p class="l">Alive when "trial ending" sends</p><p class="v" style="color:var(--red)">${aliveAtEnding.toFixed(1)}%</p><p class="s">day ${R.emails.trial_ending||12}</p></div>
    <div class="kpi"><p class="l">Avg engagement score</p><p class="v" style="color:var(--sw)">${a.kpis.eng.toFixed(1)}</p><p class="s">0–100, all trials</p></div>
    <div class="kpi"><p class="l">Email open rate</p><p class="v sm">${a.kpis.open==null?'…':a.kpis.open.toFixed(1)+'%'}</p><p class="s">across nurture</p></div>
  </div>
  <div class="panel" style="margin-top:12px">
    <div class="head"><h3>Trial engagement over the 14-day window<span class="pillw">who is still awake?</span></h3><span>% of trials active each day · dashed lines = nurture emails</span></div>
    <div class="chart-box" style="height:260px"><canvas id="c-ret"></canvas></div>
  </div>
  <div class="insight">${bulb}
    <p><b>The nurture is talking to an empty room.</b> ${R.dead.toFixed(0)}% of trials never log in at all after signing up, and by day ${R.emails.trial_ending||12} — when the "trial ending" email fires — only <b>${aliveAtEnding.toFixed(0)}%</b> are still active. Open rate hides this: opening an email is not the same as returning to the product. The trial runs 14 days, but self-hosted setup depends on IT approval cycles measured in weeks. <b>Front-load the help, or start the clock at first successful install rather than at signup.</b></p></div>
  <div class="row2">
    <div class="panel"><div class="head"><h3>Conversion by engagement score</h3><span>higher score → more likely to buy</span></div><div class="chart-box"><canvas id="c-eng"></canvas></div></div>
    <div class="panel"><div class="head"><h3>Nurture email performance</h3><span>by sequence step</span></div>${nurtureHTML}</div>
  </div>
  <div class="row2">
    <div class="panel"><div class="head"><h3>Feature usage (activated trials)</h3><span>avg per trial</span></div>${featHTML}</div>
    <div class="panel" style="display:flex;align-items:center"><div class="insight" style="margin:0">${bulb}
      <p><b>Engagement is the strongest buy signal.</b> Trials scoring 61–80 convert around 44% vs ~3% at the bottom — so the game is moving trials up the engagement curve. The extension-offer email earns the highest open rate, and trials that click any nurture email convert ${a.clickConv?('at '+a.clickConv[1].toFixed(0)+'% vs '+a.clickConv[0].toFixed(0)+'%'):'more'}. Lead with wait-time analysis as the activation "aha".</p></div></div>
  </div>`;
  const rl=Array.from({length:R.days},(_,i)=>'Day '+(i+1));
  mkChart('c-ret',{type:'line',data:{labels:rl,datasets:[
      {label:'Converted',data:R.conv,borderColor:'#12A374',backgroundColor:'#12A374',borderWidth:2,pointRadius:0,tension:.25},
      {label:'All trials',data:R.all,borderColor:'#FF6200',backgroundColor:'#FF6200',borderWidth:2.5,pointRadius:0,tension:.25},
      {label:'Did not convert',data:R.nonconv,borderColor:'#D64542',backgroundColor:'#D64542',borderWidth:2,borderDash:[4,3],pointRadius:0,tension:.25}
    ]},options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:11}}},
        tooltip:{callbacks:{label:c=>c.dataset.label+': '+c.parsed.y+'% active'}}},
      scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:11},color:'#8B95A6'},grid:{color:'#EEF1F5'},border:{display:false}},
        x:{ticks:{font:{size:10},color:'#8B95A6',maxRotation:0,autoSkip:false,callback:function(v,i){return (i+1)%2===0||i===0?'D'+(i+1):'';}},grid:{display:false},border:{display:false}}}},
    plugins:[{id:'mails',afterDatasetsDraw(ch){
      const {ctx,chartArea:{top,bottom},scales:{x}}=ch;
      emailDays.forEach(([name,d])=>{ if(d<1||d>R.days) return;
        const px=x.getPixelForValue(d-1);
        ctx.save(); ctx.strokeStyle='#8B95A6'; ctx.setLineDash([3,3]); ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(px,top); ctx.lineTo(px,bottom); ctx.stroke();
        ctx.setLineDash([]); ctx.fillStyle='#586475'; ctx.font='9px Inter'; ctx.textAlign='center';
        ctx.fillText((STEP_LABELS[name]||name).replace('Setup help','Setup'),px,top-3);
        ctx.restore(); });
    }}]});

  mkChart('c-eng',{type:'bar',data:{labels:a.buckets.map(b=>b[0]),datasets:[{data:a.buckets.map(b=>b[2]),backgroundColor:'#FF6200',borderRadius:3,maxBarThickness:34}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.y+'% convert · '+a.buckets[c.dataIndex][1].toLocaleString()+' trials'}}},scales:{y:{ticks:{callback:v=>v+'%',font:{size:11},color:'#8B95A6'},grid:{color:'#EEF1F5'},border:{display:false}},x:{title:{display:true,text:'engagement score',font:{size:10},color:'#8B95A6'},ticks:{font:{size:10},color:'#8B95A6'},grid:{display:false},border:{display:false}}}}});
}

// ---------------- Experiments ----------------
function renderExp(view,f){
  const a=cExp(f); const A=a.ab.A, B=a.ab.B;
  view.innerHTML=`
  <div class="grid-kpi">
    <div class="kpi"><p class="l">Variant A — feature-led</p><p class="v sm">${A.conv.toFixed(1)}%</p><p class="s">${A.n.toLocaleString()} trials · control</p></div>
    <div class="kpi"><p class="l">Variant B — benefit-led</p><p class="v" style="color:var(--sw)">${B.conv.toFixed(1)}%</p><p class="s">${B.n.toLocaleString()} trials · variant</p></div>
    <div class="kpi"><p class="l">Conversion lift</p><p class="v" style="color:var(--green)">${a.ab.lift>=0?'+':''}${a.ab.lift.toFixed(1)}%</p><p class="s">B over A</p></div>
    <div class="kpi"><p class="l">Trial extensions</p><p class="v sm">${a.ext.yes.toFixed(1)}%</p><p class="s">convert vs ${a.ext.no.toFixed(1)}% base</p></div>
  </div>
  <div class="row2">
    <div class="panel"><div class="head"><h3>Landing page A/B — B wins across the funnel</h3><span>A control · B variant</span></div><div class="chart-box"><canvas id="c-ab"></canvas></div></div>
    <div class="panel"><div class="head"><h3>Other conversion levers</h3><span>paid conversion rate</span></div>
      ${cmpPair([{lab:'No extension',val:a.ext.no,sub:'baseline',color:'#8B95A6'},{lab:'Trial extended',val:a.ext.yes,sub:a.ext.n_yes.toLocaleString()+' trials',color:'#FF6200'},{lab:'Self-serve',val:a.sales.self,sub:'no sales touch',color:'#8B95A6'},{lab:'Sales-assisted',val:a.sales.assisted,sub:a.sales.n_assisted.toLocaleString()+' trials',color:'#12A374'}])}
    </div>
  </div>
  <div class="insight">${bulb}
    <p><b>Roadmap signal.</b> The benefit-led page (B) lifts conversion ${a.ab.lift>=0?'+':''}${a.ab.lift.toFixed(0)}% and also improves activation and PQL rate, so the win compounds up-funnel. Trial extensions and sales assist both lift conversion for high-intent trials — strong candidates to formalize into the experimentation roadmap with proper significance testing.</p></div>`;
  mkChart('c-ab',{type:'bar',data:{labels:['Activation','PQL','Conversion'],datasets:[{label:'A — feature-led',data:[A.act,A.pql,A.conv],backgroundColor:'#8B95A6',borderRadius:3,maxBarThickness:30},{label:'B — benefit-led',data:[B.act,B.pql,B.conv],backgroundColor:'#FF6200',borderRadius:3,maxBarThickness:30}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:11}}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+c.parsed.y+'%'}}},scales:{y:{ticks:{callback:v=>v+'%',font:{size:11},color:'#8B95A6'},grid:{color:'#EEF1F5'},border:{display:false}},x:{ticks:{font:{size:11},color:'#8B95A6'},grid:{display:false},border:{display:false}}}}});
}

// ---------------- Pipeline ----------------
function renderPipe(view,f){
  const a=cPipe(f);
  const stMax=Math.max(...a.stages.map(s=>s[1]),1);
  const stColors={'Closed Won':'#12A374','Closed Lost':'#D64542'};
  const stRows=a.stages.map(s=>`<div class="frow"><span class="fname" style="width:96px">${s[0]}</span><div class="ftrack"><div class="ffill" style="width:${Math.max(s[1]/stMax*100,2)}%;background:${stColors[s[0]]||'#FF6200'}"></div></div><span class="fnum">${s[1].toLocaleString()}</span></div>`).join('');
  const prodRows=a.byprod.map(p=>`<tr><td>${p[0]}</td><td class="num">${p[1].toLocaleString()}</td><td class="num">${usd(p[2])}</td></tr>`).join('');
  const wrMax=Math.max(...a.winregion.map(w=>w[1]),1);
  const wrRows=a.winregion.map(w=>`<div class="frow"><span class="fname">${w[0]}</span><div class="ftrack"><div class="ffill" style="width:${Math.max(w[1]/wrMax*100,2)}%"></div></div><span class="fnum">${w[1].toFixed(1)}%</span></div>`).join('');
  view.innerHTML=`
  <div class="grid-kpi">
    <div class="kpi"><p class="l">Open opportunities</p><p class="v sm">${a.kpis.open.toLocaleString()}</p><p class="s">still in pipeline</p></div>
    <div class="kpi"><p class="l">Win rate</p><p class="v" style="color:var(--sw)">${a.kpis.winrate.toFixed(1)}%</p><p class="s">of closed opps</p></div>
    <div class="kpi"><p class="l">Avg ACV (won)</p><p class="v sm">${usd(a.kpis.avg_acv)}</p><p class="s">per closed-won deal</p></div>
    <div class="kpi"><p class="l">Won ACV</p><p class="v sm">${usd(a.kpis.pipeline_acv)}</p><p class="s">total booked</p></div>
  </div>
  <div class="row2">
    <div class="panel"><div class="head"><h3>Sales-assisted pipeline by stage</h3><span>green won · red lost</span></div>${stRows}</div>
    <div class="panel"><div class="head"><h3>Won ACV by product</h3><span>closed-won</span></div>
      <table class="dtable"><thead><tr><th>Product</th><th class="num">Deals</th><th class="num">ACV</th></tr></thead><tbody>${prodRows}</tbody></table>
      <div class="head" style="margin:18px 0 12px"><h3>Win rate by region</h3></div>${wrRows}</div>
  </div>
  <div class="insight">${bulb}
    <p><b>Where sales assist pays off.</b> Sales-touched opportunities win ${a.kpis.winrate.toFixed(0)}% of the time at ${usd(a.kpis.avg_acv)} average ACV. Enterprise-heavy products carry the biggest booked ACV, so prioritize timely SDR follow-up on their PQLs. Define the PQL→opportunity handoff so high-intent trials reach sales while the evaluation is still warm.</p></div>
  <p class="note">Pipeline responds to the Product and Region filters; Deployment doesn't apply to CRM opportunities.</p>`;
}

// ---------------- Insights & recommendations ----------------
function cInsights(f){
  if(!HAVE()) return null;
  const F=filt(f), n=F.length||1;
  const won=F.filter(r=>r.converted);
  const ACV = won.length ? mean(won.map(r=>+r.acv_usd||0)) : 9729;
  const money = x => x>=1e6 ? '$'+(x/1e6).toFixed(1)+'M' : '$'+Math.round(x/1e3)+'K';

  const base=TRIALS.filter(r=>(f.product==='all'||r.product===f.product)&&(f.region==='all'||r.region===f.region));
  const sh=base.filter(r=>r.deployment_type==='self_hosted'), sa=base.filter(r=>r.deployment_type==='saas');
  const shAct=mean(sh.map(r=>r.activated?1:0)), saAct=mean(sa.map(r=>r.activated?1:0));
  const shActive=sh.filter(r=>r.activated);
  const convIfAct = shActive.length ? mean(shActive.map(r=>r.converted?1:0)) : 0;
  const gap = saAct-shAct;
  // only valid if the slice actually contains both deployment types to compare
  const cmpOK = sh.length>=30 && sa.length>=30 && gap>0;
  const addAct = cmpOK ? sh.length*gap*0.5 : 0;
  const addCust1 = addAct*convIfAct;

  // engagement
  const es = r=>+PUMAP[r.trial_id]?.engagement_score;
  const low=F.filter(r=>es(r)<=20), mid=F.filter(r=>es(r)>20&&es(r)<=40);
  const lowC=low.length?mean(low.map(r=>r.converted?1:0)):0, midC=mid.length?mean(mid.map(r=>r.converted?1:0)):0;
  const addCust2 = Math.max(low.length*0.10*(midC-lowC),0);

  // landing page
  const A=F.filter(r=>r.landing_variant==='A'), B=F.filter(r=>r.landing_variant==='B');
  const aC=A.length?mean(A.map(r=>r.converted?1:0)):0, bC=B.length?mean(B.map(r=>r.converted?1:0)):0;
  const addCust3 = Math.max(A.length*(bC-aC),0);
  const lift = aC ? (bC-aC)/aC*100 : 0;

  // sales assist among PQLs — selection effect check
  const pql=F.filter(r=>r.is_pql);
  const pqlS=pql.filter(r=>r.sales_assisted), pqlN=pql.filter(r=>!r.sales_assisted);
  const pqlSc=pqlS.length?mean(pqlS.map(r=>r.converted?1:0))*100:0;
  const pqlNc=pqlN.length?mean(pqlN.map(r=>r.converted?1:0))*100:0;
  const naiveS=mean(F.filter(r=>r.sales_assisted).map(r=>r.converted?1:0))*100;
  const naiveN=mean(F.filter(r=>!r.sales_assisted).map(r=>r.converted?1:0))*100;

  // acquisition waste — worst cost per customer
  const acq=cAcq(f);
  let worst=null, best=null;
  if(acq && acq.channels.length){
    const withConv=acq.channels.filter(c=>c.conv>=5);
    if(withConv.length){
      const s=[...withConv].sort((x,y)=>x.cpa-y.cpa);
      best=s[0]; worst=s[s.length-1];
    }
  }
  const waste = worst && best ? worst.spend*(1-best.cpa/worst.cpa) : 0;

  const reasons={};
  F.filter(r=>!r.converted&&r.non_conversion_reason).forEach(r=>reasons[r.non_conversion_reason]=(reasons[r.non_conversion_reason]||0)+1);
  const setupReasons=(reasons['setup_too_complex']||0)+(reasons['couldnt_connect_db']||0);

  return {n,ACV,money,
    conv:mean(F.map(r=>r.converted?1:0))*100, act:mean(F.map(r=>r.activated?1:0))*100,
    shAct:shAct*100, saAct:saAct*100, gap:gap*100, convIfAct:convIfAct*100, cmpOK,
    addCust1, addAct, setupReasons,
    lowN:low.length, lowC:lowC*100, midC:midC*100, addCust2,
    aC:aC*100, bC:bC*100, lift, addCust3, aN:A.length,
    pqlSc, pqlNc, naiveS, naiveN, pqlN:pqlN.length,
    worst, best, waste};
}

function renderInsights(view,f){
  const a=cInsights(f);
  if(!a){ view.innerHTML='<div class="placeholder"><p class="n">Insights</p><p>Loading data…</p></div>'; return; }
  const M=a.money, num=x=>Math.round(x).toLocaleString();
  const CH=c=>CH_LABELS[c]||c;

  const cards=[];

  if(a.cmpOK) cards.push({r:1,t:'Setup friction is the single biggest leak',tags:[['High impact','hi'],['Product + Lifecycle','']],
    ev:`Self-hosted trials activate at <b>${a.shAct.toFixed(1)}%</b> vs <b>${a.saAct.toFixed(1)}%</b> for SaaS — a <b>${a.gap.toFixed(0)}-point gap</b> that opens at install and DB-connect, not at pricing. Crucially, self-hosted trials that <i>do</i> activate convert at <b>${a.convIfAct.toFixed(1)}%</b>. The demand is real; the onboarding is what's failing. <b>${num(a.setupReasons)}</b> non-converters cite setup complexity or a failed DB connection.`,
    acts:['Ship a guided setup wizard with a connection health-check and pre-flight requirements check.',
          'Trigger a self-hosted-only "stuck at install" email + in-app nudge at the 24h no-connect mark.',
          'Offer a one-click hosted sandbox so evaluation can start before infrastructure is ready.',
          'Instrument install → connect → first-analysis as a tracked funnel with alerting on drop.'],
    imp:[[M(a.addCust1*a.ACV),'ACV opportunity'],['+'+num(a.addCust1),'new customers'],['+'+num(a.addAct),'activations'],['Closing half the gap','assumption']]});

  cards.push({r:cards.length+1,t:'Engagement predicts revenue — so engineer engagement',tags:[['High impact','hi'],['Lifecycle','']],
    ev:`Conversion climbs from <b>${a.lowC.toFixed(1)}%</b> at the bottom of the engagement curve to <b>${a.midC.toFixed(1)}%</b> in the next band and beyond 40% at the top. <b>${num(a.lowN)}</b> trials are parked in the lowest band — that is the pool to move. Wait-time analysis is the most-used feature among activated trials and is the clearest "aha" to drive people toward.`,
    acts:['Define activation as "first wait-time analysis run", not "logged in", and drive the whole onboarding to it.',
          'Build an engagement score threshold that triggers lifecycle intervention before the trial goes cold.',
          'Sequence feature nurture toward the aha: wait-time analysis first, tuning advisors second.'],
    imp:[[M(a.addCust2*a.ACV),'ACV opportunity'],['+'+num(a.addCust2),'new customers'],['10% of low band','assumption']]});

  if(a.addCust3>0) cards.push({r:cards.length+1,t:'Roll out the benefit-led landing page',tags:[['Quick win','lo'],['Growth marketing','']],
    ev:`Variant B (benefit-led) converts at <b>${a.bC.toFixed(1)}%</b> vs <b>${a.aC.toFixed(1)}%</b> for the feature-led control — a <b>+${a.lift.toFixed(0)}%</b> relative lift. The win isn't only at the bottom: B also improves activation and PQL rate, so the gain compounds up-funnel rather than just shifting who signs up.`,
    acts:['Ship B to 100% of traffic and retire A.',
          'Confirm significance and check the lift holds by segment before declaring it a win.',
          'Apply the benefit-led framing to paid search ad copy and the trial signup flow.'],
    imp:[[M(a.addCust3*a.ACV),'ACV opportunity'],['+'+num(a.addCust3),'new customers'],['Low','effort']]});

  if(a.worst && a.best && a.worst.channel!==a.best.channel) cards.push({r:cards.length+1,t:'Reallocate paid spend on cost per customer, not cost per signup',tags:[['Medium impact','md'],['Growth marketing','']],
    ev:`<b>${CH(a.best.channel)}</b> buys a paying customer for <b>$${num(a.best.cpa)}</b>. <b>${CH(a.worst.channel)}</b> pays <b>$${num(a.worst.cpa)}</b> for the same outcome while spending <b>${M(a.worst.spend)}</b>. Cheap signups are not cheap customers — the gap only shows up once you follow the trial through to paid. Drill into the ad-group level and the spread widens again inside a single campaign.`,
    acts:['Re-target paid budgets against cost per paid customer as the primary bidding metric.',
          'Cut the bottom-quartile ad groups and reinvest into the ones that convert.',
          'Pipe activation and conversion events back into the ad platforms so bidding optimises on revenue, not signups.'],
    imp:[[M(a.waste),'reallocatable spend'],['$'+num(a.worst.cpa)+' → $'+num(a.best.cpa),'cost per customer'],['Medium','effort']]});

  cards.push({r:cards.length+1,t:'Careful: sales-assist is a selection effect, not a lever',tags:[['Caveat','']],warn:true,
    ev:`Headline numbers say sales-assisted trials convert at <b>${a.naiveS.toFixed(1)}%</b> vs <b>${a.naiveN.toFixed(1)}%</b> self-serve — a tempting case for more reps. But hold intent constant and it collapses: <b>among PQLs</b>, sales-assisted converts at <b>${a.pqlSc.toFixed(1)}%</b> vs <b>${a.pqlNc.toFixed(1)}%</b> without a rep. Reps are being routed to trials that were already going to buy. The gap measures routing, not persuasion.`,
    acts:['Don\'t scale headcount on this number — the causal read is unproven.',
          'Run a proper holdout: randomly withhold sales touch from a slice of PQLs and measure the true incremental lift.',
          'Until then, spend the coverage on the ' + num(a.pqlN) + ' PQLs with no touch at all, and measure.'],
    imp:[[a.pqlSc.toFixed(1)+'% vs '+a.pqlNc.toFixed(1)+'%','PQL conv, assisted vs not'],['~0','proven incremental lift'],['Test first','recommendation']]});

  const total = (a.addCust1 + a.addCust2 + a.addCust3) * a.ACV;
  const recap = a.cmpOK
    ? `The conversion problem is not a <i>selling</i> problem — it is an <i>onboarding</i> problem. Trials that reach first value convert at healthy rates; the majority never get there, and the drop happens at install and database connection, concentrated in self-hosted deployments. Fixing setup, then engineering engagement, is worth roughly <b>${M(total)}</b> in annual contract value before a single extra dollar of ad spend.`
    : `This slice contains only one deployment type, so the self-hosted vs SaaS setup comparison is switched off here — clear the Deployment filter to see it. Within this slice the levers that still apply are engagement and the landing-page rollout, worth roughly <b>${M(total)}</b> in annual contract value.`;

  view.innerHTML = `
  <div class="recap">
    <h3>What the data says</h3>
    <p>Across <b>${num(a.n)}</b> trials in this slice, <b>${a.act.toFixed(1)}%</b> activate and <b>${a.conv.toFixed(1)}%</b> convert to paid. ${recap}</p>
  </div>
  ${cards.map(c=>`
  <div class="ins">
    <div class="top">
      <div class="rank${c.warn?' warn':''}">${c.warn?'!':c.r}</div>
      <h4>${c.t}</h4>
      <div class="tags">${c.tags.map(t=>`<span class="tag ${t[1]}">${t[0]}</span>`).join('')}</div>
    </div>
    <p class="ev">${c.ev}</p>
    <ul class="acts">${c.acts.map(x=>`<li>${x}</li>`).join('')}</ul>
    <div class="impact">${c.imp.map(i=>`<div><p class="n">${i[0]}</p><p class="c">${i[1]}</p></div>`).join('')}</div>
  </div>`).join('')}
  <p class="note">Impact figures are directional sizings, computed live from the filtered dataset at an average won ACV of $${num(a.ACV)}. They size the prize to prioritise work — they are not forecasts, and each assumes the stated capture rate.</p>`;
}

// ---------------- router ----------------
function render(){
  clearCharts();
  const view=document.getElementById('view');
  const f={product:val('f-product'),region:val('f-region'),deployment:val('f-deployment')};
  try{
    if(active==='Overview') return renderOverview(view,f);
    if(active==='Activation funnel') return renderActivation(view,f);
    if(active==='Acquisition & CAC') return renderAcq(view,f);
    if(active==='Engagement & nurture') return renderEng(view,f);
    if(active==='Experiments') return renderExp(view,f);
    if(active==='Pipeline') return renderPipe(view,f);
    if(active==='Insights') return renderInsights(view,f);
  }catch(e){
    console.error(e);
    view.innerHTML=`<div class="placeholder"><p class="n">${active}</p><p>Something went wrong rendering this view. Check the console.</p></div>`;
  }
}

function buildTabs(){
  const t=document.getElementById('tabs');
  t.innerHTML=VIEWS.map(v=>`<button class="tab${v===active?' active':''}" data-v="${v}">${v}</button>`).join('');
  t.querySelectorAll('.tab').forEach(b=> b.onclick=()=>{ active=b.dataset.v; buildTabs(); render(); });
}

function setSource(){
  const dot=document.getElementById('src-dot'), txt=document.getElementById('src-text');
  if(SOURCE==='live'){ dot.className='dot live'; txt.textContent='Live · Supabase'; }
  else if(SOURCE==='snapshot'){ dot.className='dot live'; txt.textContent='Snapshot · full dataset'; }
  else{ dot.className='dot sample'; txt.textContent='Sample data'; 
    ['f-product','f-region','f-deployment'].forEach(id=>document.getElementById(id).disabled=true); }
}

['f-product','f-region','f-deployment'].forEach(id=>document.getElementById(id).addEventListener('change', render));

(async function init(){
  buildTabs();
  if(await loadLive())          SOURCE='live';
  else if(await loadSnapshot()) SOURCE='snapshot';
  else                          SOURCE='sample';
  setSource();
  render();
})();
</script>
