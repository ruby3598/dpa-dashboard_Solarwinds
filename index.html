<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SolarWinds DPA — Trial Conversion Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --sw:#FF6200; --swk:#C24A00; --sw-tint:rgba(255,98,0,.09); --char:#232323;
    --bg:#F6F7F9; --card:#FFFFFF; --line:#E7EBF1; --line2:#DCE1E9;
    --text:#191C22; --text2:#586475; --text3:#8B95A6; --red:#D64542; --green:#12A374;
    --font:'Inter',system-ui,sans-serif; --disp:'Space Grotesk',var(--font);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1180px;margin:0 auto;padding:0 20px;}

  header.top{background:var(--char);color:#fff;}
  .top-in{display:flex;align-items:center;justify-content:space-between;gap:16px;height:56px;}
  .brand{display:flex;align-items:center;gap:9px;font-family:var(--disp);font-weight:600;font-size:16px;white-space:nowrap;}
  .brand .sub{color:#B9B9B9;font-weight:400;font-size:14px;}
  .tabs{display:flex;gap:2px;overflow-x:auto;}
  .tab{font-size:13px;color:#C6C6C6;padding:7px 12px;border-radius:8px;cursor:pointer;white-space:nowrap;border:0;background:transparent;font-family:var(--font);}
  .tab:hover{color:#fff;background:rgba(255,255,255,.06);}
  .tab.active{color:#fff;background:var(--sw);}

  .filterbar{background:var(--card);border-bottom:1px solid var(--line);}
  .filter-in{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:11px 0;}
  .filter-in label{font-size:12px;color:var(--text2);margin-right:-6px;}
  select{font-family:var(--font);font-size:13px;color:var(--text);background:var(--card);border:1px solid var(--line2);border-radius:8px;padding:6px 10px;cursor:pointer;}
  select:disabled{opacity:.5;cursor:not-allowed;}
  .src{margin-left:auto;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:7px;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--text3);}
  .dot.live{background:var(--green);} .dot.sample{background:var(--sw);}

  main{padding:20px 0 44px;}
  .grid-kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 17px;}
  .kpi .l{font-size:12.5px;color:var(--text2);margin:0;}
  .kpi .v{font-size:28px;font-weight:600;font-family:var(--disp);margin:7px 0 2px;line-height:1;}
  .kpi .s{font-size:11.5px;color:var(--text3);margin:0;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:17px;}
  .panel h3{font-size:13.5px;font-weight:600;margin:0 0 15px;font-family:var(--font);}
  .panel .head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:15px;}
  .panel .head h3{margin:0;}
  .panel .head span{font-size:12px;color:var(--text2);}
  .frow{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
  .frow:last-child{margin-bottom:0;}
  .fname{width:76px;font-size:12px;flex-shrink:0;color:var(--text2);}
  .ftrack{flex:1;height:24px;background:#F1F3F6;border-radius:6px;overflow:hidden;}
  .ffill{height:100%;background:var(--sw);border-radius:6px;transition:width .5s ease;}
  .fnum{width:54px;text-align:right;font-size:12px;font-weight:600;flex-shrink:0;}
  .insight{background:var(--sw-tint);border:1px solid rgba(255,98,0,.3);border-radius:14px;padding:14px 16px;margin-top:12px;display:flex;gap:11px;align-items:flex-start;}
  .insight svg{flex-shrink:0;margin-top:1px;}
  .insight p{font-size:13.5px;margin:0;line-height:1.5;}
  .chart-box{position:relative;height:210px;}
  .placeholder{background:var(--card);border:1px dashed var(--line2);border-radius:14px;padding:56px 24px;text-align:center;color:var(--text2);}
  .placeholder .n{font-family:var(--disp);font-weight:600;font-size:19px;color:var(--text);margin:0 0 8px;}
  .foot{text-align:center;font-size:12px;color:var(--text3);padding:8px 0 0;}
  @media(max-width:760px){ .row2{grid-template-columns:1fr;} .brand .sub{display:none;} }
</style>
</head>
<body>

<header class="top">
  <div class="wrap top-in">
    <div class="brand">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#FF6200" aria-hidden="true"><circle cx="12" cy="12" r="4.2"/><g stroke="#FF6200" stroke-width="2" stroke-linecap="round"><line x1="12" y1="1.5" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22.5"/><line x1="1.5" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22.5" y2="12"/><line x1="4.5" y1="4.5" x2="7" y2="7"/><line x1="17" y1="17" x2="19.5" y2="19.5"/><line x1="19.5" y1="4.5" x2="17" y2="7"/><line x1="7" y1="17" x2="4.5" y2="19.5"/></g></svg>
      SolarWinds <span class="sub">· DPA trial conversion</span>
    </div>
    <nav class="tabs" id="tabs"></nav>
  </div>
</header>

<div class="filterbar">
  <div class="wrap filter-in">
    <label>Product</label>
    <select id="f-product"><option value="all">All</option><option>DPA</option><option>SQL Sentry</option><option>DPM</option></select>
    <label>Region</label>
    <select id="f-region"><option value="all">All</option><option>NAM</option><option>EMEA</option><option>APAC</option><option>LATAM</option></select>
    <label>Deployment</label>
    <select id="f-deployment"><option value="all">All</option><option value="self_hosted">Self-hosted</option><option value="saas">SaaS</option></select>
    <span class="src"><span class="dot" id="src-dot"></span><span id="src-text">Loading…</span></span>
  </div>
</div>

<main class="wrap"><div id="view"></div>
  <p class="foot">SolarWinds DPA · synthetic demo data · trial-conversion dashboard</p>
</main>

<script type="module">
// ======================= CONFIG =======================
// Paste your Supabase project URL + anon (public) key to go live.
// Leave blank to run on the built-in sample numbers.
const SUPABASE_URL = "";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2dHRhZmF3and2aXhhbGJlbmllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MTM0MTksImV4cCI6MjA5OTI4OTQxOX0.j3mk-7idE3iZxeV_wVo3VK9WrlqwFFdR370HCeas_zc";
// ======================================================

const FALLBACK = {"kpis":{"conversion":19.0,"trial_duration":11,"cac":49,"abandonment":55.5,"feature_adoption":80},"funnel":[["Signed up",10000],["Installed",6910],["Connected",5073],["Activated",4447],["PQL",2465],["Paid",1904]],"trend":{"labels":["Jan '25","Feb '25","Mar '25","Apr '25","May '25","Jun '25","Jul '25","Aug '25","Sep '25","Oct '25","Nov '25","Dec '25","Jan '26","Feb '26","Mar '26","Apr '26","May '26","Jun '26"],"values":[18.8,19.3,16.4,18.1,21.8,19.2,18.8,19.1,19.9,18.5,19.1,18.1,19.8,20.9,19.0,17.8,20.2,16.4]}};

const VIEWS = ['Overview','Activation funnel','Acquisition & CAC','Engagement & nurture','Experiments','Pipeline'];
let TRIALS = null, PUMAP = null, LIVE = false, chart = null, active = 'Overview';

const mean = a => a.length ? a.reduce((x,y)=>x+y,0)/a.length : 0;
const median = a => { if(!a.length) return 0; const s=[...a].sort((x,y)=>x-y); const m=Math.floor(s.length/2); return s.length%2 ? s[m] : (s[m-1]+s[m])/2; };
const r1 = x => Math.round(x*10)/10;
const fmtMonth = ym => { const [y,m]=ym.split('-'); return new Date(y,+m-1,1).toLocaleString('en',{month:'short'})+" '"+y.slice(2); };

async function fetchAll(sb, table, cols){
  const page=1000; let from=0, out=[];
  while(true){
    const { data, error } = await sb.from(table).select(cols).range(from, from+page-1);
    if(error) throw error;
    out = out.concat(data);
    if(data.length < page) break;
    from += page;
  }
  return out;
}

async function loadData(){
  if(!SUPABASE_URL || !SUPABASE_ANON_KEY) return false;
  try{
    const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const [trials, pu] = await Promise.all([
      fetchAll(sb,'trials','trial_id,product,deployment_type,region,company_size,landing_variant,activated,is_pql,converted,signup_date,cac_usd,time_to_convert_days'),
      fetchAll(sb,'product_usage','trial_id,installed,db_connected,feature_adoption_rate')
    ]);
    TRIALS = trials; PUMAP = {};
    for(const p of pu) PUMAP[p.trial_id]=p;
    return true;
  }catch(e){ console.warn('Supabase load failed, using sample data:', e.message); return false; }
}

function compute(f){
  if(!LIVE || !TRIALS) return FALLBACK;
  const F = TRIALS.filter(r =>
    (f.product==='all'||r.product===f.product) &&
    (f.region==='all'||r.region===f.region) &&
    (f.deployment==='all'||r.deployment_type===f.deployment));
  const act = mean(F.map(r=>r.activated?1:0))*100;
  const ttc = F.filter(r=>r.converted && r.time_to_convert_days!=null).map(r=>+r.time_to_convert_days);
  const faVals = F.filter(r=>r.activated).map(r=> (PUMAP[r.trial_id]?.feature_adoption_rate ?? 0));
  const byM={};
  F.forEach(r=>{ if(!r.signup_date) return; const m=String(r.signup_date).slice(0,7); (byM[m]=byM[m]||[]).push(r.converted?1:0); });
  const ms=Object.keys(byM).sort();
  return {
    kpis:{
      conversion:r1(mean(F.map(r=>r.converted?1:0))*100),
      trial_duration:Math.round(median(ttc)),
      cac:Math.round(mean(F.map(r=>+r.cac_usd||0))),
      abandonment:r1(100-act),
      feature_adoption:Math.round(mean(faVals)*100)
    },
    funnel:[
      ['Signed up',F.length],
      ['Installed',F.filter(r=>PUMAP[r.trial_id]?.installed).length],
      ['Connected',F.filter(r=>PUMAP[r.trial_id]?.db_connected).length],
      ['Activated',F.filter(r=>r.activated).length],
      ['PQL',F.filter(r=>r.is_pql).length],
      ['Paid',F.filter(r=>r.converted).length]
    ],
    trend:{labels:ms.map(fmtMonth), values:ms.map(m=>r1(mean(byM[m])*100))}
  };
}

function overviewHTML(){
  return `
  <div class="grid-kpi">
    <div class="kpi"><p class="l">Trial-to-paid conversion</p><p class="v" id="k-conv" style="color:var(--sw)">–</p><p class="s">selected period</p></div>
    <div class="kpi"><p class="l">Avg trial duration</p><p class="v" id="k-dur">–</p><p class="s">median days to convert</p></div>
    <div class="kpi"><p class="l">Customer acq. cost</p><p class="v" id="k-cac">–</p><p class="s">avg per trial</p></div>
    <div class="kpi"><p class="l">Trial abandonment</p><p class="v" id="k-aband" style="color:var(--red)">–</p><p class="s">signed up, never activated</p></div>
    <div class="kpi"><p class="l">Feature adoption</p><p class="v" id="k-feat">–</p><p class="s">of activated trials</p></div>
  </div>
  <div class="row2">
    <div class="panel"><div class="head"><h3>Activation funnel</h3><span id="fn-note"></span></div><div id="funnel"></div></div>
    <div class="panel"><h3>Conversion by month</h3><div class="chart-box"><canvas id="trend"></canvas></div></div>
  </div>
  <div class="insight">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#C24A00" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1h6c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2z"/></svg>
    <p><b>Biggest recoverable leak:</b> self-hosted trials abandon at setup — filter Deployment to compare self-hosted vs SaaS activation. Priority levers: in-product setup guidance and a setup-help nurture sequence.</p>
  </div>`;
}

function render(){
  const view = document.getElementById('view');
  if(active !== 'Overview'){
    const idx = VIEWS.indexOf(active);
    view.innerHTML = `<div class="placeholder"><p class="n">View ${idx+1} — ${active}</p><p>In build — we're adding the dashboard views one by one.</p></div>`;
    if(chart){ chart.destroy(); chart=null; }
    return;
  }
  view.innerHTML = overviewHTML();
  const f = { product:val('f-product'), region:val('f-region'), deployment:val('f-deployment') };
  const a = compute(f);
  document.getElementById('k-conv').textContent = a.kpis.conversion.toFixed(1)+'%';
  document.getElementById('k-dur').textContent = a.kpis.trial_duration+' days';
  document.getElementById('k-cac').textContent = '$'+a.kpis.cac;
  document.getElementById('k-aband').textContent = a.kpis.abandonment.toFixed(1)+'%';
  document.getElementById('k-feat').textContent = a.kpis.feature_adoption+'%';
  const max = a.funnel[0][1] || 1;
  document.getElementById('funnel').innerHTML = a.funnel.map(([name,n])=>
    `<div class="frow"><span class="fname">${name}</span><div class="ftrack"><div class="ffill" style="width:${Math.max(n/max*100,1)}%"></div></div><span class="fnum">${n.toLocaleString()}</span></div>`).join('');
  const ctx = document.getElementById('trend');
  if(typeof Chart === 'undefined'){ return; }
  chart = new Chart(ctx, {
    type:'bar',
    data:{ labels:a.trend.labels, datasets:[{ data:a.trend.values, backgroundColor:'#FF6200', borderRadius:3, maxBarThickness:22 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>c.parsed.y+'% conversion'}}},
      scales:{ y:{ ticks:{callback:v=>v+'%', font:{size:11}, color:'#8B95A6'}, grid:{color:'#EEF1F5'}, border:{display:false} },
               x:{ ticks:{font:{size:10}, color:'#8B95A6', maxRotation:0, autoSkip:true, maxTicksLimit:8}, grid:{display:false}, border:{display:false} } } }
  });
}

const val = id => document.getElementById(id).value;

function buildTabs(){
  const t = document.getElementById('tabs');
  t.innerHTML = VIEWS.map(v=>`<button class="tab${v===active?' active':''}" data-v="${v}">${v}</button>`).join('');
  t.querySelectorAll('.tab').forEach(b=> b.onclick = ()=>{ active=b.dataset.v; buildTabs(); render(); });
}

function setSource(){
  const dot=document.getElementById('src-dot'), txt=document.getElementById('src-text');
  if(LIVE){ dot.className='dot live'; txt.textContent='Live · Supabase'; }
  else{ dot.className='dot sample'; txt.textContent='Sample data (add Supabase keys to go live)';
    ['f-product','f-region','f-deployment'].forEach(id=>document.getElementById(id).disabled=true); }
}

['f-product','f-region','f-deployment'].forEach(id=>document.getElementById(id).addEventListener('change', render));

(async function init(){
  buildTabs();
  LIVE = await loadData();
  setSource();
  render();
})();
</script>
</body>
</html>
