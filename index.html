<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SolarWinds DPA — Trial Conversion Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --sw:#FF6200; --swk:#C24A00; --sw-tint:rgba(255,98,0,.09); --char:#232323;
    --bg:#F6F7F9; --card:#FFFFFF; --line:#E7EBF1; --line2:#DCE1E9;
    --text:#191C22; --text2:#586475; --text3:#8B95A6; --red:#D64542; --green:#12A374;
    --font:'Inter',system-ui,sans-serif; --disp:'Space Grotesk',var(--font);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1180px;margin:0 auto;padding:0 20px;}

  header.top{background:var(--char);color:#fff;}
  .top-in{display:flex;align-items:center;justify-content:space-between;gap:16px;height:56px;}
  .brand{display:flex;align-items:center;gap:9px;font-family:var(--disp);font-weight:600;font-size:16px;white-space:nowrap;}
  .brand .sub{color:#B9B9B9;font-weight:400;font-size:14px;}
  .tabs{display:flex;gap:2px;overflow-x:auto;}
  .tab{font-size:13px;color:#C6C6C6;padding:7px 12px;border-radius:8px;cursor:pointer;white-space:nowrap;border:0;background:transparent;font-family:var(--font);}
  .tab:hover{color:#fff;background:rgba(255,255,255,.06);}
  .tab.active{color:#fff;background:var(--sw);}

  .filterbar{background:var(--card);border-bottom:1px solid var(--line);}
  .filter-in{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:11px 0;}
  .filter-in label{font-size:12px;color:var(--text2);margin-right:-6px;}
  select{font-family:var(--font);font-size:13px;color:var(--text);background:var(--card);border:1px solid var(--line2);border-radius:8px;padding:6px 10px;cursor:pointer;}
  select:disabled{opacity:.5;cursor:not-allowed;}
  .src{margin-left:auto;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:7px;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--text3);}
  .dot.live{background:var(--green);} .dot.sample{background:var(--sw);}

  main{padding:20px 0 44px;}
  .grid-kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 17px;}
  .kpi .l{font-size:12.5px;color:var(--text2);margin:0;}
  .kpi .v{font-size:28px;font-weight:600;font-family:var(--disp);margin:7px 0 2px;line-height:1;}
  .kpi .v.sm{font-size:23px;}
  .kpi .s{font-size:11.5px;color:var(--text3);margin:0;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:17px;}
  .panel h3{font-size:13.5px;font-weight:600;margin:0 0 15px;font-family:var(--font);}
  .panel .head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:15px;gap:10px;}
  .panel .head h3{margin:0;}
  .panel .head span{font-size:12px;color:var(--text2);text-align:right;}
  .frow{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
  .frow:last-child{margin-bottom:0;}
  .fname{width:76px;font-size:12px;flex-shrink:0;color:var(--text2);}
  .ftrack{flex:1;height:24px;background:#F1F3F6;border-radius:6px;overflow:hidden;}
  .ffill{height:100%;background:var(--sw);border-radius:6px;transition:width .5s ease;}
  .fnum{width:54px;text-align:right;font-size:12px;font-weight:600;flex-shrink:0;}
  .fstep{width:44px;text-align:right;font-size:11px;color:var(--text3);flex-shrink:0;}
  .insight{background:var(--sw-tint);border:1px solid rgba(255,98,0,.3);border-radius:14px;padding:14px 16px;margin-top:12px;display:flex;gap:11px;align-items:flex-start;}
  .insight svg{flex-shrink:0;margin-top:1px;}
  .insight p{font-size:13.5px;margin:0;line-height:1.5;}
  .chart-box{position:relative;height:210px;}
  .placeholder{background:var(--card);border:1px dashed var(--line2);border-radius:14px;padding:56px 24px;text-align:center;color:var(--text2);}
  .placeholder .n{font-family:var(--disp);font-weight:600;font-size:19px;color:var(--text);margin:0 0 8px;}
  .foot{text-align:center;font-size:12px;color:var(--text3);padding:8px 0 0;}
  .note{font-size:12px;color:var(--text3);margin:12px 2px 0;}
  .dtable{width:100%;border-collapse:collapse;font-size:12.5px;}
  .dtable th{text-align:left;color:var(--text2);font-weight:500;padding:7px 8px;border-bottom:1px solid var(--line);font-size:11px;text-transform:uppercase;letter-spacing:.03em;}
  .dtable td{padding:8px;border-bottom:1px solid var(--line);}
  .dtable td.num,.dtable th.num{text-align:right;font-variant-numeric:tabular-nums;}
  .dtable tr:last-child td{border-bottom:0;}
  .cmp{display:flex;flex-direction:column;gap:13px;}
  .cmp .lab{font-size:12px;color:var(--text2);margin-bottom:5px;display:flex;justify-content:space-between;}
  .cbar{height:26px;background:#F1F3F6;border-radius:6px;overflow:hidden;}
  .cbar .fill{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:9px;font-size:11.5px;font-weight:600;color:#fff;min-width:34px;transition:width .5s ease;}
  .dtable tr.clk{cursor:pointer;}
  .dtable tr.clk:hover{background:#FAFBFC;}
  .dtable tr.lvl2 td{background:#FBFCFD;padding-left:22px;}
  .dtable tr.lvl3 td{background:#F6F8FA;padding-left:40px;color:var(--text2);}
  .caret{display:inline-block;width:9px;margin-right:6px;color:var(--text3);transition:transform .15s;}
  .caret.open{transform:rotate(90deg);}
  .pillw{display:inline-block;font-size:10.5px;padding:2px 7px;border-radius:20px;background:#F1F3F6;color:var(--text2);margin-left:7px;}
  @media(max-width:760px){ .row2{grid-template-columns:1fr;} .brand .sub{display:none;} }
</style>
</head>

const VIEWS = ['Overview','Activation funnel','Acquisition & CAC','Engagement & nurture','Experiments','Pipeline'];
let TRIALS=null, PUMAP=null, CHANNEL=null, CAMPAIGN=null, CRM=null, NURTURE=null, SB=null;
let SOURCE='loading', active='Overview', charts=[], nurtureLoading=false;
let acqOpen={ch:null, cmp:null};
const HAVE = () => TRIALS && TRIALS.length;

const mean = a => a.length ? a.reduce((x,y)=>x+y,0)/a.length : 0;
const median = a => { if(!a.length) return 0; const s=[...a].sort((x,y)=>x-y); const m=Math.floor(s.length/2); return s.length%2 ? s[m] : (s[m-1]+s[m])/2; };
const r1 = x => Math.round(x*10)/10;
const pct = (a,b) => b ? a/b*100 : 0;
const usd = n => { n=+n||0; if(n>=1e6) return '$'+(n/1e6).toFixed(1)+'M'; if(n>=1e3) return '$'+Math.round(n/1e3)+'K'; return '$'+Math.round(n); };
const fmtMonth = ym => { const [y,m]=ym.split('-'); return new Date(y,+m-1,1).toLocaleString('en',{month:'short'})+" '"+y.slice(2); };
const val = id => document.getElementById(id).value;

const REASON_LABELS={no_response:'No response',setup_too_complex:'Setup too complex',price:'Price',couldnt_connect_db:"Couldn't connect DB",missing_db_platform:'Missing DB platform',chose_competitor:'Chose competitor',trial_expired:'Trial expired',budget_freeze:'Budget freeze'};
const CH_LABELS={paid_search:'Paid search',paid_social:'Paid social',events:'Events',channel_partner:'Channel partner',content:'Content',organic:'Organic',referral:'Referral',email:'Email',direct:'Direct'};
const STEP_LABELS={setup_help_1:'Setup help 1',setup_help_2:'Setup help 2',feature_spotlight:'Feature spotlight',trial_ending:'Trial ending',extension_offer:'Extension offer'};

async function fetchAll(sb, table, cols){
  const page=1000; let from=0, out=[];
  while(true){
    const { data, error } = await sb.from(table).select(cols).range(from, from+page-1);
    if(error) throw error;
    out = out.concat(data);
    if(data.length < page) break;
    from += page;
  }
  return out;
}

async function loadLive(){
  if(!SUPABASE_URL || !SUPABASE_ANON_KEY) return false;
  try{
    const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
    SB = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const [trials, pu, channel, crm] = await Promise.all([
      fetchAll(SB,'trials','trial_id,product,deployment_type,region,company_size,persona,acquisition_channel,campaign,landing_variant,activated,is_pql,sales_assisted,trial_extended,converted,signup_date,time_to_convert_days,non_conversion_reason,cac_usd'),
      fetchAll(SB,'product_usage','trial_id,installed,db_connected,time_to_activate_hrs,feature_adoption_rate,engagement_score,logins,wait_time_analyses_run,tuning_advisors_used,anomaly_alerts_configured,reports_generated'),
      fetchAll(SB,'channel_performance','month,channel,signups,conversions,spend_usd'),
      fetchAll(SB,'crm_opportunities','product,region,stage,won,acv_usd')
    ]);
    if(!trials.length) throw new Error('trials table is empty');
    // campaign_performance is optional — dashboard still works without it
    try{ CAMPAIGN = await fetchAll(SB,'campaign_performance','month,channel,campaign,ad_group,impressions,clicks,spend_usd,signups,activated,conversions'); }
    catch(e){ CAMPAIGN=null; console.warn('campaign_performance not found in Supabase — using snapshot for spend/ad-groups'); }
    TRIALS=trials; CHANNEL=channel; CRM=crm; PUMAP={};
    for(const p of pu) PUMAP[p.trial_id]=p;
    return true;
  }catch(e){ console.warn('Supabase unavailable:', e.message); return false; }
}

// Snapshot = the same rows, shipped with the site. Filters work identically offline.
async function loadSnapshot(){
  try{
    const res = await fetch('data.json', {cache:'no-cache'});
    if(!res.ok) throw new Error('data.json '+res.status);
    const S = await res.json();
    const D=S.dicts, T=S.trials, n=T.activated.length;
    const dec=(c,i)=> D[c] ? (D[c][T[c][i]] ?? null) : T[c][i];
    TRIALS=[]; PUMAP={};
    for(let i=0;i<n;i++){
      const id='T'+i;
      TRIALS.push({trial_id:id,product:dec('product',i),deployment_type:dec('deployment_type',i),region:dec('region',i),
        company_size:dec('company_size',i),persona:dec('persona',i),acquisition_channel:dec('acquisition_channel',i),
        campaign:dec('campaign',i),landing_variant:dec('landing_variant',i),non_conversion_reason:dec('non_conversion_reason',i),
        signup_date:dec('month',i)+'-01',activated:!!T.activated[i],is_pql:!!T.is_pql[i],converted:!!T.converted[i],
        sales_assisted:!!T.sales_assisted[i],trial_extended:!!T.trial_extended[i],
        cac_usd:T.cac_usd[i],time_to_convert_days:T.time_to_convert_days[i]});
      PUMAP[id]={trial_id:id,installed:!!T.installed[i],db_connected:!!T.db_connected[i],
        time_to_activate_hrs:T.time_to_activate_hrs[i],feature_adoption_rate:T.feature_adoption_rate[i],
        engagement_score:T.engagement_score[i],logins:T.logins[i],wait_time_analyses_run:T.wait_time_analyses_run[i],
        tuning_advisors_used:T.tuning_advisors_used[i],anomaly_alerts_configured:T.anomaly_alerts_configured[i],
        reports_generated:T.reports_generated[i]};
    }
    CHANNEL=S.channel.map(r=>({month:r[0],channel:r[1],signups:r[2],conversions:r[3],spend_usd:r[4]}));
    CAMPAIGN=S.campaign.map(r=>({month:r[0],channel:r[1],campaign:r[2],ad_group:r[3],impressions:r[4],clicks:r[5],spend_usd:r[6],signups:r[7],activated:r[8],conversions:r[9]}));
    CRM=S.crm.map(r=>({product:r[0],region:r[1],stage:r[2],won:!!r[3],acv_usd:r[4]}));
    const NS=S.nurture;
    NURTURE=NS.t.map((ti,i)=>({trial_id:'T'+ti,email_step:NS.steps[NS.s[i]],opened:!!(NS.f[i]&1),clicked:!!(NS.f[i]&2)}));
    return true;
  }catch(e){ console.error('snapshot failed:', e.message); return false; }
}

const filt = f => TRIALS.filter(r =>
  (f.product==='all'||r.product===f.product) &&
  (f.region==='all'||r.region===f.region) &&
  (f.deployment==='all'||r.deployment_type===f.deployment));

// ---------------- compute (Overview) ----------------
function compute(f){
  if(!HAVE()) return FB.overview;
  const F = filt(f);
  const act = mean(F.map(r=>r.activated?1:0))*100;
  const ttc = F.filter(r=>r.converted && r.time_to_convert_days!=null).map(r=>+r.time_to_convert_days);
  const faVals = F.filter(r=>r.activated).map(r=> (PUMAP[r.trial_id]?.feature_adoption_rate ?? 0));
  const byM={};
  F.forEach(r=>{ if(!r.signup_date) return; const m=String(r.signup_date).slice(0,7); (byM[m]=byM[m]||[]).push(r.converted?1:0); });
  const ms=Object.keys(byM).sort();
  return {
    kpis:{ conversion:r1(mean(F.map(r=>r.converted?1:0))*100), trial_duration:Math.round(median(ttc)), cac:Math.round(mean(F.map(r=>+r.cac_usd||0))), abandonment:r1(100-act), feature_adoption:Math.round(mean(faVals)*100) },
    funnel:[['Signed up',F.length],['Installed',F.filter(r=>PUMAP[r.trial_id]?.installed).length],['Connected',F.filter(r=>PUMAP[r.trial_id]?.db_connected).length],['Activated',F.filter(r=>r.activated).length],['PQL',F.filter(r=>r.is_pql).length],['Paid',F.filter(r=>r.converted).length]],
    trend:{labels:ms.map(fmtMonth), values:ms.map(m=>r1(mean(byM[m])*100))}
  };
}

// ---------------- compute (Activation) ----------------
function cActivation(f){
  if(!HAVE()) return FB.activation;
  const F=filt(f);
  const funnel=[['Signed up',F.length],['Installed',F.filter(r=>PUMAP[r.trial_id]?.installed).length],['Connected',F.filter(r=>PUMAP[r.trial_id]?.db_connected).length],['Activated',F.filter(r=>r.activated).length],['PQL',F.filter(r=>r.is_pql).length],['Paid',F.filter(r=>r.converted).length]];
  const tta=F.filter(r=>r.activated).map(r=>+PUMAP[r.trial_id]?.time_to_activate_hrs).filter(x=>x===x && x!=null);
  const base=TRIALS.filter(r=>(f.product==='all'||r.product===f.product)&&(f.region==='all'||r.region===f.region));
  const depRates=dt=>{ const d=base.filter(r=>r.deployment_type===dt); const n=d.length||1; return {inst:r1(pct(d.filter(r=>PUMAP[r.trial_id]?.installed).length,n)),conn:r1(pct(d.filter(r=>PUMAP[r.trial_id]?.db_connected).length,n)),act:r1(pct(d.filter(r=>r.activated).length,n))}; };
  const reasons={};
  F.filter(r=>!r.converted && r.non_conversion_reason).forEach(r=>reasons[r.non_conversion_reason]=(reasons[r.non_conversion_reason]||0)+1);
  return { funnel, kpis:{act:r1(pct(F.filter(r=>r.activated).length,F.length)),tta:Math.round(median(tta)),sh:depRates('self_hosted').act,saas:depRates('saas').act}, dep:{sh:depRates('self_hosted'),saas:depRates('saas')}, reasons:Object.entries(reasons).sort((a,b)=>b[1]-a[1]).slice(0,6) };
}

// ---------------- compute (Acquisition — drill-down) ----------------
// Signups / activation / conversion come from `trials`, so they respect every filter.
// Spend lives at campaign level, so it's allocated to the filtered slice by signup share.
function cAcq(f){
  if(!HAVE()) return null;
  const F=filt(f);
  const spendC={}, spendA={}, sigAllC={}, sigAllA={};
  (CAMPAIGN||[]).forEach(r=>{
    spendC[r.campaign]=(spendC[r.campaign]||0)+(+r.spend_usd||0);
    sigAllC[r.campaign]=(sigAllC[r.campaign]||0)+(+r.signups||0);
    const k=r.campaign+'||'+r.ad_group;
    spendA[k]=(spendA[k]||0)+(+r.spend_usd||0);
    sigAllA[k]=(sigAllA[k]||0)+(+r.signups||0);
  });
  // ad-group signup mix within each campaign (from campaign table)
  const agMix={};
  Object.keys(sigAllA).forEach(k=>{ const c=k.split('||')[0]; agMix[c]=agMix[c]||[]; agMix[c].push([k.split('||')[1], sigAllC[c]?sigAllA[k]/sigAllC[c]:0, spendA[k]]); });

  const byCmp={};
  F.forEach(r=>{ const c=r.campaign||'—'; const o=byCmp[c]=byCmp[c]||{ch:r.acquisition_channel,s:0,a:0,cv:0};
    o.s++; if(r.activated)o.a++; if(r.converted)o.cv++; });

  const campaigns=Object.entries(byCmp).map(([c,o])=>{
    const share = sigAllC[c] ? Math.min(o.s/sigAllC[c],1) : 0;
    const spend = (spendC[c]||0)*share;
    const ags=(agMix[c]||[]).map(([name,mix,fullSpend])=>{
      const s=Math.round(o.s*mix), a=Math.round(o.a*mix), cv=Math.round(o.cv*mix);
      return {name,signups:s,act:a,conv:cv,spend:fullSpend*share,
        cps:s?fullSpend*share/s:0, cpa:cv?fullSpend*share/cv:0, cvr:pct(cv,s)};
    }).sort((x,y)=>y.spend-x.spend);
    return {campaign:c,channel:o.ch,signups:o.s,act:o.a,conv:o.cv,spend,
      cps:o.s?spend/o.s:0, cpa:o.cv?spend/o.cv:0, cvr:pct(o.cv,o.s), ad_groups:ags};
  });

  const byCh={};
  campaigns.forEach(c=>{ const o=byCh[c.channel]=byCh[c.channel]||{signups:0,act:0,conv:0,spend:0,camps:[]};
    o.signups+=c.signups; o.act+=c.act; o.conv+=c.conv; o.spend+=c.spend; o.camps.push(c); });
  const channels=Object.entries(byCh).map(([ch,o])=>({channel:ch,signups:o.signups,act:o.act,conv:o.conv,spend:o.spend,
    cps:o.signups?o.spend/o.signups:0, cpa:o.conv?o.spend/o.conv:0, cvr:pct(o.conv,o.signups),
    campaigns:o.camps.sort((x,y)=>y.spend-x.spend)})).sort((x,y)=>y.spend-x.spend);

  const totals={spend:channels.reduce((a,c)=>a+c.spend,0),signups:F.length,
    conv:F.filter(r=>r.converted).length};
  totals.cps=totals.signups?totals.spend/totals.signups:0;
  totals.cpa=totals.conv?totals.spend/totals.conv:0;

  const bm={};
  F.forEach(r=>{ const m=String(r.signup_date).slice(0,7); const o=bm[m]=bm[m]||{s:0}; o.s++; });
  const spendM={};
  (CAMPAIGN||[]).forEach(r=>{ const m=String(r.month).slice(0,7); spendM[m]=spendM[m]||{sp:0,sg:0}; spendM[m].sp+=+r.spend_usd||0; spendM[m].sg+=+r.signups||0; });
  const ms=Object.keys(bm).sort();
  const trend={labels:ms,
    spend:ms.map(m=>{ const g=spendM[m]; const share=g&&g.sg?Math.min(bm[m].s/g.sg,1):0; return (g?g.sp:0)*share; }),
    cps:ms.map(m=>{ const g=spendM[m]; const share=g&&g.sg?Math.min(bm[m].s/g.sg,1):0; const sp=(g?g.sp:0)*share; return r1(bm[m].s?sp/bm[m].s:0); })};
  return {totals,channels,trend,hasCampaign:!!(CAMPAIGN&&CAMPAIGN.length)};
}

// ---------------- compute (Engagement) ----------------
function cEng(f){
  if(!HAVE()) return FB.engagement;
  const F=filt(f);
  const eng=F.map(r=>+PUMAP[r.trial_id]?.engagement_score).filter(x=>x===x);
  const actd=F.filter(r=>r.activated);
  const B=[['0',-1,0],['1-20',0,20],['21-40',20,40],['41-60',40,60],['61-80',60,80],['81-100',80,100]];
  const buckets=B.map(([lab,lo,hi])=>{ const d=F.filter(r=>{const s=+PUMAP[r.trial_id]?.engagement_score; return s>lo&&s<=hi;}); return [lab,d.length,r1(pct(d.filter(r=>r.converted).length,d.length))]; });
  const feat=k=> r1(mean(actd.map(r=>+PUMAP[r.trial_id]?.[k]||0)));
  const features={adoption:r1(mean(actd.map(r=>+PUMAP[r.trial_id]?.feature_adoption_rate||0))*100),logins:feat('logins'),wait:feat('wait_time_analyses_run'),tuning:feat('tuning_advisors_used'),alerts:feat('anomaly_alerts_configured'),reports:feat('reports_generated')};
  let nurture=null, clickConv=null, open=null, click=null;
  if(NURTURE){
    const ids=new Set(F.map(r=>r.trial_id));
    const rel=NURTURE.filter(e=>ids.has(e.trial_id));
    const order=['setup_help_1','setup_help_2','feature_spotlight','trial_ending','extension_offer'];
    const bs={}; rel.forEach(e=>{const o=bs[e.email_step]=bs[e.email_step]||{s:0,o:0,c:0}; o.s++; if(e.opened)o.o++; if(e.clicked)o.c++;});
    nurture=order.filter(s=>bs[s]).map(s=>[s,bs[s].s,r1(pct(bs[s].o,bs[s].s)),r1(pct(bs[s].c,bs[s].s))]);
    open=r1(pct(rel.filter(e=>e.opened).length,rel.length)); click=r1(pct(rel.filter(e=>e.clicked).length,rel.length));
    const clicked=new Set(rel.filter(e=>e.clicked).map(e=>e.trial_id));
    const cy=F.filter(r=>clicked.has(r.trial_id)), cn=F.filter(r=>!clicked.has(r.trial_id));
    clickConv=[r1(pct(cn.filter(r=>r.converted).length,cn.length)),r1(pct(cy.filter(r=>r.converted).length,cy.length))];
  }
  return {kpis:{eng:r1(mean(eng)),open,click,adopt:features.adoption},buckets,nurture,features,clickConv};
}

// ---------------- compute (Experiments) ----------------
function cExp(f){
  if(!HAVE()) return FB.experiments;
  const F=filt(f);
  const v=x=>{ const d=F.filter(r=>r.landing_variant===x); const n=d.length||1; return {n:d.length,act:r1(pct(d.filter(r=>r.activated).length,n)),pql:r1(pct(d.filter(r=>r.is_pql).length,n)),conv:r1(pct(d.filter(r=>r.converted).length,n))}; };
  const A=v('A'), Bv=v('B'); const lift=A.conv?r1((Bv.conv-A.conv)/A.conv*100):0;
  const grp=pred=>{ const d=F.filter(pred); return r1(pct(d.filter(r=>r.converted).length,d.length||1)); };
  return {ab:{A,B:Bv,lift}, ext:{no:grp(r=>!r.trial_extended),yes:grp(r=>r.trial_extended),n_yes:F.filter(r=>r.trial_extended).length}, sales:{self:grp(r=>!r.sales_assisted),assisted:grp(r=>r.sales_assisted),n_assisted:F.filter(r=>r.sales_assisted).length}};
}

// ---------------- compute (Pipeline) ----------------
function cPipe(f){
  if(!HAVE() || !CRM) return FB.pipeline;
  const O=CRM.filter(o=>(f.product==='all'||o.product===f.product)&&(f.region==='all'||o.region===f.region));
  const order=['Discovery','Demo/POC','Proposal','Negotiation','Closed Won','Closed Lost'];
  const sc={}; O.forEach(o=>sc[o.stage]=(sc[o.stage]||0)+1);
  const stages=order.map(s=>[s,sc[s]||0]);
  const won=O.filter(o=>o.won);
  const openStages=new Set(['Discovery','Demo/POC','Proposal','Negotiation']);
  const kpis={open:O.filter(o=>openStages.has(o.stage)).length,winrate:r1(pct(won.length,O.length)),avg_acv:Math.round(mean(won.map(o=>+o.acv_usd||0))),pipeline_acv:Math.round(won.reduce((a,o)=>a+(+o.acv_usd||0),0))};
  const bp={}; won.forEach(o=>{const p=bp[o.product]=bp[o.product]||{n:0,acv:0}; p.n++; p.acv+=+o.acv_usd||0;});
  const byprod=Object.entries(bp).map(([p,o])=>[p,o.n,Math.round(o.acv)]).sort((a,b)=>b[2]-a[2]);
  const wr={}; O.forEach(o=>{const r=wr[o.region]=wr[o.region]||{w:0,n:0}; r.n++; if(o.won)r.w++;});
  const winregion=Object.entries(wr).map(([rg,o])=>[rg,r1(pct(o.w,o.n))]).sort((a,b)=>b[1]-a[1]);
  return {stages,kpis,byprod,winregion};
}

  <p class="note">Signups, activation and conversion come from trial records, so they respond to every filter. Spend is booked at campaign level, so it's allocated to the filtered slice in proportion to signups.</p>`;

  const body=document.getElementById('acq-body');
  body.querySelectorAll('tr[data-ch]').forEach(tr=> tr.onclick=()=>{ const c=tr.dataset.ch; acqOpen={ch:acqOpen.ch===c?null:c,cmp:null}; render(); });
  body.querySelectorAll('tr[data-cmp]').forEach(tr=> tr.onclick=e=>{ e.stopPropagation(); const c=tr.dataset.cmp; acqOpen.cmp=acqOpen.cmp===c?null:c; render(); });

  const lbl=a.trend.labels.map(fmtMonth);
  mkChart('c-acq',{data:{labels:lbl,datasets:[{type:'bar',label:'Spend',data:a.trend.spend,backgroundColor:'#FF6200',borderRadius:3,maxBarThickness:18,yAxisID:'y'},{type:'line',label:'$/signup',data:a.trend.cps,borderColor:'#232323',backgroundColor:'#232323',borderWidth:2,pointRadius:0,tension:.3,yAxisID:'y1'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:11}}}},scales:{y:{position:'left',ticks:{callback:v=>'$'+Math.round(v/1000)+'k',font:{size:10},color:'#8B95A6'},grid:{color:'#EEF1F5'},border:{display:false}},y1:{position:'right',min:0,ticks:{callback:v=>'$'+v,font:{size:10},color:'#8B95A6'},grid:{display:false},border:{display:false}},x:{ticks:{font:{size:9},color:'#8B95A6',maxRotation:0,autoSkip:true,maxTicksLimit:8},grid:{display:false},border:{display:false}}}}});
}

// ---------------- Engagement & nurture ----------------
function renderEng(view,f){
  if(!NURTURE) ensureNurture();
  const a=cEng(f);
  let nurtureHTML;
  if(a.nurture){
    nurtureHTML='<table class="dtable"><thead><tr><th>Email step</th><th class="num">Sent</th><th class="num">Open</th><th class="num">Click</th></tr></thead><tbody>'+a.nurture.map(s=>`<tr><td>${STEP_LABELS[s[0]]||s[0]}</td><td class="num">${s[1].toLocaleString()}</td><td class="num">${s[2].toFixed(1)}%</td><td class="num">${s[3].toFixed(1)}%</td></tr>`).join('')+'</tbody></table>';
  } else { nurtureHTML='<p class="note">Loading nurture data…</p>'; }
  const featRows=[['Wait-time analyses',a.features.wait],['Logins',a.features.logins],['Tuning advisors',a.features.tuning],['Anomaly alerts',a.features.alerts],['Reports',a.features.reports]];
  const fmax=Math.max(...featRows.map(r=>r[1]),1);
  const featHTML=featRows.map(([l,v])=>`<div class="frow"><span class="fname" style="width:130px">${l}</span><div class="ftrack"><div class="ffill" style="width:${Math.max(v/fmax*100,2)}%"></div></div><span class="fnum">${v}</span></div>`).join('');
  view.innerHTML=`
  <div class="grid-kpi">
    <div class="kpi"><p class="l">Avg engagement score</p><p class="v" style="color:var(--sw)">${a.kpis.eng.toFixed(1)}</p><p class="s">0–100, all trials</p></div>
    <div class="kpi"><p class="l">Email open rate</p><p class="v sm">${a.kpis.open==null?'…':a.kpis.open.toFixed(1)+'%'}</p><p class="s">across nurture</p></div>
    <div class="kpi"><p class="l">Email click rate</p><p class="v sm">${a.kpis.click==null?'…':a.kpis.click.toFixed(1)+'%'}</p><p class="s">across nurture</p></div>
    <div class="kpi"><p class="l">Feature adoption</p><p class="v sm">${a.kpis.adopt.toFixed(1)}%</p><p class="s">of activated trials</p></div>
  </div>
  <div class="row2">
    <div class="panel"><div class="head"><h3>Conversion by engagement score</h3><span>higher score → more likely to buy</span></div><div class="chart-box"><canvas id="c-eng"></canvas></div></div>
    <div class="panel"><div class="head"><h3>Nurture email performance</h3><span>by sequence step</span></div>${nurtureHTML}</div>
  </div>
  <div class="row2">
    <div class="panel"><div class="head"><h3>Feature usage (activated trials)</h3><span>avg per trial</span></div>${featHTML}</div>
    <div class="panel" style="display:flex;align-items:center"><div class="insight" style="margin:0">${bulb}
      <p><b>Engagement is the strongest buy signal.</b> Trials scoring 61–80 convert around 44% vs ~3% at the bottom — so the game is moving trials up the engagement curve. The extension-offer email earns the highest open rate, and trials that click any nurture email convert ${a.clickConv?('at '+a.clickConv[1].toFixed(0)+'% vs '+a.clickConv[0].toFixed(0)+'%'):'more'}. Lead with wait-time analysis as the activation "aha".</p></div></div>
  </div>`;
  mkChart('c-eng',{type:'bar',data:{labels:a.buckets.map(b=>b[0]),datasets:[{data:a.buckets.map(b=>b[2]),backgroundColor:'#FF6200',borderRadius:3,maxBarThickness:34}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.y+'% convert · '+a.buckets[c.dataIndex][1].toLocaleString()+' trials'}}},scales:{y:{ticks:{callback:v=>v+'%',font:{size:11},color:'#8B95A6'},grid:{color:'#EEF1F5'},border:{display:false}},x:{title:{display:true,text:'engagement score',font:{size:10},color:'#8B95A6'},ticks:{font:{size:10},color:'#8B95A6'},grid:{display:false},border:{display:false}}}}});
}

// ---------------- Experiments ----------------
function renderExp(view,f){
  const a=cExp(f); const A=a.ab.A, B=a.ab.B;
  view.innerHTML=`
  <div class="grid-kpi">
    <div class="kpi"><p class="l">Variant A — feature-led</p><p class="v sm">${A.conv.toFixed(1)}%</p><p class="s">${A.n.toLocaleString()} trials · control</p></div>
    <div class="kpi"><p class="l">Variant B — benefit-led</p><p class="v" style="color:var(--sw)">${B.conv.toFixed(1)}%</p><p class="s">${B.n.toLocaleString()} trials · variant</p></div>
    <div class="kpi"><p class="l">Conversion lift</p><p class="v" style="color:var(--green)">${a.ab.lift>=0?'+':''}${a.ab.lift.toFixed(1)}%</p><p class="s">B over A</p></div>
    <div class="kpi"><p class="l">Trial extensions</p><p class="v sm">${a.ext.yes.toFixed(1)}%</p><p class="s">convert vs ${a.ext.no.toFixed(1)}% base</p></div>
  </div>
  <div class="row2">
    <div class="panel"><div class="head"><h3>Landing page A/B — B wins across the funnel</h3><span>A control · B variant</span></div><div class="chart-box"><canvas id="c-ab"></canvas></div></div>
    <div class="panel"><div class="head"><h3>Other conversion levers</h3><span>paid conversion rate</span></div>
      ${cmpPair([{lab:'No extension',val:a.ext.no,sub:'baseline',color:'#8B95A6'},{lab:'Trial extended',val:a.ext.yes,sub:a.ext.n_yes.toLocaleString()+' trials',color:'#FF6200'},{lab:'Self-serve',val:a.sales.self,sub:'no sales touch',color:'#8B95A6'},{lab:'Sales-assisted',val:a.sales.assisted,sub:a.sales.n_assisted.toLocaleString()+' trials',color:'#12A374'}])}
    </div>
  </div>
  <div class="insight">${bulb}
    <p><b>Roadmap signal.</b> The benefit-led page (B) lifts conversion ${a.ab.lift>=0?'+':''}${a.ab.lift.toFixed(0)}% and also improves activation and PQL rate, so the win compounds up-funnel. Trial extensions and sales assist both lift conversion for high-intent trials — strong candidates to formalize into the experimentation roadmap with proper significance testing.</p></div>`;
  mkChart('c-ab',{type:'bar',data:{labels:['Activation','PQL','Conversion'],datasets:[{label:'A — feature-led',data:[A.act,A.pql,A.conv],backgroundColor:'#8B95A6',borderRadius:3,maxBarThickness:30},{label:'B — benefit-led',data:[B.act,B.pql,B.conv],backgroundColor:'#FF6200',borderRadius:3,maxBarThickness:30}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:11}}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+c.parsed.y+'%'}}},scales:{y:{ticks:{callback:v=>v+'%',font:{size:11},color:'#8B95A6'},grid:{color:'#EEF1F5'},border:{display:false}},x:{ticks:{font:{size:11},color:'#8B95A6'},grid:{display:false},border:{display:false}}}}});
}

// ---------------- Pipeline ----------------
function renderPipe(view,f){
  const a=cPipe(f);
  const stMax=Math.max(...a.stages.map(s=>s[1]),1);
  const stColors={'Closed Won':'#12A374','Closed Lost':'#D64542'};
  const stRows=a.stages.map(s=>`<div class="frow"><span class="fname" style="width:96px">${s[0]}</span><div class="ftrack"><div class="ffill" style="width:${Math.max(s[1]/stMax*100,2)}%;background:${stColors[s[0]]||'#FF6200'}"></div></div><span class="fnum">${s[1].toLocaleString()}</span></div>`).join('');
  const prodRows=a.byprod.map(p=>`<tr><td>${p[0]}</td><td class="num">${p[1].toLocaleString()}</td><td class="num">${usd(p[2])}</td></tr>`).join('');
  const wrMax=Math.max(...a.winregion.map(w=>w[1]),1);
  const wrRows=a.winregion.map(w=>`<div class="frow"><span class="fname">${w[0]}</span><div class="ftrack"><div class="ffill" style="width:${Math.max(w[1]/wrMax*100,2)}%"></div></div><span class="fnum">${w[1].toFixed(1)}%</span></div>`).join('');
  view.innerHTML=`
  <div class="grid-kpi">
    <div class="kpi"><p class="l">Open opportunities</p><p class="v sm">${a.kpis.open.toLocaleString()}</p><p class="s">still in pipeline</p></div>
    <div class="kpi"><p class="l">Win rate</p><p class="v" style="color:var(--sw)">${a.kpis.winrate.toFixed(1)}%</p><p class="s">of closed opps</p></div>
    <div class="kpi"><p class="l">Avg ACV (won)</p><p class="v sm">${usd(a.kpis.avg_acv)}</p><p class="s">per closed-won deal</p></div>
    <div class="kpi"><p class="l">Won ACV</p><p class="v sm">${usd(a.kpis.pipeline_acv)}</p><p class="s">total booked</p></div>
  </div>
  <div class="row2">
    <div class="panel"><div class="head"><h3>Sales-assisted pipeline by stage</h3><span>green won · red lost</span></div>${stRows}</div>
    <div class="panel"><div class="head"><h3>Won ACV by product</h3><span>closed-won</span></div>
      <table class="dtable"><thead><tr><th>Product</th><th class="num">Deals</th><th class="num">ACV</th></tr></thead><tbody>${prodRows}</tbody></table>
      <div class="head" style="margin:18px 0 12px"><h3>Win rate by region</h3></div>${wrRows}</div>
  </div>
  <div class="insight">${bulb}
    <p><b>Where sales assist pays off.</b> Sales-touched opportunities win ${a.kpis.winrate.toFixed(0)}% of the time at ${usd(a.kpis.avg_acv)} average ACV. Enterprise-heavy products carry the biggest booked ACV, so prioritize timely SDR follow-up on their PQLs. Define the PQL→opportunity handoff so high-intent trials reach sales while the evaluation is still warm.</p></div>
  <p class="note">Pipeline responds to the Product and Region filters; Deployment doesn't apply to CRM opportunities.</p>`;
}

// ---------------- router ----------------
function render(){
  clearCharts();
  const view=document.getElementById('view');
  const f={product:val('f-product'),region:val('f-region'),deployment:val('f-deployment')};
  try{
    if(active==='Overview') return renderOverview(view,f);
    if(active==='Activation funnel') return renderActivation(view,f);
    if(active==='Acquisition & CAC') return renderAcq(view,f);
    if(active==='Engagement & nurture') return renderEng(view,f);
    if(active==='Experiments') return renderExp(view,f);
    if(active==='Pipeline') return renderPipe(view,f);
  }catch(e){
    console.error(e);
    view.innerHTML=`<div class="placeholder"><p class="n">${active}</p><p>Something went wrong rendering this view. Check the console.</p></div>`;
  }
}

function buildTabs(){
  const t=document.getElementById('tabs');
  t.innerHTML=VIEWS.map(v=>`<button class="tab${v===active?' active':''}" data-v="${v}">${v}</button>`).join('');
  t.querySelectorAll('.tab').forEach(b=> b.onclick=()=>{ active=b.dataset.v; buildTabs(); render(); });
}

function setSource(){
  const dot=document.getElementById('src-dot'), txt=document.getElementById('src-text');
  if(SOURCE==='live'){ dot.className='dot live'; txt.textContent='Live · Supabase'; }
  else if(SOURCE==='snapshot'){ dot.className='dot live'; txt.textContent='Snapshot · full dataset'; }
  else{ dot.className='dot sample'; txt.textContent='Sample data'; 
    ['f-product','f-region','f-deployment'].forEach(id=>document.getElementById(id).disabled=true); }
}

['f-product','f-region','f-deployment'].forEach(id=>document.getElementById(id).addEventListener('change', render));

(async function init(){
  buildTabs();
  if(await loadLive())          SOURCE='live';
  else if(await loadSnapshot()) SOURCE='snapshot';
  else                          SOURCE='sample';
  setSource();
  render();
})();
</script>
</body>
</html>
