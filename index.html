<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SolarWinds DPA — Trial Conversion Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --sw:#FF6200; --swk:#C24A00; --sw-tint:rgba(255,98,0,.09); --char:#232323;
    --bg:#F6F7F9; --card:#FFFFFF; --line:#E7EBF1; --line2:#DCE1E9;
    --text:#191C22; --text2:#586475; --text3:#8B95A6; --red:#D64542; --green:#12A374;
    --font:'Inter',system-ui,sans-serif; --disp:'Space Grotesk',var(--font);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1180px;margin:0 auto;padding:0 20px;}

  header.top{background:var(--char);color:#fff;}
  .top-in{display:flex;align-items:center;justify-content:space-between;gap:16px;height:56px;}
  .brand{display:flex;align-items:center;gap:9px;font-family:var(--disp);font-weight:600;font-size:16px;white-space:nowrap;}
  .brand .sub{color:#B9B9B9;font-weight:400;font-size:14px;}
  .tabs{display:flex;gap:2px;overflow-x:auto;}
  .tab{font-size:13px;color:#C6C6C6;padding:7px 12px;border-radius:8px;cursor:pointer;white-space:nowrap;border:0;background:transparent;font-family:var(--font);}
  .tab:hover{color:#fff;background:rgba(255,255,255,.06);}
  .tab.active{color:#fff;background:var(--sw);}

  .filterbar{background:var(--card);border-bottom:1px solid var(--line);}
  .filter-in{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:11px 0;}
  .filter-in label{font-size:12px;color:var(--text2);margin-right:-6px;}
  select{font-family:var(--font);font-size:13px;color:var(--text);background:var(--card);border:1px solid var(--line2);border-radius:8px;padding:6px 10px;cursor:pointer;}
  select:disabled{opacity:.5;cursor:not-allowed;}
  input[type=date]{font-family:var(--font);font-size:12.5px;color:var(--text);background:var(--card);border:1px solid var(--line2);border-radius:8px;padding:5px 8px;cursor:pointer;}
  input[type=date]:disabled{opacity:.5;}
  .arrowto{color:var(--text3);font-size:12px;margin:0 -4px;}
  .qk{font-family:var(--font);font-size:11.5px;padding:5px 9px;border:1px solid var(--line2);background:var(--card);color:var(--text2);border-radius:8px;cursor:pointer;}
  .qk:hover{border-color:var(--sw);color:var(--sw);}
  .qk.on{background:var(--sw);color:#fff;border-color:var(--sw);}
  .fcount{font-size:11.5px;color:var(--text3);margin-left:2px;}
  .src{margin-left:auto;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:7px;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--text3);}
  .dot.live{background:var(--green);} .dot.sample{background:var(--sw);}

  main{padding:20px 0 44px;}
  .grid-kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 17px;}
  .kpi .l{font-size:12.5px;color:var(--text2);margin:0;}
  .kpi .v{font-size:28px;font-weight:600;font-family:var(--disp);margin:7px 0 2px;line-height:1;}
  .kpi .v.sm{font-size:23px;}
  .kpi .s{font-size:11.5px;color:var(--text3);margin:0;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:17px;}
  .panel h3{font-size:13.5px;font-weight:600;margin:0 0 15px;font-family:var(--font);}
  .panel .head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:15px;gap:10px;}
  .panel .head h3{margin:0;}
  .panel .head span{font-size:12px;color:var(--text2);text-align:right;}
  .frow{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
  .frow:last-child{margin-bottom:0;}
  .fname{width:76px;font-size:12px;flex-shrink:0;color:var(--text2);}
  .ftrack{flex:1;height:24px;background:#F1F3F6;border-radius:6px;overflow:hidden;}
  .ffill{height:100%;background:var(--sw);border-radius:6px;transition:width .5s ease;}
  .fnum{width:54px;text-align:right;font-size:12px;font-weight:600;flex-shrink:0;}
  .fstep{width:44px;text-align:right;font-size:11px;color:var(--text3);flex-shrink:0;}
  .insight{background:var(--sw-tint);border:1px solid rgba(255,98,0,.3);border-radius:14px;padding:14px 16px;margin-top:12px;display:flex;gap:11px;align-items:flex-start;}
  .insight svg{flex-shrink:0;margin-top:1px;}
  .insight p{font-size:13.5px;margin:0;line-height:1.5;}
  .chart-box{position:relative;height:210px;}
  .placeholder{background:var(--card);border:1px dashed var(--line2);border-radius:14px;padding:56px 24px;text-align:center;color:var(--text2);}
  .placeholder .n{font-family:var(--disp);font-weight:600;font-size:19px;color:var(--text);margin:0 0 8px;}
  .foot{text-align:center;font-size:12px;color:var(--text3);padding:8px 0 0;}
  .note{font-size:12px;color:var(--text3);margin:12px 2px 0;}
  .dtable{width:100%;border-collapse:collapse;font-size:12.5px;}
  .dtable th{text-align:left;color:var(--text2);font-weight:500;padding:7px 8px;border-bottom:1px solid var(--line);font-size:11px;text-transform:uppercase;letter-spacing:.03em;}
  .dtable td{padding:8px;border-bottom:1px solid var(--line);}
  .dtable td.num,.dtable th.num{text-align:right;font-variant-numeric:tabular-nums;}
  .dtable tr:last-child td{border-bottom:0;}
  .cmp{display:flex;flex-direction:column;gap:13px;}
  .cmp .lab{font-size:12px;color:var(--text2);margin-bottom:5px;display:flex;justify-content:space-between;}
  .cbar{height:26px;background:#F1F3F6;border-radius:6px;overflow:hidden;}
  .cbar .fill{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:9px;font-size:11.5px;font-weight:600;color:#fff;min-width:34px;transition:width .5s ease;}
  .dtable tr.clk{cursor:pointer;}
  .dtable tr.clk:hover{background:#FAFBFC;}
  .dtable tr.lvl2 td{background:#FBFCFD;padding-left:22px;}
  .dtable tr.lvl3 td{background:#F6F8FA;padding-left:40px;color:var(--text2);}
  .caret{display:inline-block;width:9px;margin-right:6px;color:var(--text3);transition:transform .15s;}
  .caret.open{transform:rotate(90deg);}
  .pillw{display:inline-block;font-size:10.5px;padding:2px 7px;border-radius:20px;background:#F1F3F6;color:var(--text2);margin-left:7px;}
  .tgl{font-family:var(--font);font-size:11.5px;padding:5px 11px;border:1px solid var(--line2);background:var(--card);color:var(--text2);cursor:pointer;}
  .tgl:first-of-type{border-radius:7px 0 0 7px;} .tgl:last-of-type{border-radius:0 7px 7px 0;border-left:0;}
  .tgl.on{background:var(--sw);color:#fff;border-color:var(--sw);}
  .stg{text-align:center;padding:6px 4px;font-variant-numeric:tabular-nums;line-height:1.15;}
  .stg .n{font-size:12.5px;font-weight:600;display:block;}
  .stg .p{font-size:9.5px;opacity:.72;display:block;}
  .stg.on{color:#fff;border-radius:5px;}
  .ko{background:rgba(214,69,66,.13);color:#A5322F;text-align:center;font-weight:600;font-size:12.5px;}
  .win{text-align:right;font-weight:600;font-size:12.5px;}
  .dtable th.ctr{text-align:center;}
  .stagehead{border-left:2px solid var(--sw);}
  .retstrip{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:0 0 16px;padding:13px 15px;background:#FAFBFC;border:1px solid var(--line);border-radius:12px;}
  .retstrip>div{display:flex;flex-direction:column;gap:3px;}
  .retstrip .rv{font-family:var(--disp);font-weight:600;font-size:23px;line-height:1;}
  .retstrip .rl{font-size:11px;color:var(--text2);line-height:1.35;}
  .retstrip .arrw{color:var(--text3);font-size:15px;padding:0 10px;}
  .ins{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-top:12px;}
  .ins .top{display:flex;align-items:flex-start;gap:12px;}
  .rank{width:26px;height:26px;border-radius:8px;background:var(--sw);color:#fff;font-family:var(--disp);font-weight:600;
        font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .rank.warn{background:var(--char);}
  .ins h4{font-size:15px;margin:2px 0 0;font-family:var(--disp);font-weight:600;flex:1;}
  .tags{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;}
  .tag{font-size:10.5px;padding:3px 9px;border-radius:20px;background:#F1F3F6;color:var(--text2);white-space:nowrap;}
  .tag.hi{background:rgba(214,69,66,.12);color:#A5322F;}
  .tag.md{background:rgba(255,98,0,.13);color:var(--swk);}
  .tag.lo{background:rgba(18,163,116,.13);color:#0B7A56;}
  .ins .ev{font-size:13.5px;color:var(--text2);line-height:1.55;margin:11px 0 0;}
  .ins .ev b{color:var(--text);}
  .acts{margin:13px 0 0;padding:0;list-style:none;}
  .acts li{font-size:13.5px;line-height:1.5;padding:4px 0 4px 20px;position:relative;}
  .acts li:before{content:'';position:absolute;left:4px;top:11px;width:5px;height:5px;border-radius:50%;background:var(--sw);}
  .impact{display:flex;gap:22px;margin-top:14px;padding-top:13px;border-top:1px solid var(--line);flex-wrap:wrap;}
  .impact div{min-width:96px;}
  .impact .n{font-family:var(--disp);font-weight:600;font-size:19px;margin:0;}
  .impact .c{font-size:11px;color:var(--text3);margin:2px 0 0;}
  .recap{background:var(--char);border-radius:14px;padding:18px 20px;color:#fff;}
  .recap h3{margin:0 0 6px;font-family:var(--disp);font-size:15px;}
  .recap p{margin:0;font-size:13.5px;line-height:1.6;color:#D6D9DE;}
  .recap b{color:#fff;}
  .audbar{display:flex;gap:0;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:5px;margin-bottom:14px;overflow-x:auto;}
  .aud{flex:1;min-width:150px;display:flex;flex-direction:column;gap:2px;align-items:flex-start;
       background:transparent;border:0;border-radius:10px;padding:10px 14px;cursor:pointer;font-family:var(--font);text-align:left;transition:background .15s;}
  .aud:hover{background:#F6F7F9;}
  .aud.on{background:var(--char);}
  .aud .at{font-family:var(--disp);font-weight:600;font-size:13.5px;color:var(--text);}
  .aud .as{font-size:11px;color:var(--text3);}
  .aud.on .at{color:#fff;} .aud.on .as{color:#A9AFB8;}
  .bigpair{display:flex;align-items:center;gap:18px;padding:10px 0 4px;}
  .bigpair .bl{font-size:11.5px;color:var(--text3);margin:0;}
  .bigpair .bv{font-family:var(--disp);font-weight:600;font-size:30px;line-height:1.1;margin:3px 0;}
  .bigpair .bs{font-size:11.5px;color:var(--text2);margin:0;}
  .bigpair .bx{font-size:13px;color:var(--text3);padding:0 4px;}
  .warnbox{background:rgba(214,69,66,.08);border:1px solid rgba(214,69,66,.25);border-radius:10px;
           padding:11px 13px;font-size:13px;line-height:1.5;color:var(--text);}
  .sub2{font-size:10.5px;color:var(--text3);}
  .sigpill{font-size:10px;font-weight:600;letter-spacing:.03em;padding:3px 8px;border-radius:20px;white-space:nowrap;}
  .sigpill.yes{background:rgba(18,163,116,.13);color:#0B7A56;}
  .sigpill.no{background:rgba(214,69,66,.11);color:#A5322F;}
  .rmhead{margin:22px 0 10px;}
  .rmhead h3{font-family:var(--disp);font-size:17px;font-weight:600;margin:0 0 4px;}
  .rmhead p{font-size:13px;color:var(--text2);margin:0;}
  .ctrlbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:-2px 0 14px;}
  .ctrlbar .cl{font-size:11.5px;color:var(--text3);margin-left:4px;}
  .ctrlbar select{font-size:12px;padding:5px 8px;}
  .chtog{margin-left:auto;font-family:var(--font);font-size:11.5px;padding:5px 11px;border:1px solid var(--line2);
         background:var(--card);color:var(--text2);border-radius:8px;cursor:pointer;}
  .chtog:hover{border-color:var(--sw);color:var(--sw);}
  .chartwrap{background:#FAFBFC;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:14px;}
  tr.totrow td{background:var(--char);color:#fff;font-weight:600;border-bottom:2px solid var(--sw);position:sticky;top:0;z-index:2;}
  tr.totrow td .p{color:#B9BEC6;}
  tr.totrow .ko{background:rgba(255,255,255,.10);color:#fff;}
  .benchpill{font-size:9.5px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;
             background:rgba(255,255,255,.16);color:#fff;padding:2px 7px;border-radius:20px;margin-left:6px;}
  th.srt{cursor:pointer;user-select:none;white-space:nowrap;}
  th.srt:hover{color:var(--sw);}
  th.srt.on{color:var(--sw);}
  .mk{display:inline-block;width:13px;margin-right:3px;font-size:11px;}
  .mk.up{color:#12A374;} .mk.dn{color:#D64542;}
  .mock{background:#FAFBFC;border:1px solid var(--line);border-radius:12px;padding:0;overflow:hidden;}
  .mock .bar{background:#EDEFF2;padding:8px 12px;display:flex;gap:6px;align-items:center;border-bottom:1px solid var(--line);}
  .mock .dot3{width:9px;height:9px;border-radius:50%;background:#C9CED6;}
  .mock .url{font-size:10.5px;color:var(--text3);background:#fff;border-radius:5px;padding:3px 9px;margin-left:8px;flex:1;}
  .mock .inner{padding:22px 24px;background:#fff;}
  .mock h5{font-family:var(--disp);font-size:16px;margin:0 0 4px;}
  .mock .lead{font-size:12.5px;color:var(--text2);margin:0 0 18px;}
  .mock .qq{font-size:12.5px;font-weight:600;margin:0 0 8px;}
  .mock .opts{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;}
  .mock .opt{font-size:11.5px;border:1px solid var(--line2);border-radius:20px;padding:5px 11px;color:var(--text2);background:#fff;}
  .mock .opt.hl{border-color:var(--sw);color:var(--swk);background:var(--sw-tint);font-weight:500;}
  .mock .btn{background:var(--sw);color:#fff;font-size:12.5px;font-weight:600;padding:9px 20px;border-radius:8px;display:inline-block;}
  .mock .skip{font-size:11px;color:var(--text3);margin-left:12px;}
  .errrow{padding:11px 0;border-bottom:1px solid var(--line);}
  .errrow:last-child{border-bottom:0;}
  .errfix{font-size:12.5px;color:var(--text2);margin:0 0 0 160px;line-height:1.5;}
  .errfix b{color:var(--text);}
  .ec{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10.5px;background:#F1F3F6;
      color:var(--text2);padding:2px 6px;border-radius:4px;margin-right:6px;}
  @media(max-width:760px){ .row2{grid-template-columns:1fr;} .brand .sub{display:none;} .ins .top{flex-wrap:wrap;} .bigpair{flex-wrap:wrap;} }
</style>
</head>

async function fetchAll(sb, table, cols){
  const page=1000; let from=0, out=[];
  while(true){
    const { data, error } = await sb.from(table).select(cols).range(from, from+page-1);
    if(error) throw error;
    out = out.concat(data);
    if(data.length < page) break;
    from += page;
  }
  return out;
}

        company_size:dec('company_size',i),persona:dec('persona',i),acquisition_channel:dec('acquisition_channel',i),

        cac_usd:T.cac_usd[i],time_to_convert_days:T.time_to_convert_days[i],acv_usd:T.acv_usd?T.acv_usd[i]:null,

  const ttc = F.filter(r=>r.converted && r.time_to_convert_days!=null).map(r=>+r.time_to_convert_days);
  const faVals = F.filter(r=>r.activated).map(r=> (PUMAP[r.trial_id]?.feature_adoption_rate ?? 0));
  const byM={};
  F.forEach(r=>{ if(!r.signup_date) return; const m=String(r.signup_date).slice(0,7); (byM[m]=byM[m]||[]).push(r.converted?1:0); });
  const ms=Object.keys(byM).sort();
  return {
    kpis:{ conversion:r1(mean(F.map(r=>r.converted?1:0))*100), trial_duration:Math.round(median(ttc)), cac:Math.round(mean(F.map(r=>+r.cac_usd||0))), abandonment:r1(100-act), feature_adoption:Math.round(mean(faVals)*100) },
    funnel:[['Signed up',F.length],['Installed',F.filter(r=>PUMAP[r.trial_id]?.installed).length],['Connected',F.filter(r=>PUMAP[r.trial_id]?.db_connected).length],['Activated',F.filter(r=>r.activated).length],['PQL',F.filter(r=>r.is_pql).length],['Paid',F.filter(r=>r.converted).length]],
    trend:{labels:ms.map(fmtMonth), values:ms.map(m=>r1(mean(byM[m])*100))}
  };
}

// ---------------- compute (Activation) ----------------
function cActivation(f){
  if(!HAVE()) return FB.activation;
  const F=filt(f);
  const funnel=[['Signed up',F.length],['Installed',F.filter(r=>PUMAP[r.trial_id]?.installed).length],['Connected',F.filter(r=>PUMAP[r.trial_id]?.db_connected).length],['Activated',F.filter(r=>r.activated).length],['PQL',F.filter(r=>r.is_pql).length],['Paid',F.filter(r=>r.converted).length]];
  const tta=F.filter(r=>r.activated).map(r=>+PUMAP[r.trial_id]?.time_to_activate_hrs).filter(x=>x===x && x!=null);
  const base=TRIALS.filter(r=>(f.product==='all'||r.product===f.product)&&(f.region==='all'||r.region===f.region));
  const depRates=dt=>{ const d=base.filter(r=>r.deployment_type===dt); const n=d.length||1;
    return {n:d.length, inst:r1(pct(d.filter(r=>PUMAP[r.trial_id]?.installed).length,n)),conn:r1(pct(d.filter(r=>PUMAP[r.trial_id]?.db_connected).length,n)),act:r1(pct(d.filter(r=>r.activated).length,n))}; };
  const reasons={};
  F.filter(r=>!r.converted && r.non_conversion_reason).forEach(r=>reasons[r.non_conversion_reason]=(reasons[r.non_conversion_reason]||0)+1);
  const SH=depRates('self_hosted'), SA=depRates('saas');
  // portfolio benchmark: every product's setup steps, ignoring the product filter
  const pbase=TRIALS.filter(r=>(f.region==='all'||r.region===f.region));
  const prodRates=p=>{ const d=pbase.filter(r=>r.product===p); const n=d.length||1;
    return {n:d.length, inst:r1(pct(d.filter(r=>PUMAP[r.trial_id]?.installed).length,n)),
      conn:r1(pct(d.filter(r=>PUMAP[r.trial_id]?.db_connected).length,n)),
      act:r1(pct(d.filter(r=>r.activated).length,n))}; };
  const prods=[...new Set(pbase.map(r=>r.product))].sort().map(p=>({p,...prodRates(p)})).filter(x=>x.n>0);
  return { funnel, kpis:{act:r1(pct(F.filter(r=>r.activated).length,F.length)),tta:Math.round(median(tta)),
    sh:SH.act, saas:SA.act, shN:SH.n, saasN:SA.n},
    dep:{sh:SH,saas:SA}, prods, sel:f.product,
    reasons:Object.entries(reasons).sort((a,b)=>b[1]-a[1]).slice(0,6) };
}

// ---------------- compute (Acquisition — drill-down) ----------------
// Signups / activation / conversion come from `trials`, so they respect every filter.
// Spend lives at campaign level, so it's allocated to the filtered slice by signup share.
function cAcq(f){
  if(!HAVE()) return null;
  const F=filt(f);
  const spendC={}, spendA={}, sigAllC={}, sigAllA={};
  (CAMPAIGN||[]).forEach(r=>{
    spendC[r.campaign]=(spendC[r.campaign]||0)+(+r.spend_usd||0);
    sigAllC[r.campaign]=(sigAllC[r.campaign]||0)+(+r.signups||0);
    const k=r.campaign+'||'+r.ad_group;
    spendA[k]=(spendA[k]||0)+(+r.spend_usd||0);
    sigAllA[k]=(sigAllA[k]||0)+(+r.signups||0);
  });
  // ad-group signup mix within each campaign (from campaign table)
  const agMix={};
  Object.keys(sigAllA).forEach(k=>{ const c=k.split('||')[0]; agMix[c]=agMix[c]||[]; agMix[c].push([k.split('||')[1], sigAllC[c]?sigAllA[k]/sigAllC[c]:0, spendA[k]]); });

  // pipeline stages, joined back to the trial that produced them
  const LATE=new Set(['Proposal','Negotiation','Closed Won']);
  const pipeByTrial={};
  (CRM||[]).forEach(o=>{ if(o.trial_id) pipeByTrial[o.trial_id]=o; });

  // furthest stage each trial reached: 1 signup .. 7 closed won
  const stageOf = r => {
    const p=PUMAP[r.trial_id]||{}, op=pipeByTrial[r.trial_id];
    if(op && op.won) return 7;
    if(op) return 6;
    if(r.is_pql) return 5;
    if(r.activated) return 4;
    if(p.db_connected) return 3;
    if(p.installed) return 2;
    return 1;
  };
  const isDead = r => !r.converted && !!r.non_conversion_reason;

  const byCmp={};
  F.forEach(r=>{ const c=r.campaign||'—'; const o=byCmp[c]=byCmp[c]||{ch:r.acquisition_channel,s:0,a:0,q:0,cv:0,late:0,wonAcv:0,
      now:[0,0,0,0,0,0,0,0], jr:[0,0,0,0,0,0,0,0], ko:0};
    o.s++; if(r.activated)o.a++; if(r.is_pql)o.q++; if(r.converted)o.cv++;
    const st=stageOf(r);
    o.now[st]++;                                  // where it sits now
    for(let k=1;k<=st;k++) o.jr[k]++;             // every stage it ever reached
    if(isDead(r)) o.ko++;
    const op=pipeByTrial[r.trial_id];
    if(op){ if(LATE.has(op.stage)) o.late++; if(op.won) o.wonAcv+=(+op.acv_usd||0); } });

  // Ad groups are computed from the trial rows themselves — ad_group sits on every trial.
  // A broad-match keyword and an exact-match one bring different humans, so they get different funnels.
  const byAG={};
  F.forEach(r=>{ const c=r.campaign||'—', g=r.ad_group||'—';
    const o=byAG[c+'||'+g]=byAG[c+'||'+g]||{campaign:c,name:g,s:0,a:0,q:0,cv:0,late:0,wonAcv:0,spend:0,
      now:[0,0,0,0,0,0,0,0], jr:[0,0,0,0,0,0,0,0], ko:0};
    o.s++; o.spend+=(+r.cac_usd||0);
    if(r.activated)o.a++; if(r.is_pql)o.q++; if(r.converted)o.cv++;
    const st=stageOf(r);
    o.now[st]++; for(let k=1;k<=st;k++) o.jr[k]++;
    if(isDead(r)) o.ko++;
    const op=pipeByTrial[r.trial_id];
    if(op){ if(LATE.has(op.stage)) o.late++; if(op.won) o.wonAcv+=(+op.acv_usd||0); } });
  const agBy={};
  Object.values(byAG).forEach(o=>{
    (agBy[o.campaign]=agBy[o.campaign]||[]).push({name:o.name, signups:o.s, act:o.a, pql:o.q, conv:o.cv,
      late:o.late, wonAcv:o.wonAcv, spend:o.spend, now:o.now, jr:o.jr, ko:o.ko,
      cps:o.s?o.spend/o.s:0, cpa:o.cv?o.spend/o.cv:0,
      cvr:pct(o.cv,o.s), actR:pct(o.a,o.s), pqlR:pct(o.q,o.s)});
  });
  Object.values(agBy).forEach(l=>l.sort((x,y)=>y.signups-x.signups));

  const campaigns=Object.entries(byCmp).map(([c,o])=>{
    const spend=(agBy[c]||[]).reduce((a,g)=>a+g.spend,0);
    return {campaign:c,channel:o.ch,signups:o.s,act:o.a,pql:o.q,conv:o.cv,late:o.late,wonAcv:o.wonAcv,spend,
      cps:o.s?spend/o.s:0, cpa:o.cv?spend/o.cv:0, cvr:pct(o.cv,o.s),
      actR:pct(o.a,o.s), pqlR:pct(o.q,o.s), now:o.now, jr:o.jr, ko:o.ko, ad_groups:agBy[c]||[]};
  });

  // rows can also be a plain dimension (deployment / persona / company size)
  const dimRows = (field) => {
    const m={};
    F.forEach(r=>{ const k=r[field]||'—';
      const o=m[k]=m[k]||{name:k,s:0,a:0,q:0,cv:0,late:0,wonAcv:0,spend:0,
        now:[0,0,0,0,0,0,0,0], jr:[0,0,0,0,0,0,0,0], ko:0};
      o.s++; o.spend+=(+r.cac_usd||0);
      if(r.activated)o.a++; if(r.is_pql)o.q++; if(r.converted)o.cv++;
      const st=stageOf(r);
      o.now[st]++; for(let k2=1;k2<=st;k2++) o.jr[k2]++;
      if(isDead(r)) o.ko++;
      const op=pipeByTrial[r.trial_id];
      if(op){ if(LATE.has(op.stage)) o.late++; if(op.won) o.wonAcv+=(+op.acv_usd||0); } });
    return Object.values(m).map(o=>({channel:o.name, campaign:o.name, name:o.name,
      signups:o.s, act:o.a, pql:o.q, conv:o.cv, late:o.late, wonAcv:o.wonAcv, spend:o.spend,
      now:o.now, jr:o.jr, ko:o.ko, cps:o.s?o.spend/o.s:0, cpa:o.cv?o.spend/o.cv:0,
      cvr:pct(o.cv,o.s), actR:pct(o.a,o.s), pqlR:pct(o.q,o.s), campaigns:[], ad_groups:[]}));
  };

  const byCh={};
  campaigns.forEach(c=>{ const o=byCh[c.channel]=byCh[c.channel]||{signups:0,act:0,pql:0,conv:0,late:0,wonAcv:0,spend:0,ko:0,
      now:[0,0,0,0,0,0,0,0], jr:[0,0,0,0,0,0,0,0], camps:[]};
    o.signups+=c.signups; o.act+=c.act; o.pql+=c.pql; o.conv+=c.conv; o.late+=c.late; o.wonAcv+=c.wonAcv;
    o.spend+=c.spend; o.ko+=c.ko; o.camps.push(c);
    for(let k=1;k<=7;k++){ o.now[k]+=c.now[k]; o.jr[k]+=c.jr[k]; } });
  const sortFn=(x,y)=> acqMode==='cost' ? y.spend-x.spend : (acqMode==='stages' ? y.signups-x.signups : y.wonAcv-x.wonAcv);
  const channels=Object.entries(byCh).map(([ch,o])=>({channel:ch,signups:o.signups,act:o.act,pql:o.pql,conv:o.conv,
    late:o.late,wonAcv:o.wonAcv,spend:o.spend,now:o.now,jr:o.jr,ko:o.ko,
    cps:o.signups?o.spend/o.signups:0, cpa:o.conv?o.spend/o.conv:0, cvr:pct(o.conv,o.signups),
    actR:pct(o.act,o.signups), pqlR:pct(o.pql,o.signups),
    campaigns:o.camps.sort(sortFn)})).sort(sortFn);

  const totals={spend:channels.reduce((a,c)=>a+c.spend,0),signups:F.length,
    conv:F.filter(r=>r.converted).length};
  totals.cps=totals.signups?totals.spend/totals.signups:0;
  totals.cpa=totals.conv?totals.spend/totals.conv:0;
  totals.act=F.filter(r=>r.activated).length;
  totals.actR=pct(totals.act,totals.signups);

  const bm={};
  F.forEach(r=>{ const m=String(r.signup_date).slice(0,7); const o=bm[m]=bm[m]||{s:0}; o.s++; });
  const spendM={};
  (CAMPAIGN||[]).forEach(r=>{ const m=String(r.month).slice(0,7); spendM[m]=spendM[m]||{sp:0,sg:0}; spendM[m].sp+=+r.spend_usd||0; spendM[m].sg+=+r.signups||0; });
  const ms=Object.keys(bm).sort();
  const trend={labels:ms,
    spend:ms.map(m=>{ const g=spendM[m]; const share=g&&g.sg?Math.min(bm[m].s/g.sg,1):0; return (g?g.sp:0)*share; }),
    cps:ms.map(m=>{ const g=spendM[m]; const share=g&&g.sg?Math.min(bm[m].s/g.sg,1):0; const sp=(g?g.sp:0)*share; return r1(bm[m].s?sp/bm[m].s:0); })};
  const flatAG=[];
  Object.values(agBy).forEach(list=>list.forEach(g=>flatAG.push(g)));
  campaigns.forEach(c=>c.ad_groups.forEach(g=>{ g.channel=c.channel; g.campaign=c.campaign; }));

  // filter-aware benchmark row
  const T={signups:F.length, act:F.filter(r=>r.activated).length, pql:F.filter(r=>r.is_pql).length,
    conv:F.filter(r=>r.converted).length, spend:F.reduce((a,r)=>a+(+r.cac_usd||0),0),
    late:0, wonAcv:0, now:[0,0,0,0,0,0,0,0], jr:[0,0,0,0,0,0,0,0], ko:0};
  F.forEach(r=>{ const st=stageOf(r); T.now[st]++; for(let k=1;k<=st;k++) T.jr[k]++;
    if(isDead(r)) T.ko++;
    const op=pipeByTrial[r.trial_id];
    if(op){ if(LATE.has(op.stage)) T.late++; if(op.won) T.wonAcv+=(+op.acv_usd||0); } });
  T.cvr=pct(T.conv,T.signups); T.actR=pct(T.act,T.signups); T.pqlR=pct(T.pql,T.signups);
  T.cps=T.signups?T.spend/T.signups:0; T.cpa=T.conv?T.spend/T.conv:0;
  T.name='All'; T.channel='All'; T.campaign='All';

  return {totals,channels,trend,flatAG,dimRows,T,hasCampaign:!!(CAMPAIGN&&CAMPAIGN.length)};
}

// ---------------- compute (Engagement) ----------------
function cEng(f){
  if(!HAVE()) return FB.engagement;
  const F=filt(f);
  const eng=F.map(r=>+PUMAP[r.trial_id]?.engagement_score).filter(x=>x===x);
  const actd=F.filter(r=>r.activated);
  // the aha moment: how many databases have they wired up?
  const dbCurve=[0,1,2,3,4,5].map(k=>{
    const d = k<5 ? F.filter(r=>(+PUMAP[r.trial_id]?.instances_monitored||0)===k)
                  : F.filter(r=>(+PUMAP[r.trial_id]?.instances_monitored||0)>=5);
    return {k, n:d.length, conv: d.length? r1(pct(d.filter(r=>r.converted).length,d.length)) : 0};
  });
  const B=[['0',-1,0],['1-20',0,20],['21-40',20,40],['41-60',40,60],['61-80',60,80],['81-100',80,100]];
  const buckets=B.map(([lab,lo,hi])=>{ const d=F.filter(r=>{const s=+PUMAP[r.trial_id]?.engagement_score; return s>lo&&s<=hi;}); return [lab,d.length,r1(pct(d.filter(r=>r.converted).length,d.length))]; });
  const feat=k=> r1(mean(actd.map(r=>+PUMAP[r.trial_id]?.[k]||0)));
  const features={adoption:r1(mean(actd.map(r=>+PUMAP[r.trial_id]?.feature_adoption_rate||0))*100),logins:feat('logins'),wait:feat('wait_time_analyses_run'),tuning:feat('tuning_advisors_used'),alerts:feat('anomaly_alerts_configured'),reports:feat('reports_generated')};
  // nurture, from the per-trial send/open/click bitmasks
  const NSTEPS=['setup_help_1','setup_help_2','feature_spotlight','trial_ending','extension_offer'];
  const bit=(m,i)=> (m>>i)&1;
  const nurture=NSTEPS.map((s,i)=>{
    const sent=F.filter(r=>bit(r.nsent||0,i)).length;
    const op=F.filter(r=>bit(r.nopen||0,i)).length;
    const cl=F.filter(r=>bit(r.nclick||0,i)).length;
    return [s, sent, sent? r1(pct(op,sent)):0, sent? r1(pct(cl,sent)):0];
  }).filter(x=>x[1]>0);
  const totSent=F.reduce((a,r)=>{ let c=0; for(let i=0;i<5;i++) c+=bit(r.nsent||0,i); return a+c; },0);
  const totOpen=F.reduce((a,r)=>{ let c=0; for(let i=0;i<5;i++) c+=bit(r.nopen||0,i); return a+c; },0);
  const totClick=F.reduce((a,r)=>{ let c=0; for(let i=0;i<5;i++) c+=bit(r.nclick||0,i); return a+c; },0);
  const open = totSent? r1(pct(totOpen,totSent)) : null;
  const click = totSent? r1(pct(totClick,totSent)) : null;
  const cy=F.filter(r=>(r.nclick||0)>0), cn=F.filter(r=>!(r.nclick||0));
  const clickConv=[ cn.length? r1(pct(cn.filter(r=>r.converted).length,cn.length)) : 0,
                    cy.length? r1(pct(cy.filter(r=>r.converted).length,cy.length)) : 0 ];
  return {kpis:{eng:r1(mean(eng)),open,click,adopt:features.adoption},buckets,dbCurve,nurture,features,clickConv};
}

// ---------------- compute (Trial retention) ----------------
// Daily activity is derived, not stored: each trial's known login count is spread across the
// 14-day window, anchored to time_to_activate_hrs for the first action, with the decay rate
// set by engagement_score. Deterministic per trial_id, so it is identical live and offline.
const NURTURE_DAYS={setup_help_1:2,setup_help_2:5,feature_spotlight:8,trial_ending:12,extension_offer:14};
const TRIAL_DAYS=14;
function seed32(s){ let h=2166136261>>>0; s=String(s);
  for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619)>>>0; }
  return ()=>{ h=(h+0x6D2B79F5)>>>0; let t=h;
    t=Math.imul(t^(t>>>15),t|1); t^=t+Math.imul(t^(t>>>7),t|61);
    return ((t^(t>>>14))>>>0)/4294967296; };
}
const MASKCACHE={};
function dayMask(r){
  const id=r.trial_id;
  if(MASKCACHE[id]!==undefined) return MASKCACHE[id];
  const p=PUMAP[id]||{};
  const logins=+p.logins||0;
  if(logins<=0) return (MASKCACHE[id]=0);
  const eng=+p.engagement_score||0;
  const rnd=seed32(id);
  const days=new Set([1]);
  const tta=+p.time_to_activate_hrs;
  if(r.activated && tta===tta && tta!=null){
    const d=Math.round(tta/24)+1;
    if(d>=1 && d<=TRIAL_DAYS) days.add(d);
  }
  const tau=0.8+(eng/100)*6.5;
  for(let i=1;i<logins;i++){
    const u=Math.max(rnd(),1e-9);
    const d=Math.round(-tau*Math.log(u))+1;
    if(d<=TRIAL_DAYS) days.add(d);
  }
  let m=0; days.forEach(d=>{ m|=1<<(d-1); });
  return (MASKCACHE[id]=m);
}
function cRet(f){
  if(!HAVE()) return FB.retention;
  const F=filt(f);
  if(!F.length) return FB.retention;
  const on=(m,d)=> (m>>(d-1))&1;
  const curve=arr=>{ const n=arr.length||1; const ms=arr.map(dayMask);
    return Array.from({length:TRIAL_DAYS},(_,i)=> r1(ms.filter(m=>on(m,i+1)).length/n*100)); };
  return { days:TRIAL_DAYS, all:curve(F), conv:curve(F.filter(r=>r.converted)), nonconv:curve(F.filter(r=>!r.converted)),
    dead: r1(F.filter(r=>!dayMask(r)).length/F.length*100), emails:NURTURE_DAYS };
}

// ---------------- compute (Experiments) ----------------
// Two-proportion z-test. Nothing gets called a win until the maths says so.
function ztest(c1,n1,c2,n2){
  if(!n1||!n2) return {p1:0,p2:0,lift:0,z:0,pv:1,sig:false,ci:[0,0]};
  const p1=c1/n1, p2=c2/n2, p=(c1+c2)/(n1+n2);
  const se=Math.sqrt(p*(1-p)*(1/n1+1/n2));
  const z = se? (p2-p1)/se : 0;
  const pv = 2*(1-normcdf(Math.abs(z)));
  const seDiff=Math.sqrt(p1*(1-p1)/n1 + p2*(1-p2)/n2);
  const d=p2-p1;
  return {p1:p1*100, p2:p2*100, lift: p1? (p2-p1)/p1*100 : 0, z, pv, sig: pv<0.05,
          ci:[(d-1.96*seDiff)*100, (d+1.96*seDiff)*100]};
}
function normcdf(x){ // Abramowitz-Stegun
  const t=1/(1+0.2316419*x);
  const d=0.3989423*Math.exp(-x*x/2);
  const p=d*t*(0.3193815+t*(-0.3565638+t*(1.781478+t*(-1.821256+t*1.330274))));
  return 1-p;
}
// how many per arm do we need to detect a given relative lift at 80% power?
function sampleNeeded(base, relLift){
  const p1=base, p2=base*(1+relLift);
  const pbar=(p1+p2)/2, d=Math.abs(p2-p1);
  if(!d) return Infinity;
  return Math.ceil( Math.pow(1.96*Math.sqrt(2*pbar*(1-pbar)) + 0.84*Math.sqrt(p1*(1-p1)+p2*(1-p2)), 2) / (d*d) );
}

function cExp(f){
  if(!HAVE()) return null;
  const F=filt(f);
  const A=F.filter(r=>r.landing_variant==='A'), B=F.filter(r=>r.landing_variant==='B');
  const cnt=(arr,k)=>arr.filter(r=>r[k]).length;
  const metric=k=>ztest(cnt(A,k),A.length,cnt(B,k),B.length);

  const metrics=[
    {k:'activated', label:'Activation', guard:false, ...metric('activated')},
    {k:'is_pql',    label:'PQL rate',   guard:false, ...metric('is_pql')},
    {k:'converted', label:'Trial → paid', guard:true, ...metric('converted')}
  ];
  const primary=metrics[2];

  // does it hold in every segment, or is the average hiding opposite effects?
  const segBy=(field,vals)=> vals.map(v=>{
    const a=A.filter(r=>r[field]===v), b=B.filter(r=>r[field]===v);
    return {v, nA:a.length, nB:b.length, ...ztest(cnt(a,'converted'),a.length,cnt(b,'converted'),b.length)};
  }).filter(x=>x.nA>200 && x.nB>200);
  const byPersona=segBy('persona',['DBA','IT_ops','developer']);
  const byDeploy=segBy('deployment_type',['self_hosted','saas']);

  const base=A.length? cnt(A,'converted')/A.length : 0.04;
  const need=sampleNeeded(base, 0.10);

  // other levers (observational, NOT experiments — say so)
  const grp=pred=>{ const d=F.filter(pred); return {n:d.length, cvr: d.length? pct(d.filter(r=>r.converted).length,d.length):0}; };
  const ext={yes:grp(r=>r.trial_extended), no:grp(r=>!r.trial_extended)};
  const pql=F.filter(r=>r.is_pql);
  const sa={yes:{n:pql.filter(r=>r.sales_assisted).length,
                 cvr:pct(pql.filter(r=>r.sales_assisted&&r.converted).length, pql.filter(r=>r.sales_assisted).length||1)},
            no:{n:pql.filter(r=>!r.sales_assisted).length,
                cvr:pct(pql.filter(r=>!r.sales_assisted&&r.converted).length, pql.filter(r=>!r.sales_assisted).length||1)}};
  const naive={yes:grp(r=>r.sales_assisted), no:grp(r=>!r.sales_assisted)};

  // sizing inputs for the roadmap
  const won=F.filter(r=>r.converted);
  const ACV=won.length? mean(won.map(r=>+r.acv_usd||0)) : 10000;
  const inst=k=>{ const d=F.filter(r=>(+PUMAP[r.trial_id]?.instances_monitored||0)===k);
    return {n:d.length, cvr:d.length? pct(d.filter(r=>r.converted).length,d.length):0}; };
  const i1=inst(1), i2=inst(2);
  const sh=F.filter(r=>r.deployment_type==='self_hosted');
  const shNoConn=sh.filter(r=>PUMAP[r.trial_id]?.installed && !PUMAP[r.trial_id]?.db_connected).length;
  const failed=F.filter(r=>r.setup_stage===7).length;

  return {nA:A.length, nB:B.length, metrics, primary, byPersona, byDeploy, need,
          ext, sa, naive, ACV, i1, i2, shNoConn, failed};
}

// ---------------- compute (Pipeline) ----------------
function cPipe(f){
  if(!HAVE() || !CRM) return FB.pipeline;
  const O=CRM.filter(o=>(f.product==='all'||o.product===f.product)&&(f.region==='all'||o.region===f.region));
  const order=['Discovery','Demo/POC','Proposal','Negotiation','Closed Won','Closed Lost'];
  const sc={}; O.forEach(o=>sc[o.stage]=(sc[o.stage]||0)+1);
  const stages=order.map(s=>[s,sc[s]||0]);
  const won=O.filter(o=>o.won);
  const openStages=new Set(['Discovery','Demo/POC','Proposal','Negotiation']);
  const kpis={open:O.filter(o=>openStages.has(o.stage)).length,winrate:r1(pct(won.length,O.length)),avg_acv:Math.round(mean(won.map(o=>+o.acv_usd||0))),pipeline_acv:Math.round(won.reduce((a,o)=>a+(+o.acv_usd||0),0))};
  const bp={}; won.forEach(o=>{const p=bp[o.product]=bp[o.product]||{n:0,acv:0}; p.n++; p.acv+=+o.acv_usd||0;});
  const byprod=Object.entries(bp).map(([p,o])=>[p,o.n,Math.round(o.acv)]).sort((a,b)=>b[2]-a[2]);
  const wr={}; O.forEach(o=>{const r=wr[o.region]=wr[o.region]||{w:0,n:0}; r.n++; if(o.won)r.w++;});
  const winregion=Object.entries(wr).map(([rg,o])=>[rg,r1(pct(o.w,o.n))]).sort((a,b)=>b[1]-a[1]);
  return {stages,kpis,byprod,winregion};
}

  pqlR:['PQL rate', r=>r.pqlR],

      <button class="tgl on" id="acq-dir">${acqSort.dir<0?'High → low':'Low → high'}</button>
      <button class="chtog" id="acq-chart-tog">${acqChart?'▾ Hide chart':'▸ Show chart'}</button>
    </div>
    ${acqChart?`<div class="chartwrap"><div class="head" style="margin-bottom:8px"><h3>${sortLabel} — ranked</h3><span>follows the table: same rows, same sort, same filters</span></div><div class="chart-box" style="height:${Math.max(180, chartRows.length*26)}px"><canvas id="c-rank"></canvas></div></div>`:''}
    <table class="dtable"><thead>${head}</thead><tbody id="acq-body">${rows}</tbody></table>
    ${legend}
  </div>
  <div class="row2">
    <div class="panel"><div class="head"><h3>Activation rate by channel</h3><span>green = beats our ${T.actR.toFixed(0)}% average</span></div>${actRows}</div>
    <div class="panel"><h3>Monthly spend &amp; cost per signup</h3><div class="chart-box"><canvas id="c-acq"></canvas></div></div>
  </div>
  <div class="insight">${bulb}
    <p><b>Volume at the top tells us nothing about revenue at the bottom.</b> Our campaigns look almost identical at install — because whether someone installs depends on their IT department, not on the ad they clicked. The difference shows up further down, where intent starts to cost effort: ${T.cvr.toFixed(1)}% of our trials convert on average, but the spread across ad groups is several times that. Judge acquisition on cost per paid customer, not cost per signup — and cut the ad groups marked &#9660;.</p></div>
  <p class="note">Every number here recomputes from the filters above. Spend is each trial's own acquisition cost, so it follows the filters too.</p>`;

  // ---- wiring
  const body=document.getElementById('acq-body');
  if(drillable){
    body.querySelectorAll('tr[data-ch]').forEach(tr=> tr.onclick=()=>{ const c=tr.dataset.ch; acqOpen={ch:acqOpen.ch===c?null:c,cmp:null}; render(); });
    body.querySelectorAll('tr[data-cmp]').forEach(tr=> tr.onclick=e=>{ e.stopPropagation(); const c=tr.dataset.cmp; acqOpen.cmp=acqOpen.cmp===c?null:c; render(); });
  }
  view.querySelectorAll('.tgl').forEach(b=> b.onclick=()=>{
    if(b.dataset.mode) acqMode=b.dataset.mode;
    if(b.dataset.j!=null) acqJourney=b.dataset.j==='1';
    if(b.id==='acq-dir') acqSort.dir*=-1;
    render(); });
  view.querySelectorAll('th.srt').forEach(th=> th.onclick=()=>{
    const k=th.dataset.sort;
    if(acqSort.key===k) acqSort.dir*=-1; else { acqSort.key=k; acqSort.dir=-1; }
    render(); });
  document.getElementById('acq-dim').onchange=e=>{ acqRow=e.target.value; acqOpen={ch:null,cmp:null}; render(); };
  document.getElementById('acq-sort').onchange=e=>{ acqSort.key=e.target.value; render(); };
  document.getElementById('acq-chart-tog').onclick=()=>{ acqChart=!acqChart; render(); };

  if(acqChart){
    const lbls=chartRows.map(r=> DIM?(DIMLABEL[r.name]||r.name) : (r.name || CH_LABELS[r.channel] || r.channel));
    const vals=chartRows.map(r=>{ const v=getv(r); return (v===Infinity||!isFinite(v))?0:v; });
    const bench = acqSort.key==='cvr'?T.cvr : acqSort.key==='actR'?T.actR : acqSort.key==='pqlR'?T.pqlR
                : acqSort.key==='cpa'?T.cpa : null;
    const isPct=['cvr','actR','pqlR'].includes(acqSort.key);
    const isMoney=['spend','cpa','wonAcv'].includes(acqSort.key);
    const good=v=> bench==null?'#FF6200' : (acqSort.key==='cpa' ? (v<=bench?'#12A374':'#D64542') : (v>=bench?'#12A374':'#D64542'));
    mkChart('c-rank',{type:'bar',data:{labels:lbls,datasets:[{data:vals,
        backgroundColor:vals.map(good), borderRadius:3, maxBarThickness:16}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{
          const v=c.parsed.x; return sortLabel+': '+(isPct? v.toFixed(1)+'%' : isMoney? '$'+Math.round(v).toLocaleString() : Math.round(v).toLocaleString());}}}},
        scales:{x:{grid:{color:'#EEF1F5'},border:{display:false},
            ticks:{font:{size:10},color:'#8B95A6',callback:v=>isPct?v+'%':isMoney?'$'+(v>=1000?Math.round(v/1000)+'k':v):v}},
          y:{grid:{display:false},border:{display:false},ticks:{font:{size:11},color:'#586475'}}}},
      plugins: bench!=null?[{id:'bench',afterDatasetsDraw(ch){
        const {ctx,chartArea:{top,bottom},scales:{x}}=ch;
        const px=x.getPixelForValue(bench);
        ctx.save(); ctx.strokeStyle='#232323'; ctx.setLineDash([4,3]); ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.moveTo(px,top); ctx.lineTo(px,bottom); ctx.stroke();
        ctx.setLineDash([]); ctx.fillStyle='#232323'; ctx.font='600 9.5px Inter'; ctx.textAlign='center';
        ctx.fillText('our average', px, top-4); ctx.restore();
      }}]:[]});
  }

  const lbl=a.trend.labels.map(fmtMonth);
  mkChart('c-acq',{data:{labels:lbl,datasets:[{type:'bar',label:'Spend',data:a.trend.spend,backgroundColor:'#FF6200',borderRadius:3,maxBarThickness:18,yAxisID:'y'},{type:'line',label:'$/signup',data:a.trend.cps,borderColor:'#232323',backgroundColor:'#232323',borderWidth:2,pointRadius:0,tension:.3,yAxisID:'y1'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:11}}}},scales:{y:{position:'left',ticks:{callback:v=>'$'+Math.round(v/1000)+'k',font:{size:10},color:'#8B95A6'},grid:{color:'#EEF1F5'},border:{display:false}},y1:{position:'right',min:0,ticks:{callback:v=>'$'+v,font:{size:10},color:'#8B95A6'},grid:{display:false},border:{display:false}},x:{ticks:{font:{size:9},color:'#8B95A6',maxRotation:0,autoSkip:true,maxTicksLimit:8},grid:{display:false},border:{display:false}}}}});
}

// ---------------- Engagement & nurture ----------------
function renderEng(view,f){
  const num=x=>Math.round(x).toLocaleString();
  const a=cEng(f);
  let nurtureHTML;
  if(a.nurture){
    nurtureHTML='<table class="dtable"><thead><tr><th>Email step</th><th class="num">Sent</th><th class="num">Open</th><th class="num">Click</th></tr></thead><tbody>'+a.nurture.map(s=>`<tr><td>${STEP_LABELS[s[0]]||s[0]}</td><td class="num">${s[1].toLocaleString()}</td><td class="num">${s[2].toFixed(1)}%</td><td class="num">${s[3].toFixed(1)}%</td></tr>`).join('')+'</tbody></table>';
  } else { nurtureHTML='<p class="note">Loading nurture data…</p>'; }
  const featRows=[['Wait-time analyses',a.features.wait],['Logins',a.features.logins],['Tuning advisors',a.features.tuning],['Anomaly alerts',a.features.alerts],['Reports',a.features.reports]];
  const fmax=Math.max(...featRows.map(r=>r[1]),1);
  const featHTML=featRows.map(([l,v])=>`<div class="frow"><span class="fname" style="width:130px">${l}</span><div class="ftrack"><div class="ffill" style="width:${Math.max(v/fmax*100,2)}%"></div></div><span class="fnum">${v}</span></div>`).join('');
  const R=cRet(f);
  const emailDays=Object.entries(R.emails);
  const aliveAtEnding = R.all[(R.emails.trial_ending||12)-1];

  view.innerHTML=`
  <div class="grid-kpi">
    <div class="kpi"><p class="l">Never returned</p><p class="v" style="color:var(--red)">${R.dead.toFixed(1)}%</p><p class="s">signed up, never logged in</p></div>
    <div class="kpi"><p class="l">Still active, day 14</p><p class="v sm">${R.all[13].toFixed(1)}%</p><p class="s">last day of trial</p></div>
    <div class="kpi"><p class="l">Alive when "trial ending" sends</p><p class="v" style="color:var(--red)">${aliveAtEnding.toFixed(1)}%</p><p class="s">day ${R.emails.trial_ending||12}</p></div>
    <div class="kpi"><p class="l">Stuck at one database</p><p class="v" style="color:var(--red)">${(a.dbCurve[1]&&a.dbCurve[1].n)?num(a.dbCurve[1].n):'—'}</p><p class="s">converting at just ${(a.dbCurve[1])?a.dbCurve[1].conv.toFixed(1):'—'}%</p></div>
    <div class="kpi"><p class="l">Email open rate</p><p class="v sm">${a.kpis.open==null?'…':a.kpis.open.toFixed(1)+'%'}</p><p class="s">across nurture</p></div>
  </div>
  <div class="panel" style="margin-top:12px">
    <div class="head"><h3>Trial engagement over the 14-day window<span class="pillw">who is still awake?</span></h3>
      <span>% of trials active on each day of their own trial</span></div>
    <div class="retstrip">
      <div><span class="rv" style="color:var(--red)">${R.dead.toFixed(0)}%</span><span class="rl">never came back<br>after signing up</span></div>
      <div class="arrw">→</div>
      <div><span class="rv">${(100-R.all[0]).toFixed(0)}%</span><span class="rl">already gone<br>by end of day 1</span></div>
      <div class="arrw">→</div>
      <div><span class="rv" style="color:var(--sw)">${(100-R.all[2]).toFixed(0)}%</span><span class="rl">already gone<br>by day 3</span></div>
      <div class="arrw">→</div>
      <div><span class="rv" style="color:var(--red)">${aliveAtEnding.toFixed(0)}%</span><span class="rl">still alive when<br>"trial ending" sends</span></div>
    </div>
    <div class="chart-box" style="height:300px"><canvas id="c-ret"></canvas></div>
    <p class="note">The shaded band is the first 72 hours — where the trial is effectively decided. Converted trials are still ${R.conv[2].toFixed(0)}% active on day 3; trials that never convert are already down to ${R.nonconv[2].toFixed(0)}%.</p>
  </div>
  <div class="insight">${bulb}
    <p><b>Our nurture is talking to an empty room.</b> ${R.dead.toFixed(0)}% of trials never log in at all after signing up, and by day ${R.emails.trial_ending||12} — when the "trial ending" email fires — only <b>${aliveAtEnding.toFixed(0)}%</b> are still active. Open rate hides this from us: opening an email isn't the same as coming back to the product. The trial runs 14 days, but self-hosted setup depends on IT approval cycles measured in weeks. <b>We should front-load the help, or start the clock at first successful install rather than at signup.</b></p></div>
  <div class="row2">
    <div class="panel"><div class="head"><h3>The aha moment: a second database<span class="pillw">our sharpest lever</span></h3><span>conversion by databases connected</span></div>
      <div class="chart-box"><canvas id="c-eng"></canvas></div>
      <p class="note">The cliff sits between one database and two. Trials monitoring a single database are still <i>testing</i> us. The moment they wire up a second, they've started using us for real work — and conversion steps up sharply. <b>${(a.dbCurve[1]&&a.dbCurve[1].n)?num(a.dbCurve[1].n):'—'} trials are parked at one database.</b> Moving them is the highest-leverage act in the funnel, and it's an in-app nudge, not a campaign.</p></div>
    <div class="panel"><div class="head"><h3>Nurture email performance</h3><span>by sequence step</span></div>${nurtureHTML}</div>
  </div>
  <div class="row2">
    <div class="panel"><div class="head"><h3>Feature usage (activated trials)</h3><span>avg per trial</span></div>${featHTML}</div>
    <div class="panel" style="display:flex;align-items:center"><div class="insight" style="margin:0">${bulb}
      <p><b>The second database is our lever.</b> Trials monitoring one database convert at ${a.dbCurve[1]?a.dbCurve[1].conv.toFixed(1):'—'}%. At two, that jumps to ${a.dbCurve[2]?a.dbCurve[2].conv.toFixed(1):'—'}% — the sharpest step change anywhere in our funnel. One database means they're still testing us; two means they've started doing real work. And the nurture data tells us email won't get them there: our lowest open rate (${a.nurture&&a.nurture[1]?a.nurture[1][2].toFixed(0):'—'}%) is on the setup-help email, sent to exactly the people who are stuck. The ones who most need us are the least likely to open. This is an in-app nudge, not a campaign.</p></div></div>
  </div>`;
  const rl=Array.from({length:R.days},(_,i)=>'Day '+(i+1));
  const endDay=R.emails.trial_ending||12;
  mkChart('c-ret',{type:'line',data:{labels:rl,datasets:[
      {label:'Trials that converted',data:R.conv,borderColor:'#12A374',backgroundColor:'rgba(18,163,116,.07)',borderWidth:2.5,pointRadius:0,pointHoverRadius:4,tension:.25,fill:true},
      {label:'All trials',data:R.all,borderColor:'#FF6200',backgroundColor:'transparent',borderWidth:3,pointRadius:0,pointHoverRadius:4,tension:.25},
      {label:'Trials that never converted',data:R.nonconv,borderColor:'#D64542',backgroundColor:'transparent',borderWidth:2,borderDash:[5,4],pointRadius:0,pointHoverRadius:4,tension:.25}
    ]},options:{responsive:true,maintainAspectRatio:false,
      layout:{padding:{top:6,right:8}},
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{position:'top',align:'start',labels:{boxWidth:12,boxHeight:2,font:{size:11.5},padding:14,usePointStyle:false}},
        tooltip:{callbacks:{title:c=>'Day '+(c[0].dataIndex+1)+' of the trial',label:c=>c.dataset.label+': '+c.parsed.y+'% still active'}}},
      scales:{y:{min:0,max:100,title:{display:true,text:'% of trials still active',font:{size:11},color:'#586475'},
          ticks:{callback:v=>v+'%',font:{size:11},color:'#8B95A6',stepSize:25},grid:{color:'#EEF1F5'},border:{display:false}},
        x:{title:{display:true,text:'day of the trial (not calendar date)',font:{size:10.5},color:'#8B95A6'},
          ticks:{font:{size:10.5},color:'#8B95A6',maxRotation:0,autoSkip:false,callback:(v,i)=>'D'+(i+1)},grid:{display:false},border:{display:false}}}},
    plugins:[{id:'ann',beforeDatasetsDraw(ch){
        const {ctx,chartArea:{top,bottom},scales:{x}}=ch;
        const x0=x.getPixelForValue(0), x2=x.getPixelForValue(2);
        ctx.save();
        ctx.fillStyle='rgba(255,98,0,.06)';
        ctx.fillRect(x0,top,x2-x0,bottom-top);
        ctx.fillStyle='#C24A00'; ctx.font='600 10px Inter'; ctx.textAlign='left';
        ctx.fillText('first 72 hours', x0+7, top+13);
        ctx.fillStyle='#8B95A6'; ctx.font='9.5px Inter';
        ctx.fillText('the trial is decided here', x0+7, top+26);
        ctx.restore();
      },
      afterDatasetsDraw(ch){
        const {ctx,chartArea:{top,bottom},scales:{x,y}}=ch;
        emailDays.forEach(([name,d])=>{ if(d<1||d>R.days) return;
          const px=x.getPixelForValue(d-1);
          ctx.save(); ctx.strokeStyle='#C3CAD4'; ctx.setLineDash([3,3]); ctx.lineWidth=1;
          ctx.beginPath(); ctx.moveTo(px,top); ctx.lineTo(px,bottom); ctx.stroke(); ctx.restore();
        });
        // callout on the trial-ending email
        const px=x.getPixelForValue(endDay-1), py=y.getPixelForValue(R.all[endDay-1]);
        ctx.save();
        ctx.fillStyle='#D64542'; ctx.beginPath(); ctx.arc(px,py,4.5,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='#D64542'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(px,py-8); ctx.lineTo(px,py-30); ctx.stroke();
        const txt='"trial ending" email — only '+R.all[endDay-1].toFixed(0)+'% still here';
        ctx.font='600 10.5px Inter'; const w=ctx.measureText(txt).width+14;
        let bx=px-w/2; bx=Math.max(ch.chartArea.left+2, Math.min(bx, ch.chartArea.right-w-2));
        ctx.fillStyle='#D64542'; ctx.beginPath(); ctx.roundRect(bx,py-48,w,19,5); ctx.fill();
        ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.fillText(txt,bx+w/2,py-35);
        ctx.restore();
      }}]});

  const dc=a.dbCurve||[];
  mkChart('c-eng',{type:'bar',data:{labels:dc.map(d=>d.k===5?'5+':String(d.k)),
    datasets:[{data:dc.map(d=>d.conv),
      backgroundColor:dc.map(d=>d.k>=2?'#12A374':(d.k===1?'#D64542':'#C3CAD4')),
      borderRadius:3,maxBarThickness:44}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},
        tooltip:{callbacks:{title:c=>c[0].label+' database'+(c[0].label==='1'?'':'s'),
          label:c=>c.parsed.y+'% convert · '+(dc[c.dataIndex]?dc[c.dataIndex].n.toLocaleString():'0')+' trials'}}},
      scales:{y:{ticks:{callback:v=>v+'%',font:{size:11},color:'#8B95A6'},grid:{color:'#EEF1F5'},border:{display:false}},
        x:{title:{display:true,text:'databases connected',font:{size:10.5},color:'#8B95A6'},
           ticks:{font:{size:11},color:'#8B95A6'},grid:{display:false},border:{display:false}}}},
    plugins:[{id:'cliff',afterDatasetsDraw(ch){
      const {ctx,chartArea:{top,bottom},scales:{x}}=ch;
      if(dc.length<3) return;
      const px=(x.getPixelForValue(1)+x.getPixelForValue(2))/2;
      ctx.save(); ctx.strokeStyle='#12A374'; ctx.setLineDash([4,3]); ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(px,top+14); ctx.lineTo(px,bottom); ctx.stroke();
      ctx.setLineDash([]); ctx.fillStyle='#0B7A56'; ctx.font='600 10px Inter'; ctx.textAlign='center';
      const lift = (dc[1]&&dc[1].conv) ? (dc[2].conv/dc[1].conv).toFixed(1)+'x' : '';
      ctx.fillText('the cliff  '+lift, px, top+6);
      ctx.restore();
    }}]});
}

// ---------------- Experiments ----------------
const PLB2={DBA:'DBA',IT_ops:'IT ops',developer:'Developer',self_hosted:'Self-hosted',saas:'SaaS'};

function renderExp(view,f){
  const a=cExp(f);
  if(!a){ view.innerHTML='<div class="placeholder"><p class="n">Experiments</p><p>Loading…</p></div>'; return; }
  const num=x=>Math.round(x).toLocaleString();
  const M=x=>{x=+x||0; return x>=1e6?'$'+(x/1e6).toFixed(1)+'M':x>=1e3?'$'+Math.round(x/1e3)+'K':'$'+Math.round(x);};
  const P=a.primary;

  const verdict = P.sig ? ['SHIP IT','ship'] : (a.nA+a.nB >= a.need*2 ? ['NO EFFECT — KILL','kill'] : ['KEEP RUNNING','wait']);

  const mrow=m=>`<tr>
    <td><b>${m.label}</b>${m.guard?' <span class="tag">primary</span>':''}</td>
    <td class="num">${m.p1.toFixed(2)}%</td>
    <td class="num">${m.p2.toFixed(2)}%</td>
    <td class="num" style="color:${m.lift>=0?'#12A374':'#D64542'}">${m.lift>=0?'+':''}${m.lift.toFixed(1)}%</td>
    <td class="num">${m.pv<0.0001?'&lt;0.0001':m.pv.toFixed(4)}</td>
    <td class="num"><span class="sigpill ${m.sig?'yes':'no'}">${m.sig?'significant':'not significant'}</span></td></tr>`;

  const segrow=(x,field)=>`<tr>
    <td><b>${PLB2[x.v]||x.v}</b></td>
    <td class="num">${num(x.nA+x.nB)}</td>
    <td class="num">${x.p1.toFixed(2)}%</td>
    <td class="num">${x.p2.toFixed(2)}%</td>
    <td class="num" style="color:${x.lift>=0?'#12A374':'#D64542'};font-weight:600">${x.lift>=0?'+':''}${x.lift.toFixed(0)}%</td>
    <td class="num"><span class="sigpill ${x.sig?'yes':'no'}">${x.sig?'sig':'ns'}</span></td></tr>`;

  const flips = a.byPersona.some(x=>x.lift<0) && a.byPersona.some(x=>x.lift>0);

  // ---- roadmap, sized from the live data
  const instPrize = Math.max(a.i1.n*0.25*((a.i2.cvr-a.i1.cvr)/100)*a.ACV, 0);
  const roadmap=[
    {n:1, t:'In-app nudge: "connect a second database"',
     hyp:`Because trials at one database convert at <b>${a.i1.cvr.toFixed(1)}%</b> and trials at two convert at <b>${a.i2.cvr.toFixed(1)}%</b>, we believe the second database is where evaluation becomes real work. If we prompt single-database trials in-app to add another, conversion will rise.`,
     metric:'Primary: % of trials reaching 2+ databases. Guardrail: trial→paid must not fall.',
     kill:'Kill if prompted trials add a second database at the same rate as the control.',
     imp:[[M(instPrize),'if 25% move'],[num(a.i1.n),'trials at one DB'],['Low','effort — Pendo, no engineering']]},
    {n:2, t:'Error-specific setup emails, not one generic nudge',
     hyp:`Because <b>${num(a.failed)}</b> trials hit a connection error and all receive the same "finish your setup" email, we believe a permissions error and a firewall error need different help. If we send the exact GRANT statement to permission failures and a pre-written network request to firewall failures, DB-connect rate will rise.`,
     metric:'Primary: DB-connect rate among error trials. Guardrail: unsubscribe rate.',
     kill:'Kill if segmented emails connect at no better rate than the generic one.',
     imp:[[num(a.failed),'trials hit an error'],['1 week','to ship in Marketo']]},
    {n:3, t:'Pre-flight qualifier on the download page',
     hyp:`Because trials discover unsupported platforms and firewall blocks only <i>after</i> installing, we believe asking two questions post-signup would let us route help before they fail. If we ask which database and whether it sits behind a firewall, activation will rise.`,
     metric:'Primary: self-hosted activation. Guardrail: signup→download rate must not fall.',
     kill:'Kill if activation is flat, or if the questions depress download rate at all.',
     imp:[[num(a.shNoConn),'installed but never connected'],['Low','effort']]},
    {n:4, t:'Start the trial clock at first install, not at signup',
     hyp:`Because self-hosted setup depends on IT approval cycles measured in weeks while the trial runs 14 days, we believe a share of trials expire before they are even able to install. If the clock starts at install, self-hosted conversion will rise.`,
     metric:'Primary: self-hosted trial→paid. Guardrail: sales cycle length must not balloon.',
     kill:'Kill if time-to-install shows no clustering near the 14-day boundary.',
     imp:[['Medium','effort — needs Product'],['High','impact if true']]},
    {n:5, t:'Randomised holdout on sales coverage of PQLs',
     hyp:`Because sales-assisted trials convert at <b>${a.naive.yes.cvr.toFixed(1)}%</b> against <b>${a.naive.no.cvr.toFixed(1)}%</b> self-serve — but among PQLs the gap collapses to <b>${a.sa.yes.cvr.toFixed(1)}%</b> vs <b>${a.sa.no.cvr.toFixed(1)}%</b> — we believe the headline gap is a selection effect, not a causal lift. If we randomly withhold sales touch from a slice of PQLs, conversion will not fall.`,
     metric:'Primary: incremental conversion lift from sales touch. Guardrail: none — this is a measurement test.',
     kill:'If the holdout converts materially worse, the lift is real and we scale coverage.',
     imp:[[num(a.sa.no.n),'PQLs with no rep today'],['Zero','cost — just stop routing some']]}
  ];

  view.innerHTML=`
  <div class="grid-kpi">
    <div class="kpi"><p class="l">Variant A — feature-led</p><p class="v sm">${P.p1.toFixed(2)}%</p><p class="s">${num(a.nA)} trials · control</p></div>

function cIns(f){
  if(!HAVE()) return null;
  const F=filt(f), n=F.length||1;
  const won=F.filter(r=>r.converted);
  const money=x=>{x=+x||0; const a=Math.abs(x); const s=x<0?'-':'';
    return a>=1e6? s+'$'+(a/1e6).toFixed(1)+'M' : a>=1e3? s+'$'+Math.round(a/1e3)+'K' : s+'$'+Math.round(a);};
  const spend=F.reduce((a,r)=>a+(+r.cac_usd||0),0);
  const acv=won.reduce((a,r)=>a+(+r.acv_usd||0),0);
  const avgACV=won.length?acv/won.length:0;
  const cpc=won.length?spend/won.length:0;

  // deployment
  const dep=dt=>{ const d=F.filter(r=>r.deployment_type===dt); const m=d.length||1;
    return {n:d.length, inst:pct(d.filter(r=>PUMAP[r.trial_id]?.installed).length,m),
      conn:pct(d.filter(r=>PUMAP[r.trial_id]?.db_connected).length,m),
      act:pct(d.filter(r=>r.activated).length,m), conv:pct(d.filter(r=>r.converted).length,m)}; };
  const SH=dep('self_hosted'), SA=dep('saas');
  const gapOK = SH.n>=50 && SA.n>=50 && SA.act>SH.act;

  // instances_monitored — the aha moment
  const inst=k=>{ const d=F.filter(r=>(+PUMAP[r.trial_id]?.instances_monitored||0)===k);
    return {n:d.length, conv:pct(d.filter(r=>r.converted).length,d.length||1)}; };
  const i1=inst(1), i2=inst(2);
  const instCurve=[0,1,2,3,4,5].map(k=>({k, ...inst(k)}));
  const i3plus=F.filter(r=>(+PUMAP[r.trial_id]?.instances_monitored||0)>=3);
  const stuck1=i1.n;

  // persona
  const PO=['DBA','IT_ops','developer'];
  const pers=PO.map(p=>{ const d=F.filter(r=>r.persona===p); const m=d.length||1;
    return {p, n:d.length, conn:pct(d.filter(r=>PUMAP[r.trial_id]?.db_connected).length,m),
      act:pct(d.filter(r=>r.activated).length,m)}; }).filter(x=>x.n>0);

  // ad groups — real now
  const ag={};
  F.forEach(r=>{ const k=(r.acquisition_channel||'?')+'||'+(r.ad_group||'?');
    const o=ag[k]=ag[k]||{ch:r.acquisition_channel,g:r.ad_group,n:0,spend:0,cust:0,acv:0};
    o.n++; o.spend+=(+r.cac_usd||0); if(r.converted){o.cust++; o.acv+=(+r.acv_usd||0);} });
  const groups=Object.values(ag).filter(o=>o.n>=20).map(o=>({...o,
    roas: o.spend? o.acv/o.spend : 0, cpc: o.cust? o.spend/o.cust : Infinity }));
  const losers=groups.filter(o=>o.roas<1).sort((a,b)=>a.roas-b.roas);
  const winners=[...groups].sort((a,b)=>b.roas-a.roas).slice(0,5);
  const waste=losers.reduce((a,o)=>a+o.spend,0);
  const wasteRecovered=losers.reduce((a,o)=>a+(o.spend-o.acv),0);

  // channels
  const chm={};
  F.forEach(r=>{ const c=r.acquisition_channel||'?'; const o=chm[c]=chm[c]||{n:0,spend:0,cust:0,acv:0};
    o.n++; o.spend+=(+r.cac_usd||0); if(r.converted){o.cust++; o.acv+=(+r.acv_usd||0);} });
  const chans=Object.entries(chm).map(([c,o])=>({c,...o,roas:o.spend?o.acv/o.spend:0,
    contrib:o.acv-o.spend})).sort((a,b)=>b.contrib-a.contrib);

  // sales: PQLs, touched vs not
  const pql=F.filter(r=>r.is_pql);
  const pqlS=pql.filter(r=>r.sales_assisted), pqlN=pql.filter(r=>!r.sales_assisted);
  const pqlSc=pct(pqlS.filter(r=>r.converted).length, pqlS.length||1);
  const pqlNc=pct(pqlN.filter(r=>r.converted).length, pqlN.length||1);
  const naiveS=pct(F.filter(r=>r.sales_assisted&&r.converted).length, F.filter(r=>r.sales_assisted).length||1);
  const naiveN=pct(F.filter(r=>!r.sales_assisted&&r.converted).length, F.filter(r=>!r.sales_assisted).length||1);

  // pipeline
  const ids=new Set(F.map(r=>r.trial_id));
  const O=(CRM||[]).filter(o=>!o.trial_id || ids.has(o.trial_id));
  const wonO=O.filter(o=>o.won);
  const openStages=new Set(['Discovery','Technical Evaluation','Proposal','Negotiation']);
  const openO=O.filter(o=>openStages.has(o.stage));

  // landing page
  const lv=v=>{ const d=F.filter(r=>r.landing_variant===v); const m=d.length||1;
    return {n:d.length, act:pct(d.filter(r=>r.activated).length,m), conv:pct(d.filter(r=>r.converted).length,m)}; };
  const A=lv('A'), B=lv('B');
  const lift=A.conv? (B.conv-A.conv)/A.conv*100 : 0;

  // sizing
  const convIfAct = SH.n? pct(F.filter(r=>r.deployment_type==='self_hosted'&&r.converted).length,
                              F.filter(r=>r.deployment_type==='self_hosted'&&r.activated).length||1)/100 : 0;
  const addAct = gapOK ? SH.n*((SA.act-SH.act)/100)*0.5 : 0;
  const setupPrize = addAct*convIfAct*avgACV;
  const instPrize = Math.max(stuck1*0.25*((i2.conv-i1.conv)/100)*avgACV, 0);
  const abPrize = Math.max(A.n*((B.conv-A.conv)/100)*avgACV, 0);

  return {n:F.length, money, spend, acv, avgACV, cpc, won:won.length,
    convRate:pct(won.length,n), actRate:pct(F.filter(r=>r.activated).length,n),
    ltvcac: cpc? avgACV/cpc : 0, contrib: acv-spend,
    SH, SA, gapOK, instCurve, i1, i2, stuck1, i3plus:i3plus.length, pers,
    groups, losers, winners, waste, wasteRecovered, chans,
    pql:pql.length, pqlS:pqlS.length, pqlN:pqlN.length, pqlSc, pqlNc, naiveS, naiveN,
    opps:O.length, openO:openO.length, wonO:wonO.length,
    winRate:pct(wonO.length,O.length||1), avgWonACV: wonO.length? wonO.reduce((a,o)=>a+(+o.acv_usd||0),0)/wonO.length : 0,
    A, B, lift, setupPrize, instPrize, abPrize};
}

const CHL=c=>CH_LABELS[c]||c;

function kpi(label,val,sub,color){
  return `<div class="kpi"><p class="l">${label}</p><p class="v ${String(val).length>7?'sm':''}" ${color?`style="color:${color}"`:''}>${val}</p><p class="s">${sub}</p></div>`;
}
function bars(rows,fmt,colorFn){
  const mx=Math.max(...rows.map(r=>Math.abs(r.v)),1);
  return rows.map(r=>`<div class="frow"><span class="fname" style="width:132px">${r.l}</span>
    <div class="ftrack"><div class="ffill" style="width:${Math.max(Math.abs(r.v)/mx*100,2)}%;background:${colorFn?colorFn(r):'var(--sw)'}"></div></div>
    <span class="fnum" style="width:66px">${fmt(r.v)}</span></div>`).join('');
}
